            { id: "65030298", name: "นายนราวิชญ์ สมันตกุล", nick: "บอส" },
        ];

        let user = null;
        let role = 'guest';
        let studentId = '';
        let config = {
            projectName: 'Song Siang',
            wordLimit: 50,
            publicEnabled: true,
            studentEnabled: true,
            driveAdminFolder: '1XlkXHCoxlWVDAsmDnPo0I32kiAjf6pUT',
            driveInboxFolder: '1XlkXHCoxlWVDAsmDnPo0I32kiAjf6pUT'
        };
        let currentView = 'login';
        let targetStudent = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let recognition = null;
        let transcript = "";
        let timer = 0;
        let timerInterval = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'song-siang-fa86e';

        // --- Init Firebase ---
        const fbApp = initializeApp(firebaseConfig);
        const auth = getAuth(fbApp);
        const db = getFirestore(fbApp);
        const provider = new GoogleAuthProvider();

        // Path Helpers (Rule 1)
        const getPublicDataCollection = (name) => collection(db, 'artifacts', appId, 'public', 'data', name);
        const getPublicDataDoc = (name, id) => doc(db, 'artifacts', appId, 'public', 'data', name, id);
        const getSettingsDoc = () => doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'general');

        // Modal System
        window.showModal = (title, message, type = 'info', onPrimary = null, showSecondary = false) => {
            const modal = document.getElementById('global-modal');
            const titleEl = document.getElementById('modal-title');
            const messageEl = document.getElementById('modal-message');
            const iconContainer = document.getElementById('modal-icon-container');
            const primaryBtn = document.getElementById('modal-primary-btn');
            const secondaryBtn = document.getElementById('modal-secondary-btn');

            titleEl.innerText = title;
            messageEl.innerText = message;
            
            iconContainer.className = "w-16 h-16 rounded-2xl flex items-center justify-center mb-6 mx-auto " + 
                (type === 'error' ? 'bg-red-50 text-red-500' : type === 'success' ? 'bg-green-50 text-green-500' : 'bg-orange-50 text-orange-500');
            iconContainer.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-triangle' : type === 'success' ? 'check-circle' : 'info'}" size="32"></i>`;
            
            primaryBtn.onclick = () => { modal.classList.add('hidden'); if(onPrimary) onPrimary(); };
            secondaryBtn.classList.toggle('hidden', !showSecondary);
            secondaryBtn.onclick = () => modal.classList.add('hidden');

            modal.classList.remove('hidden');
            lucide.createIcons();
        };

        // --- Auth Protocol (Rule 3 Fix for custom-token-mismatch) ---
        const initFlow = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (tokenErr) {
                        // If token fails (mismatch or expired), fallback to anonymous
                        console.warn("Auth token mismatch or error, falling back to anonymous", tokenErr);
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth init completely failed", err);
                showModal("ข้อผิดพลาด", "ไม่สามารถเริ่มระบบยืนยันตัวตนได้ กรุณารีเฟรชหน้าจอ", "error");
            }
        };

        onAuthStateChanged(auth, async (u) => {
            user = u;
            if (u && !u.isAnonymous) {
                const email = u.email || "";
                if (email === "ie.architecture65@gmail.com") {
                    role = 'admin';
                    document.getElementById('main-header').classList.remove('hidden');
                    renderView('admin');
                } else if (email.endsWith('@kmitl.ac.th')) {

                renderView('home');

                document.getElementById('main-header').classList.add('hidden');
                document.getElementById('student-nav').classList.add('hidden');
                renderLogin();

                    config = { ...config, ...snap.data() };
                    document.getElementById('header-project-name').innerText = config.projectName;

                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('views').classList.remove('hidden');

            const container = document.getElementById('auth-status-container');

            } else if (user && user.isAnonymous) {
                container.innerHTML = `<button onclick="logout()" class="text-[10px] font-bold text-slate-400 bg-slate-50 px-3 py-1.5 rounded-full flex items-center gap-2">Guest User <i data-lucide="log-out" size="12"></i></button>`;
            }
            lucide.createIcons();
        }

        window.renderView = (viewName) => {
            currentView = viewName;
            document.getElementById('student-nav').classList.toggle('hidden', role !== 'student');
            document.querySelectorAll('.nav-btn').forEach(b => {
                const isActive = b.dataset.view === viewName;

                    grid.appendChild(btn);
                });
            } else {
                container.innerHTML = `
                    <div class="space-y-6">
                        <div class="bg-white p-12 rounded-[56px] border border-orange-50 shadow-sm text-center">
                            <h2 class="text-3xl font-black text-slate-800 tracking-tighter italic uppercase">Hi, ${STUDENT_LIST.find(s=>s.id===studentId)?.nick || studentId}</h2>
                            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-2">Welcome to Song Siang Dashboard</p>
                        </div>
                        <div class="grid gap-4">
                            <button onclick="renderView('record')" class="bg-orange-500 text-white p-10 rounded-[40px] flex items-center justify-between shadow-2xl shadow-orange-100 hover:scale-[1.01] transition-transform group text-left">
                                <div class="flex items-center gap-6">
                                    <div class="bg-white/20 p-5 rounded-2xl group-hover:rotate-12 transition-transform"><i data-lucide="mic-vocal"></i></div>
                                    <div><p class="font-black text-xl italic tracking-tighter leading-none uppercase">อัดเสียงส่งงาน</p><p class="text-[9px] opacity-70 uppercase font-bold mt-2 tracking-[0.2em]">Assignment Submission</p></div>
                                </div>
                                <i data-lucide="chevron-right"></i>
                            </button>
                            <button onclick="renderView('inbox')" class="bg-white border border-orange-100 p-10 rounded-[40px] flex items-center justify-between hover:border-orange-400 transition-all group shadow-sm text-left">
                                <div class="flex items-center gap-6">
                                    <div class="bg-slate-50 p-5 rounded-2xl text-slate-400 group-hover:scale-110 transition-transform"><i data-lucide="mail"></i></div>
                                    <div><p class="font-black text-xl italic text-slate-800 leading-none uppercase">กล่องเสียงถึงคุณ</p><p class="text-[9px] text-slate-400 uppercase font-bold mt-2 tracking-[0.2em]">Secret Inbox</p></div>
                                </div>
                                <i data-lucide="chevron-right"></i>
                            </button>
                        </div>
                    </div>`;
            }
            lucide.createIcons();
        }

        function renderRecord() {
            const container = document.getElementById('views');
            transcript = ""; timer = 0;
            container.innerHTML = `
                <div class="max-w-md mx-auto space-y-10 animate-in slide-in-from-bottom-8 duration-500">
                    <div class="text-center space-y-2">
                        <h2 class="text-4xl font-black text-slate-800 italic tracking-tighter uppercase text-center">${targetStudent ? `ถึง: ${targetStudent.nick}` : 'Assignment'}</h2>
                        <p class="text-orange-500 text-[10px] font-bold uppercase tracking-[0.4em] text-center">${targetStudent ? 'SPEAK YOUR HEART' : `LIMIT: ${config.wordLimit} WORDS`}</p>
                    </div>
                    <div class="bg-white p-12 rounded-[64px] shadow-2xl border border-orange-50 flex flex-col items-center gap-10">
                        <div id="timer-display" class="text-7xl font-mono font-bold text-slate-100 tracking-tighter">00:00</div>
                        <button id="record-btn" onclick="toggleRecording()" class="w-36 h-36 rounded-full bg-orange-500 flex items-center justify-center shadow-2xl shadow-orange-200 hover:bg-orange-600 transition-all active:scale-90">
                            <i data-lucide="mic" id="mic-icon" size="48" class="text-white"></i>
                        </button>
                        <div id="status-text" class="text-slate-300 text-[9px] font-bold uppercase tracking-[0.5em] text-center">Tap to begin</div>
                        <div id="recording-feedback" class="w-full space-y-6 hidden">
                             <div class="w-full bg-orange-50/30 p-8 rounded-[36px] border-2 border-dashed border-orange-100 text-left">
                                <div class="flex justify-between items-center mb-4">
                                    <span class="text-[10px] font-bold text-orange-400 uppercase tracking-widest">AI Transcript</span>
                                    <span id="word-count-badge" class="text-[10px] font-bold px-4 py-1.5 rounded-full bg-white text-orange-600 shadow-sm">0 / ${targetStudent ? '∞' : config.wordLimit}</span>
                                </div>
                                <p id="transcript-preview" class="text-sm text-slate-600 italic leading-relaxed min-h-[4rem]">"..."</p>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="resetRecording()" class="flex-1 bg-slate-50 text-slate-400 py-4 rounded-3xl font-bold hover:bg-slate-100 transition-all text-sm">อัดใหม่</button>
                                <button id="submit-btn" onclick="submitVoice()" class="flex-1 bg-orange-500 py-4 rounded-3xl font-bold text-white shadow-xl shadow-orange-100 hover:bg-orange-600 transition-all text-sm">ส่งเสียง</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        window.toggleRecording = async () => {
            const btn = document.getElementById('record-btn');
            const icon = document.getElementById('mic-icon');
            const status = document.getElementById('status-text');
            const timerEl = document.getElementById('timer-display');

            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.start();

                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRecognition) {
                        recognition = new SpeechRecognition();
                        recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'th-TH';
                        recognition.onresult = (e) => {
                            let text = ""; for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
                            transcript = text;
                            const count = text.trim().split(/\s+/).filter(w => w.length > 0).length;
                            document.getElementById('transcript-preview').innerText = `"${text}"`;
                            const badge = document.getElementById('word-count-badge');
                            badge.innerText = `${count} / ${targetStudent ? '∞' : config.wordLimit}`;
                            const subBtn = document.getElementById('submit-btn');
                            if (!targetStudent && count > config.wordLimit) {
                                badge.className = 'text-[10px] font-bold px-4 py-1.5 rounded-full bg-red-500 text-white';
                                subBtn.disabled = true; subBtn.classList.add('opacity-50');
                            } else {
                                badge.className = 'text-[10px] font-bold px-4 py-1.5 rounded-full bg-white text-orange-600';
                                subBtn.disabled = false; subBtn.classList.remove('opacity-50');
                            }
                        };
                        recognition.start();
                    }

                    btn.classList.add('recording-pulse', 'bg-red-500'); icon.setAttribute('data-lucide', 'square');
                    timerEl.classList.replace('text-slate-100', 'text-orange-500'); status.innerText = "RECORDING...";
                    timer = 0; timerInterval = setInterval(() => {
                        timer++; const m = Math.floor(timer / 60).toString().padStart(2, '0'); const s = (timer % 60).toString().padStart(2, '0');
                        timerEl.innerText = `${m}:${s}`;
                    }, 1000);
                    lucide.createIcons();
                } catch (err) { showModal("แจ้งเตือน", "ไม่สามารถเข้าถึงไมค์ได้: " + err.message, "error"); }
            } else {
                mediaRecorder.stop(); recognition?.stop(); clearInterval(timerInterval);
                btn.classList.add('hidden'); document.getElementById('recording-feedback').classList.remove('hidden');
                status.innerText = "CHECK & SEND"; timerEl.classList.replace('text-orange-500', 'text-slate-800');
                lucide.createIcons();
            }
        };

        window.submitVoice = async () => {
            if (!user) { showModal("แจ้งเตือน", "กรุณาเข้าสู่ระบบ", "error"); return; }
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "SENDING...";

            try {
                const count = transcript.trim().split(/\s+/).filter(w => w.length > 0).length;
                const payload = {
                    from: studentId || (user.isAnonymous ? "Guest" : user.displayName),
                    targetId: targetStudent ? targetStudent.id : "Admin",
                    timestamp: new Date().toISOString(),
                    transcript: transcript,
                    wordCount: count,
                    driveUrl: targetStudent ? 
                        `https://drive.google.com/drive/folders/${config.driveInboxFolder}?q=${targetStudent.id}` : 
                        `https://drive.google.com/drive/folders/${config.driveAdminFolder}?q=${studentId}`
                };

                if (role === 'student' && !targetStudent) {
                    if(!config.studentEnabled) { showModal("แจ้งเตือน", "แอดมินปิดการส่งงานชั่วคราว", "info"); btn.disabled = false; return; }
                    await setDoc(getPublicDataDoc('submissions', studentId), payload);
                } else {
                    await addDoc(getPublicDataCollection('messages'), payload);
                }

                showModal("สำเร็จ!", "บันทึกข้อมูลเรียบร้อยแล้ว", "success", () => renderView('home'));
                targetStudent = null;
            } catch (e) {
                showModal("แจ้งเตือน", "บันทึกไม่สำเร็จ: " + e.message, "error");
                btn.disabled = false; btn.innerText = "ส่งเสียง";
            }
        };

        window.resetRecording = () => { if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); recognition?.stop(); clearInterval(timerInterval); renderView('record'); };

        function renderInbox() {
            const container = document.getElementById('views');
            container.innerHTML = `<h2 class="text-3xl font-black italic mb-8 flex items-center gap-3 text-slate-800 tracking-tighter uppercase text-left"><i data-lucide="mail" class="text-orange-500"></i> Inbox</h2><div id="inbox-list" class="grid gap-4">กำลังโหลด...</div>`;
            const list = document.getElementById('inbox-list');
            const q = query(getPublicDataCollection('messages'), where("targetId", "in", [studentId, "Everyone"]));
            onSnapshot(q, (snapshot) => {
                list.innerHTML = "";
                if (snapshot.empty) { list.innerHTML = `<div class="bg-white p-16 rounded-[48px] text-center text-slate-300 italic text-sm">No messages for you yet.</div>`; return; }
                snapshot.docs.forEach(d => {
                    const msg = d.data(); const isGlobal = msg.targetId === "Everyone";
                    const item = document.createElement('div');
                    item.className = `bg-white p-8 rounded-[36px] border ${isGlobal ? 'border-orange-200 bg-orange-50/10' : 'border-slate-100'} text-left shadow-sm`;
                    item.innerHTML = `<div class="flex justify-between items-center mb-4"><span class="text-[9px] font-bold ${isGlobal ? 'text-orange-600' : 'text-slate-300'} uppercase tracking-widest text-left">${isGlobal ? 'Global Broadcast' : 'Private Voice'}</span><span class="text-[9px] text-slate-300 font-bold uppercase text-right">${new Date(msg.timestamp).toLocaleDateString()}</span></div><p class="text-slate-600 italic leading-relaxed mb-6 text-sm">"${msg.transcript}"</p><a href="${msg.driveUrl}" target="_blank" class="text-orange-600 text-[9px] font-black uppercase tracking-widest flex items-center gap-2 hover:underline"><i data-lucide="folder" size="12"></i> Open in Drive</a>`;
                    list.appendChild(item);
                });
                lucide.createIcons();
            });
        }

        function renderAdmin() {
            const container = document.getElementById('views');
            container.innerHTML = `
                <div class="space-y-10 text-left animate-in fade-in duration-500">
                    <div class="bg-white p-10 rounded-[56px] shadow-2xl border border-orange-50">
                        <div class="flex justify-between items-center mb-10">
                            <h2 class="text-3xl font-black italic tracking-tighter text-orange-600 uppercase text-left">Admin Hub</h2>
                            <button onclick="confirmReset()" class="text-[9px] font-bold text-red-400 hover:text-red-600 flex items-center gap-1 uppercase tracking-[0.2em] transition-colors"><i data-lucide="trash-2" size="12"></i> Reset Data</button>
                        </div>
                        
                        <div class="grid sm:grid-cols-2 gap-8 mb-8">
                            <div class="space-y-1.5 text-left"><label class="text-[9px] font-bold text-slate-300 uppercase tracking-widest ml-3">Project Name</label><input id="adm-p-name" type="text" value="${config.projectName}" class="w-full bg-slate-50 border-none p-5 rounded-[24px] font-black italic text-lg text-slate-700 focus:ring-2 focus:ring-orange-500 outline-none transition-all"></div>
                            <div class="space-y-1.5 text-left"><label class="text-[9px] font-bold text-slate-300 uppercase tracking-widest ml-3">Word Limit</label><input id="adm-word-limit" type="number" value="${config.wordLimit}" class="w-full bg-slate-50 border-none p-5 rounded-[24px] font-black text-xl text-slate-700 focus:ring-2 focus:ring-orange-500 outline-none transition-all"></div>
                            <div class="space-y-1.5 text-left"><label class="text-[9px] font-bold text-slate-300 uppercase tracking-widest ml-3">Public Access</label><button onclick="config.publicEnabled=!config.publicEnabled; renderAdmin()" class="w-full ${config.publicEnabled ? 'bg-orange-500 shadow-orange-100' : 'bg-slate-200'} text-white p-5 rounded-[24px] font-bold text-sm shadow-lg transition-all active:scale-95 uppercase tracking-widest">${config.publicEnabled ? 'Enabled' : 'Disabled'}</button></div>
                            <div class="space-y-1.5 text-left"><label class="text-[9px] font-bold text-slate-300 uppercase tracking-widest ml-3">Student Submit</label><button onclick="config.studentEnabled=!config.studentEnabled; renderAdmin()" class="w-full ${config.studentEnabled ? 'bg-orange-500 shadow-orange-100' : 'bg-slate-200'} text-white p-5 rounded-[24px] font-bold text-sm shadow-lg transition-all active:scale-95 uppercase tracking-widest">${config.studentEnabled ? 'Active' : 'Locked'}</button></div>
                        </div>
                        
                        <div class="grid gap-4 mb-10">
                            <div class="space-y-1.5 text-left"><label class="text-[9px] font-bold text-slate-300 uppercase tracking-widest ml-3">Admin Folder ID (Receipts)</label><input id="adm-folder" type="text" value="${config.driveAdminFolder}" class="w-full bg-slate-50 border-none p-4 rounded-[20px] font-mono text-[10px] text-slate-400"></div>
                            <div class="space-y-1.5 text-left"><label class="text-[9px] font-bold text-slate-300 uppercase tracking-widest ml-3">Guest Folder ID (Inbox)</label><input id="adm-inbox-folder" type="text" value="${config.driveInboxFolder}" class="w-full bg-slate-50 border-none p-4 rounded-[20px] font-mono text-[10px] text-slate-400"></div>
                        </div>

                        <button onclick="saveAdminSettings()" id="save-btn" class="w-full bg-orange-600 text-white py-5 rounded-[32px] font-black italic shadow-2xl shadow-orange-100 hover:scale-[1.01] transition-transform uppercase tracking-widest">Update Settings</button>
                    </div>

                    <div class="space-y-6 text-left">
                        <div class="flex justify-between items-center px-4">
                            <h3 class="font-black text-slate-400 uppercase tracking-widest text-[10px] italic">Live Submissions</h3>
                        </div>
                        <div id="admin-submissions" class="grid gap-3"></div>
                    </div>
                </div>`;
            const subList = document.getElementById('admin-submissions');
            onSnapshot(getPublicDataCollection('submissions'), (snapshot) => {
                subList.innerHTML = ""; 
                snapshot.docs.forEach(d => {
                    const sub = d.data(); const item = document.createElement('div');
                    item.className = "bg-white p-5 rounded-[32px] border border-orange-50 flex justify-between items-center shadow-sm hover:border-orange-200 transition-all text-left";
                    item.innerHTML = `
                        <div class="flex items-center gap-4 text-left">
                            <div class="w-10 h-10 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-500 font-black text-[10px] italic">${sub.from.slice(-2)}</div>
                            <div>
                                <p class="font-black text-slate-800 leading-none italic text-sm text-left">${STUDENT_LIST.find(s=>s.id===sub.from)?.nick || sub.from}</p>
                                <p class="text-[9px] text-slate-300 mt-1 font-bold uppercase tracking-widest text-left">${sub.wordCount} words | ${sub.from}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                             <button onclick="showModal('Transcript', '${sub.transcript.replace(/'/g, "\\'")}', 'info')" class="p-2.5 text-slate-200 hover:text-orange-500 transition-colors"><i data-lucide="file-text" size="16"></i></button>
                             <a href="https://drive.google.com/drive/folders/${config.driveAdminFolder}?q=${sub.from}" target="_blank" class="p-2.5 bg-orange-50 text-orange-500 rounded-xl hover:bg-orange-100 transition-colors shadow-sm shadow-orange-50/50"><i data-lucide="folder-open" size="16"></i></a>
                        </div>`;
                    subList.appendChild(item);
                });
                lucide.createIcons();
            });
            lucide.createIcons();
        }

        window.saveAdminSettings = async () => {
            const btn = document.getElementById('save-btn'); btn.disabled = true;
            try { 
                const newConfig = {
                    projectName: document.getElementById('adm-p-name').value,
                    wordLimit: parseInt(document.getElementById('adm-word-limit').value),
                    driveAdminFolder: document.getElementById('adm-folder').value,
                    driveInboxFolder: document.getElementById('adm-inbox-folder').value,
                    publicEnabled: config.publicEnabled,
                    studentEnabled: config.studentEnabled
                };
                await setDoc(getSettingsDoc(), newConfig); 
                showModal("สำเร็จ", "บันทึกการตั้งค่าเรียบร้อยแล้ว", "success");
            } catch (e) { showModal("ล้มเหลว", e.message, "error"); }
            btn.disabled = false;
        };

        window.confirmReset = () => {
            showModal("ล้างข้อมูล", "คุณแน่ใจหรือไม่ที่จะลบข้อมูลการส่งงานทั้งหมด? (ไฟล์ใน Google Drive จะยังคงอยู่)", "error", async () => {
                try {
                    const subs = await getDocs(getPublicDataCollection('submissions'));
                    const msgs = await getDocs(getPublicDataCollection('messages'));
                    const promises = [...subs.docs.map(d => deleteDoc(d.ref)), ...msgs.docs.map(d => deleteDoc(d.ref))];
                    await Promise.all(promises);
                    showModal("สำเร็จ", "ล้างข้อมูลระบบเรียบร้อยแล้ว", "success");
                } catch(e) { showModal("ล้มเหลว", e.message, "error"); }
            }, true);
        };

    </script>
</body>
</html>
