        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Prompt', 'sans-serif'] },
                    colors: { primary: '#2b71b8', secondary: '#fddf31' },
                    animation: {
                        'blob': 'blob 10s infinite alternate',

                        'slide-up': 'slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '100%': { transform: 'translate(30px, -50px) scale(1.1)' }
                        },
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }

                }

        body {

        }
        /* Optimized Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.08);

            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);

            background: rgba(255, 255, 255, 0.15);

        }
        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.6);
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.85);

        }

                const navDesk = document.getElementById('navMenuDesktop');
                const navHam = document.getElementById('navHamburger');

                    navDesk.classList.remove('md:hidden');
                    navDesk.classList.add('md:flex');
                    navHam.classList.remove('hidden');

                    const showFeed = this.profile.isPredefined || this.profile.isAdmin;

                    document.getElementById('btnAdminMob').classList.toggle('hidden', !showAdmin);

                    document.getElementById('btnFeedMob').classList.toggle('hidden', !showFeed);

                    navDesk.classList.add('md:hidden');
                    navDesk.classList.remove('md:flex');
                    navHam.classList.add('hidden');
                }

                else if(viewName === 'feed') { root.innerHTML = this.renderFeed(); this.updateFAB(); }
                else if(viewName === 'home') { root.innerHTML = this.renderHome(); this.updateFAB(); }
                else if(viewName === 'compose') { root.innerHTML = this.renderCompose(); this.updateFAB(); }
                else if(viewName === 'inbox') { 
                    this.adminSearchQuery = ''; 
                    root.innerHTML = this.renderInbox(); 
                    this.updateFAB(); 
                }
                else if(viewName === 'settings') { root.innerHTML = this.renderSettings(); this.updateFAB(); }
                
                if (viewName !== 'home' && viewName !== 'feed') {
                    const globalFab = document.getElementById('globalFabContainer');
                    if (globalFab) globalFab.innerHTML = '';
                }

                        btnElement.classList.add('ring-4', 'ring-secondary', 'scale-110', 'shadow-[0_0_20px_rgba(253,223,49,0.7)]');

                this.updateFAB();

                const container = document.getElementById('usersGrid');
                if (!container) return;
                
                const isSelectingAll = this.selectedIds.length !== predefinedUsers.length;
                this.selectedIds = isSelectingAll ? predefinedUsers.map(u => u.studentId) : [];
                
                const buttons = container.querySelectorAll('button[data-student-id]');

                    const checkIcon = btn.querySelector('.check-indicator');
                    if (isSelectingAll) {
                        btn.classList.add('ring-4', 'ring-secondary', 'scale-110', 'shadow-[0_0_20px_rgba(253,223,49,0.7)]');
                        if (checkIcon) { checkIcon.classList.remove('hidden'); checkIcon.classList.add('flex'); }
                    } else {

                        if (checkIcon) { checkIcon.classList.remove('flex'); checkIcon.classList.add('hidden'); }

            toggleRecord: async function() {
                if(this.isRecording) {
                    this.mediaRecorder.stop();
                    this.isRecording = false;
                    clearInterval(this.timerInterval);
                    this.showView('compose');
                } else {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        
                        let options = {};
                        if (MediaRecorder.isTypeSupported('audio/webm')) options = { mimeType: 'audio/webm' };
                        else if (MediaRecorder.isTypeSupported('audio/mp4')) options = { mimeType: 'audio/mp4' };
                        
                        this.mediaRecorder = new MediaRecorder(stream, options);
                        this.audioChunks = [];

                        this.mediaRecorder.ondataavailable = e => { if (e.data.size > 0) this.audioChunks.push(e.data); };
                        this.mediaRecorder.onstop = () => {
                            const type = this.mediaRecorder.mimeType || 'audio/mp4';
                            this.audioBlob = new Blob(this.audioChunks, { type: type });
                            this.lastRecordingTime = this.recordingTime; 
                            stream.getTracks().forEach(track => track.stop());
                            this.showView('compose'); 
                        };

                        this.mediaRecorder.start();
                        this.isRecording = true;
                        this.recordingTime = 0;
                        this.audioBlob = null;
                        this.showView('compose');

                        this.timerInterval = setInterval(() => {
                            this.recordingTime++;
                            if(this.recordingTime >= this.maxAudioTime) this.toggleRecord();
                            else {
                                const timeDisplay = document.querySelector('.font-mono');
                                if (timeDisplay) timeDisplay.textContent = `00:${String(this.recordingTime).padStart(2, '0')}`;
                            }
                        }, 1000);
                    } catch (e) {
                        glassSwal.fire('ข้อผิดพลาด', 'ไม่สามารถเข้าถึงไมโครโฟนได้ กรุณาอนุญาตการเข้าถึง', 'error');
                    }
                }
            },
            resetAudio: function() { 
                this.audioBlob = null; 
                this.recordingTime = 0; 
                this.showView('compose'); 
            },

            sendMessage: async function(isAnonymous = false) {
                const btnNormal = document.getElementById('btnSendNormal');
                const btnAnon = document.getElementById('btnSendAnon');
                const activeBtn = isAnonymous ? btnAnon : btnNormal;
                const originalHTML = activeBtn.innerHTML;

                let content = '';
                
                if(this.composeMode === 'text') {
                    // ใช้ trim() ตัดช่องว่างและบรรทัดที่เกินความจำเป็นออก
                    content = document.getElementById('txtMessage').value.trim();
                    if(!content) return glassSwal.fire('แจ้งเตือน', 'กรุณาพิมพ์ข้อความ', 'warning');
                    const wc = content.split(/\s+/).filter(w=>w.length>0).length;
                    if(wc > this.maxWords) return glassSwal.fire('แจ้งเตือน', `จำกัดไม่เกิน ${this.maxWords} คำ`, 'warning');
                } else {
                    if(!this.audioBlob) return glassSwal.fire('แจ้งเตือน', 'กรุณาอัดเสียงก่อนส่ง', 'warning');
                    content = await new Promise((res) => {
                        const reader = new FileReader();
                        reader.onloadend = () => res(reader.result);
                        reader.readAsDataURL(this.audioBlob);
                    });
                }

                btnNormal.disabled = true;
                btnAnon.disabled = true;
                activeBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-lg sm:text-xl"></i> <span>กำลังส่ง...</span>';

                try {
                    const senderName = isAnonymous ? 'ผู้ไม่ประสงค์ออกนาม' : this.profile.name;
                    const messageData = {
                        from: { id: this.profile.studentId, name: senderName, isAnonymous: isAnonymous },
                        to: this.selectedIds,
                        type: this.composeMode,
                        content: content,
                        audioDuration: this.composeMode === 'audio' ? this.lastRecordingTime : null,
                        timestamp: Date.now()
                    };
                    const msgsRef = collection(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages');
                    await addDoc(msgsRef, messageData);
                    
                    glassSwal.fire({ 
                        iconHtml: isAnonymous ? '<i class="fa-solid fa-user-secret text-slate-700 text-5xl"></i>' : '<i class="fa-solid fa-paper-plane text-secondary text-5xl"></i>',
                        title: 'ส่งเรียบร้อย!', 
                        showConfirmButton: false, 
                        timer: 1500 
                    });
                    this.selectedIds = [];
                    this.audioBlob = null;
                    this.recordingTime = 0;
                    
                    if(this.profile.isPredefined || this.profile.isAdmin) this.showView('feed');
                    else this.showView('inbox');
                    
                } catch (e) {
                    glassSwal.fire('ข้อผิดพลาด', 'ไม่สามารถส่งข้อความได้', 'error');
                    btnNormal.disabled = false;
                    btnAnon.disabled = false;
                    activeBtn.innerHTML = originalHTML;
                }
            },

                            <div class="flex flex-row sm:flex-col items-center justify-between w-full sm:w-auto gap-2 sm:gap-0 border-b border-gray-200/50 sm:border-0 pb-2 sm:pb-0">
                                <div class="flex items-center gap-2.5">
                                    <div class="flex-shrink-0 w-10 h-10 md:w-14 md:h-14 bg-secondary rounded-full flex items-center justify-center font-bold shadow-md relative overflow-hidden ${isAnonymous ? 'border-2 border-slate-400' : 'border-2 border-white'}">
                                        ${senderImg}
                                    </div>
                                    <div class="sm:hidden">
                                        <div class="font-extrabold ${isAnonymous ? 'text-slate-700' : 'text-primary'} text-sm break-words leading-tight">${displayName} ${adminToLabel}</div>
                                        <div class="text-[9px] text-primary/60 mt-0.5 font-medium"><i class="fa-regular fa-clock mr-1"></i> ${dateStr}</div>
                                    </div>
                                </div>
                                <div class="sm:hidden flex items-center">
                                    ${adminControls}
                                </div>
                            </div>
                            
                            <div class="flex-1 w-full min-w-0">
                                <div class="hidden sm:flex justify-between items-start mb-1 md:mb-2">
                                    <div class="min-w-0">
                                        <span class="font-extrabold ${isAnonymous ? 'text-slate-700' : 'text-primary'} text-base md:text-lg tracking-wide break-words">${displayName}</span>
                                        ${adminToLabel}
                                        <div class="text-[10px] md:text-xs text-primary/60 mt-0.5 font-medium"><i class="fa-regular fa-clock mr-1"></i> ${dateStr}</div>
                                    </div>
                                    <div class="flex items-center space-x-2 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0 ml-2">
                                        ${adminControls}
                                    </div>
                                </div>
                                
                                ${isAudio ? `
                                    <div class="bg-white/90 p-2 rounded-xl border border-white w-fit max-w-full shadow-sm mt-2 sm:mt-0">
                                        <audio src="${msg.content}" controls class="h-8 md:h-10 w-[200px] sm:w-[250px]"></audio>
                                    </div>
                                ` : `
                                    <div class="text-primary bg-white/80 border border-white/50 whitespace-pre-wrap break-words leading-relaxed shadow-sm text-sm md:text-base relative font-medium mt-2 sm:mt-0 w-fit min-w-[120px] max-w-full rounded-2xl px-5 py-3 pl-10">
                                        <i class="fa-solid fa-quote-left absolute top-2 left-3 text-xl md:text-2xl text-primary/20"></i>
                                        <div class="relative z-10 break-words max-w-full pt-1">${cleanContent}</div>
                                    </div>
                                `}
                            </div>
                        </div>`;
                    });
                }

                return `
                <div class="glass-card rounded-[1.5rem] md:rounded-[2.5rem] p-3 sm:p-5 md:p-8 shadow-2xl max-w-3xl mx-auto min-h-[75vh] animate-slide-up relative z-20">
                    <div class="flex items-center justify-between mb-4 md:mb-6 border-b border-white/40 pb-3 md:pb-5">
                        <div class="flex items-center w-full">
                            <button onclick="app.showView(app.profile.isPredefined ? 'feed' : 'home')" class="p-2 md:p-3 bg-white/20 hover:bg-white/40 hover:shadow-md rounded-xl md:rounded-2xl mr-2 sm:mr-4 transition-all text-white shadow-sm flex-shrink-0">
                                <i class="fa-solid fa-arrow-left text-base md:text-xl"></i>
                            </button>
                            <div class="min-w-0">
                                <h2 class="text-lg sm:text-xl md:text-2xl font-extrabold text-white flex items-center tracking-wide truncate drop-shadow-md">
                                    <i class="fa-solid fa-envelope-open-text mr-2 hidden sm:inline-block"></i> กล่องจดหมาย
                                </h2>
                                <p class="text-blue-100 mt-0.5 font-bold text-[10px] md:text-xs truncate">
                                    ${this.profile.isAdmin ? '<span class="text-red-500 bg-white px-1.5 py-0.5 rounded-md"><i class="fa-solid fa-shield-halved mr-1"></i> โหมดจัดการของแอดมิน</span>' : 'ข้อความที่ส่งถึงคุณ'}
                                </p>
                            </div>
                        </div>
                    </div>
                    
                    ${adminSearchHTML}

                    <div id="inboxMessageContainer" class="space-y-3 md:space-y-5 relative z-10">
                        ${this.renderInboxMessagesList()}
                    </div>
                </div>`;
            }
        };

        window.addEventListener('DOMContentLoaded', () => app.init());

    </script>
</body>
</html>
