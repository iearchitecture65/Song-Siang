        .nav-active { color: #f97316; background-color: #fff7ed; }
        .nav-inactive { color: #94a3b8; }
        [v-cloak] { display: none; }

        const auth = getAuth(app);

            const iconContainer = document.getElementById('modal-icon-container');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;

            document.getElementById('modal-secondary-btn').classList.toggle('hidden', !showSecondary);
            document.getElementById('modal-secondary-btn').onclick = () => modal.classList.add('hidden');

            modal.classList.remove('hidden');
            lucide.createIcons();
        };

        // --- Auth Protocol (Rule 3: Ensure Auth before Queries) ---
        const initFlow = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token).catch(() => signInAnonymously(auth));
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth init failed", err);
                document.getElementById('loading-screen').innerHTML = `<p class="text-red-500">Failed to connect to Firebase. Please refresh.</p>`;
            }
        };

        onAuthStateChanged(auth, async (u) => {
            user = u;
            if (unsubscribeSettings) unsubscribeSettings(); // Clear old listener if re-auth

            if (u && !u.isAnonymous) {
                const email = u.email || "";
                if (email === "ie.architecture65@gmail.com") {
                    role = 'admin'; renderView('admin');
                } else if (email.endsWith('@kmitl.ac.th')) {
                    const prefix = email.split('@')[0];
                    if (STUDENT_LIST.some(s => s.id === prefix)) {
                        role = 'student'; studentId = prefix; renderView('home');
                    } else {
                        await signOut(auth); showModal("Refused", "คุณไม่มีรหัสในรายชื่อห้องเรียนนี้", "error");

                } else {

                document.getElementById('main-header').classList.remove('hidden');
            } else if (u && u.isAnonymous) {

                role = 'guest'; renderLogin();
                document.getElementById('main-header').classList.add('hidden');
                document.getElementById('student-nav').classList.add('hidden');

                        config = snap.data();
                        document.getElementById('display-project-name').innerText = config.projectName;

                        if (currentView === 'admin') renderAdmin();

                    document.getElementById('loading-screen').classList.add('hidden');
                    document.getElementById('views').classList.remove('hidden');

            } else {
                container.innerHTML = `
                    <div class="space-y-10 animate-in fade-in duration-500 text-left">
                        <div class="bg-white p-20 rounded-[80px] border-2 border-orange-50 shadow-sm text-center relative overflow-hidden">
                            <div class="relative z-10">
                                <h2 class="text-5xl font-black text-slate-800 tracking-tighter italic-title uppercase leading-none mb-4 text-center">Hello,<br>${STUDENT_LIST.find(s=>s.id===studentId)?.nick || 'Arch 65'}</h2>
                                <p class="text-orange-400 text-[13px] font-black uppercase tracking-[0.4em] italic-title leading-none text-center">Classroom Voice Terminal</p>
                            </div>
                            <i data-lucide="mic" class="absolute -bottom-10 -right-10 w-48 h-48 text-orange-50/30 transform rotate-12"></i>
                        </div>
                        <div class="grid gap-8">
                            <button onclick="renderView('record')" class="bg-orange-500 text-white p-14 rounded-[56px] flex items-center justify-between shadow-2xl shadow-orange-100 hover:scale-[1.02] transition-transform group text-left italic-title italic">
                                <div class="flex items-center gap-10">
                                    <div class="bg-white/20 p-8 rounded-[32px] group-hover:rotate-12 transition-transform shadow-lg"><i data-lucide="mic-vocal" size="40"></i></div>
                                    <div><p class="font-black text-4xl italic-title tracking-tighter leading-none uppercase italic">Record</p><p class="text-[12px] opacity-70 uppercase font-black mt-4 tracking-[0.4em] italic leading-none">Project Submission</p></div>
                                </div>
                                <i data-lucide="arrow-right" size="36"></i>
                            </button>
                            <button onclick="renderView('inbox')" class="bg-white border-2 border-orange-50 p-14 rounded-[56px] flex items-center justify-between hover:border-orange-400 transition-all group shadow-sm text-left italic-title italic">
                                <div class="flex items-center gap-10">
                                    <div class="bg-orange-50 p-8 rounded-[32px] text-orange-400 group-hover:scale-110 transition-transform"><i data-lucide="mail" size="40"></i></div>
                                    <div><p class="font-black text-4xl italic-title tracking-tighter leading-none uppercase text-slate-800 italic">Inbox</p><p class="text-[12px] text-slate-400 font-black mt-4 tracking-[0.4em] italic leading-none">Secret Messages</p></div>
                                </div>
                                <i data-lucide="arrow-right" size="36" class="text-slate-100"></i>
                            </button>
                        </div>
                    </div>`;
            }
            lucide.createIcons();
        }

        function renderRecord() {
            transcript = ""; timer = 0; recordedBase64 = "";
            document.getElementById('views').innerHTML = `
                <div class="max-w-md mx-auto space-y-12 animate-in slide-in-from-bottom-12 duration-700">
                    <div class="text-center space-y-4">
                        <h2 class="text-5xl font-black text-slate-800 italic-title tracking-tighter uppercase leading-tight text-center">${targetStudent ? `To: ${targetStudent.nick}` : 'New Voice'}</h2>
                        <p class="text-orange-500 text-[12px] font-black uppercase tracking-[0.6em] text-center">${targetStudent ? 'Speak freely' : `Limit: ${config.wordLimit} Words`}</p>
                    </div>
                    <div class="bg-white p-16 rounded-[88px] shadow-2xl border border-orange-50 flex flex-col items-center gap-12 relative">
                        <div id="timer-display" class="text-8xl font-mono font-black text-slate-100 tracking-tighter italic-title leading-none">00:00</div>
                        <button id="record-btn" onclick="toggleRecording()" class="w-44 h-44 rounded-full bg-orange-500 flex items-center justify-center shadow-2xl shadow-orange-200 hover:bg-orange-600 transition-all active:scale-90 group relative z-10">
                            <i data-lucide="mic" id="mic-icon" size="64" class="text-white group-hover:scale-110 transition-transform"></i>
                        </button>
                        <div id="status-text" class="text-slate-300 text-[12px] font-black uppercase tracking-[0.8em] italic-title text-center leading-none">Tap to start</div>
                        <div id="recording-feedback" class="w-full space-y-10 hidden">
                             <div class="w-full bg-orange-50/20 p-12 rounded-[56px] border-2 border-dashed border-orange-100 text-left">
                                <div class="flex justify-between items-center mb-6">
                                    <span class="text-[10px] font-black text-orange-300 uppercase tracking-widest leading-none">AI Result</span>
                                    <span id="word-count-badge" class="text-[12px] font-black px-6 py-2.5 rounded-full bg-white text-orange-600 shadow-sm border border-orange-50 leading-none">0 / ${targetStudent ? '∞' : config.wordLimit}</span>
                                </div>
                                <p id="transcript-preview" class="text-base text-slate-600 italic leading-relaxed min-h-[5rem] font-medium leading-relaxed italic-title">"Waiting for voice..."</p>
                            </div>
                            <div class="flex gap-5">
                                <button onclick="resetRecording()" class="flex-1 bg-slate-50 text-slate-400 py-6 rounded-[36px] font-black uppercase tracking-widest text-[11px] hover:bg-slate-100 transition-all italic-title leading-none">Retry</button>
                                <button id="submit-btn" onclick="submitVoice()" class="flex-1 bg-orange-theme py-6 rounded-[36px] font-black shadow-xl shadow-orange-100 uppercase tracking-widest text-[11px] italic-title leading-none text-white">Submit</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        window.toggleRecording = async () => {
            const btn = document.getElementById('record-btn');
            const icon = document.getElementById('mic-icon');
            const timerEl = document.getElementById('timer-display');

            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream); audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = async () => { 
                        const blob = new Blob(audioChunks, { type: 'audio/mp3' });
                        const reader = new FileReader();
                        reader.readAsDataURL(blob);
                        reader.onloadend = () => { recordedBase64 = reader.result; };
                    };
                    mediaRecorder.start();

                    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SR) {
                        recognition = new SR(); recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'th-TH';
                        recognition.onresult = (e) => {
                            let text = ""; for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
                            transcript = text;
                            const count = text.trim().split(/\s+/).filter(w => w.length > 0).length;
                            document.getElementById('transcript-preview').innerText = `"${text}"`;
                            document.getElementById('word-count-badge').innerText = `${count} / ${targetStudent ? '∞' : config.wordLimit}`;
                            
                            const subBtn = document.getElementById('submit-btn');
                            if (!targetStudent && count > config.wordLimit) {
                                document.getElementById('word-count-badge').className = 'text-[12px] font-black px-6 py-2.5 rounded-full bg-red-500 text-white shadow-lg';
                                subBtn.disabled = true; subBtn.classList.add('opacity-50');
                            } else {
                                document.getElementById('word-count-badge').className = 'text-[12px] font-black px-6 py-2.5 rounded-full bg-white text-orange-600 shadow-sm border border-orange-50';
                                subBtn.disabled = false; subBtn.classList.remove('opacity-50');
                            }
                        };
                        recognition.start();
                    }

                    btn.classList.add('recording-pulse', 'bg-red-500'); icon.setAttribute('data-lucide', 'square');
                    timerEl.classList.replace('text-slate-100', 'text-orange-500'); 
                    document.getElementById('status-text').innerText = "RECORDING NOW";
                    timer = 0; timerInterval = setInterval(() => {
                        timer++; const m = Math.floor(timer/60).toString().padStart(2,'0'); const s = (timer%60).toString().padStart(2,'0');
                        timerEl.innerText = `${m}:${s}`;
                    }, 1000); lucide.createIcons();
                } catch (e) { showModal("Mic Error", "ไม่สามารถใช้ไมค์ได้: " + e.message, "error"); }
            } else {
                mediaRecorder.stop(); if(recognition) recognition.stop(); clearInterval(timerInterval);
                btn.classList.add('hidden'); document.getElementById('recording-feedback').classList.remove('hidden');
                document.getElementById('status-text').innerText = "READY TO SEND";
                timerEl.classList.replace('text-orange-500', 'text-slate-800'); lucide.createIcons();
            }
        };

        window.submitVoice = async () => {
            if (!user) { showModal("Notice", "กรุณาล็อกอินก่อนส่งงาน", "error"); return; }
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "SENDING...";

            try {
                // Ensure Base64 is ready (Wait a small bit if needed)
                if (!recordedBase64) await new Promise(r => setTimeout(r, 1000));

                const count = transcript.trim().split(/\s+/).filter(w => w.length > 0).length;
                const payload = {
                    from: studentId || (user.isAnonymous ? "Guest" : user.displayName),
                    targetId: targetStudent ? targetStudent.id : "Admin",
                    timestamp: new Date().toISOString(),
                    transcript: transcript,
                    wordCount: count,
                    audioData: recordedBase64
                };

                if (role === 'student' && !targetStudent) {
                    if(!config.studentEnabled) { showModal("Notice", "ปิดรับงานชั่วคราว", "info"); btn.disabled = false; return; }
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', studentId), payload);
                } else {
                    await addDoc(getPublicCollection('messages'), payload);
                }

                showModal("Sent!", "บันทึกข้อมูลเรียบร้อยแล้ว", "success", () => renderView('home'));
                targetStudent = null;
            } catch (e) {
                console.error("Submit error:", e);
                showModal("Error", "ไม่สามารถส่งข้อมูลได้: " + e.message, "error");
                btn.disabled = false; btn.innerText = "Submit";
            }
        };

        window.resetRecording = () => { if (mediaRecorder?.state !== 'inactive') mediaRecorder?.stop(); if(recognition) recognition.stop(); clearInterval(timerInterval); renderView('record'); };

        function renderInbox() {
            const container = document.getElementById('views');
            container.innerHTML = `<h2 class="text-5xl font-black italic-title mb-16 text-slate-800 tracking-tighter uppercase text-left italic"><i data-lucide="mail" class="text-orange-500 inline mr-6"></i> Inbox</h2><div id="inbox-list" class="grid gap-8"></div>`;
            const q = query(getPublicCollection('messages'), where("targetId", "in", [studentId, "Everyone"]));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('inbox-list');
                if(!list) return; list.innerHTML = "";
                if (snapshot.empty) { list.innerHTML = `<div class="bg-white p-24 rounded-[72px] text-center text-slate-300 font-black italic uppercase tracking-widest border border-orange-50 shadow-sm text-xs italic-title">No voices yet.</div>`; return; }
                snapshot.docs.forEach(d => {
                    const msg = d.data(); const isGlobal = msg.targetId === "Everyone";
                    const item = document.createElement('div');
                    item.className = `bg-white p-12 rounded-[56px] border-2 ${isGlobal ? 'border-orange-500 shadow-orange-100 shadow-2xl' : 'border-orange-50 shadow-sm'} text-left`;
                    item.innerHTML = `
                        <div class="flex justify-between items-center mb-8"><span class="text-[11px] font-black ${isGlobal ? 'text-orange-600' : 'text-slate-300'} uppercase tracking-[0.3em] italic-title italic">${isGlobal ? 'Global' : 'Secret'}</span><span class="text-[10px] text-slate-300 font-black uppercase">${new Date(msg.timestamp).toLocaleDateString()}</span></div>
                        <p class="text-slate-600 italic-title leading-relaxed mb-10 text-xl font-medium italic text-left">"${msg.transcript}"</p>
                        <audio controls src="${msg.audioData}" class="w-full mb-4 h-8"></audio>
                    `;
                    list.appendChild(item);
                });
                lucide.createIcons();
            }, (err) => console.log("Inbox error:", err));
        }

        function renderAdmin() {
            const container = document.getElementById('views');
            container.innerHTML = `
                <div class="space-y-16 text-left animate-in fade-in duration-500 text-left italic">
                    <div class="bg-white p-12 rounded-[72px] shadow-2xl border-2 border-orange-50 relative overflow-hidden">
                        <div class="flex justify-between items-center mb-16 relative z-10">
                            <h2 class="text-4xl font-black italic-title tracking-tighter text-orange-600 uppercase text-left italic">Admin Hub</h2>
                            <button onclick="confirmReset()" class="text-[10px] font-black text-red-400 hover:text-red-600 flex items-center gap-2 uppercase tracking-[0.3em] transition-colors italic-title italic"><i data-lucide="trash-2" size="14"></i> Wipe Data</button>
                        </div>
                        
                        <div class="grid sm:grid-cols-2 gap-12 mb-12 relative z-10 text-left italic-title italic">
                            <div class="space-y-3 text-left"><label class="text-[11px] font-black text-slate-300 uppercase tracking-[0.3em] ml-6 italic-title text-left uppercase leading-none italic">Title</label><input id="adm-p-name" type="text" oninput="config.projectName=this.value" value="${config.projectName}" class="w-full bg-slate-50 border-none p-7 rounded-[32px] font-black italic text-2xl text-slate-700 focus:ring-2 focus:ring-orange-500 outline-none text-left italic-title italic"></div>
                            <div class="space-y-3 text-left"><label class="text-[11px] font-black text-slate-300 uppercase tracking-[0.3em] ml-6 italic-title text-left uppercase leading-none italic">Word Limit</label><input id="adm-word-limit" type="number" oninput="config.wordLimit=parseInt(this.value)" value="${config.wordLimit}" class="w-full bg-slate-50 border-none p-7 rounded-[32px] font-black text-3xl text-slate-700 text-left italic-title italic"></div>
                            <div class="space-y-3 text-left"><label class="text-[11px] font-black text-slate-300 uppercase tracking-[0.3em] ml-6 italic-title text-left uppercase leading-none italic">Public Term</label><button onclick="config.publicEnabled=!config.publicEnabled; renderAdmin()" class="w-full ${config.publicEnabled ? 'bg-orange-500 shadow-orange-100' : 'bg-slate-200'} text-white p-7 rounded-[32px] font-black text-xs uppercase tracking-[0.2em] shadow-xl transition-all shadow-lg italic-title italic leading-none">${config.publicEnabled ? 'ONLINE' : 'OFFLINE'}</button></div>
                            <div class="space-y-3 text-left"><label class="text-[11px] font-black text-slate-300 uppercase tracking-[0.3em] ml-6 italic-title text-left uppercase leading-none italic">Submission</label><button onclick="config.studentEnabled=!config.studentEnabled; renderAdmin()" class="w-full ${config.studentEnabled ? 'bg-orange-500 shadow-orange-100' : 'bg-slate-200'} text-white p-7 rounded-[32px] font-black text-xs uppercase tracking-[0.2em] shadow-xl transition-all shadow-lg italic-title italic leading-none">${config.studentEnabled ? 'ACTIVE' : 'LOCKED'}</button></div>
                        </div>
                        
                        <button onclick="saveAdminSettings()" id="save-btn" class="w-full bg-orange-theme text-white py-8 rounded-[48px] font-black italic shadow-2xl shadow-orange-100 hover:scale-[1.01] transition-transform uppercase tracking-[0.4em] text-sm relative z-10 italic-title italic">Update Settings</button>
                    </div>

                    <div class="space-y-8 text-left italic-title italic">
                        <h3 class="font-black text-slate-300 uppercase tracking-[0.5em] text-[12px] italic ml-8 text-left uppercase leading-none italic">Live Stream Activity</h3>
                        <div id="admin-submissions" class="grid gap-5 text-left"></div>
                    </div>
                </div>`;
            
            onSnapshot(getPublicCollection('submissions'), (snapshot) => {
                const subList = document.getElementById('admin-submissions');
                if(!subList) return; subList.innerHTML = ""; 
                snapshot.docs.forEach(d => {
                    const sub = d.data(); const item = document.createElement('div');
                    item.className = "bg-white p-8 rounded-[48px] border border-orange-50 flex flex-col gap-6 shadow-sm hover:border-orange-300 transition-all text-left italic-title italic";
                    item.innerHTML = `
                        <div class="flex justify-between items-center text-left">
                            <div class="flex items-center gap-6">
                                <div class="w-16 h-16 bg-orange-50 rounded-[28px] flex items-center justify-center text-orange-500 font-black text-[14px] shadow-inner uppercase italic-title italic tracking-tighter leading-none">${sub.from.slice(-2)}</div>
                                <div class="text-left">
                                    <p class="font-black text-slate-800 leading-none italic-title text-xl italic text-left">${STUDENT_LIST.find(s=>s.id===sub.from)?.nick || sub.from}</p>
                                    <p class="text-[11px] text-slate-300 mt-2 font-black uppercase tracking-[0.2em] italic-title italic text-left leading-none">${sub.wordCount} words | ID: ${sub.from}</p>
                                </div>
                            </div>
                            <button onclick="showModal('Transcript', '${sub.transcript.replace(/'/g, "\\'")}', 'info')" class="p-5 text-slate-200 hover:text-orange-500 transition-colors bg-slate-50 rounded-[24px]"><i data-lucide="file-text" size="22"></i></button>
                        </div>
                        <audio controls src="${sub.audioData}" class="w-full h-8 opacity-80"></audio>
                    `;
                    subList.appendChild(item);
                });
                lucide.createIcons();
            }, (err) => console.log("Admin list error:", err));
        }

        window.saveAdminSettings = async () => {
            const btn = document.getElementById('save-btn'); btn.disabled = true;
            try { 
                await setDoc(getSettingsDoc(), config); 
                showModal("Success!", "บันทึกการตั้งค่าลงระบบแล้ว", "success");
            } catch (e) { showModal("Error", e.message, "error"); }
            btn.disabled = false;
        };

        window.confirmReset = () => {
            showModal("Danger Zone", "ต้องการล้างข้อมูลงานทั้งหมดหรือไม่? (กู้คืนไม่ได้)", "error", async () => {
                try {
                    const subs = await getDocs(getPublicCollection('submissions'));
                    const msgs = await getDocs(getPublicCollection('messages'));
                    await Promise.all([...subs.docs.map(d => deleteDoc(d.ref)), ...msgs.docs.map(d => deleteDoc(d.ref))]);
                    showModal("Wiped", "ล้างฐานข้อมูลสำเร็จ", "success");
                } catch(e) { showModal("Fail", e.message, "error"); }
            }, true);
        };
    </script>
</body>
</html>
