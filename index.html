                        this.profile = null;
                        localStorage.removeItem('songSiangProfile');
                        if(this.unsubscribeMsgs) this.unsubscribeMsgs();
                        this.showView('login');
                    }
                });

            setupMessagesListener: function() {
                if(this.unsubscribeMsgs) this.unsubscribeMsgs();
                if(!this.profile) return;

                const msgsRef = collection(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages');
                this.unsubscribeMsgs = onSnapshot(msgsRef, (snapshot) => {
                    const allMsgs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const myMsgs = allMsgs.filter(msg => this.profile.isAdmin || msg.to.includes(this.profile.studentId));
                    myMsgs.sort((a, b) => b.timestamp - a.timestamp);
                    this.messages = myMsgs;
                    
                    if(this.currentView === 'inbox') this.showView('inbox'); 
                });

            toggleRecord: async function() {
                if(this.isRecording) {
                    this.mediaRecorder.stop();
                    this.isRecording = false;
                    clearInterval(this.timerInterval);
                    this.showView('compose');
                } else {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        this.mediaRecorder = new MediaRecorder(stream);
                        this.audioChunks = [];

                        this.mediaRecorder.ondataavailable = e => { if (e.data.size > 0) this.audioChunks.push(e.data); };
                        this.mediaRecorder.onstop = () => {
                            this.audioBlob = new Blob(this.audioChunks, { type: 'audio/webm' });
                            stream.getTracks().forEach(track => track.stop());
                            this.showView('compose'); 
                        };

                        this.mediaRecorder.start();
                        this.isRecording = true;
                        this.recordingTime = 0;
                        this.audioBlob = null;
                        this.showView('compose');

                        this.timerInterval = setInterval(() => {
                            this.recordingTime++;
                            if(this.recordingTime >= MAX_AUDIO_TIME) this.toggleRecord();
                            else {
                                const timeDisplay = document.querySelector('.font-mono');
                                if (timeDisplay) timeDisplay.textContent = `00:${String(this.recordingTime).padStart(2, '0')}`;
                            }
                        }, 1000);
                    } catch (e) {
                        glassSwal.fire('ข้อผิดพลาด', 'ไม่สามารถเข้าถึงไมโครโฟนได้ กรุณาอนุญาตการเข้าถึง', 'error');
                    }
                }
            },
            resetAudio: function() { this.audioBlob = null; this.showView('compose'); },

            sendMessage: async function() {
                const btn = document.getElementById('btnSend');
                let content = '';
                
                if(this.composeMode === 'text') {
                    content = document.getElementById('txtMessage').value.trim();
                    if(!content) return glassSwal.fire('แจ้งเตือน', 'กรุณาพิมพ์ข้อความ', 'warning');
                    const wc = content.split(/\s+/).filter(w=>w.length>0).length;
                    if(wc > MAX_WORDS) return glassSwal.fire('แจ้งเตือน', `จำกัดไม่เกิน ${MAX_WORDS} คำ`, 'warning');
                } else {
                    if(!this.audioBlob) return glassSwal.fire('แจ้งเตือน', 'กรุณาอัดเสียงก่อนส่ง', 'warning');
                    content = await new Promise((res) => {
                        const reader = new FileReader();
                        reader.onloadend = () => res(reader.result);
                        reader.readAsDataURL(this.audioBlob);
                    });
                }

                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-lg sm:text-xl"></i> <span>กำลังส่ง...</span>';

                try {
                    const messageData = {
                        from: { id: this.profile.studentId, name: this.profile.name },
                        to: this.selectedIds,
                        type: this.composeMode,
                        content: content,
                        timestamp: Date.now()
                    };
                    const msgsRef = collection(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages');
                    await addDoc(msgsRef, messageData);
                    
                    glassSwal.fire({ 
                        iconHtml: '<i class="fa-solid fa-paper-plane text-secondary text-5xl"></i>',
                        title: 'ส่งเรียบร้อย!', 
                        showConfirmButton: false, 
                        timer: 1500 
                    });
                    this.selectedIds = [];
                    this.audioBlob = null;
                    this.showView('inbox');
                } catch (e) {
                    glassSwal.fire('ข้อผิดพลาด', 'ไม่สามารถส่งข้อความได้', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-paper-plane text-lg sm:text-xl"></i> <span>ส่งข้อความเลย!</span>';
                }
            },

            // ==========================================
            // INBOX FLOW
            // ==========================================
            deleteMsg: async function(id) {
                glassSwal.fire({
                    title: 'ลบข้อความนี้?', 
                    html: "จะไม่สามารถกู้คืนได้", 
                    iconHtml: '<i class="fa-solid fa-trash-can text-red-400 text-5xl"></i>',
                    showCancelButton: true, 
                    confirmButtonText: 'ลบเลย', 
                    cancelButtonText: 'ยกเลิก'
                }).then(async (result) => {
                    if (result.isConfirmed) {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages', id));
                        glassSwal.fire({ iconHtml: '<i class="fa-solid fa-check text-green-500 text-5xl"></i>', title:'ลบแล้ว', showConfirmButton:false, timer:1000});
                    }
                });
            },

            renderInbox: function() {
                let msgsHTML = '';
                if(this.messages.length === 0) {
                    msgsHTML = `
                        <div class="text-center py-16 md:py-24 flex flex-col items-center justify-center animate-fade-in">
                            <div class="w-24 h-24 md:w-32 md:h-32 bg-white/30 rounded-full flex items-center justify-center mb-4 md:mb-6 shadow-inner border border-white/50">
                                <i class="fa-solid fa-envelope-open text-4xl md:text-5xl text-primary/40"></i>
                            </div>
                            <p class="text-primary/70 font-bold text-lg md:text-xl drop-shadow-sm text-center">ยังไม่มีข้อความถึงคุณในขณะนี้</p>
                        </div>`;
                } else {
                    this.messages.forEach((msg, idx) => {
                        const dateStr = new Date(msg.timestamp).toLocaleString('th-TH');
                        const isAudio = msg.type === 'audio';
                        const adminControls = this.profile.isAdmin ? `
                            <button onclick="app.deleteMsg('${msg.id}')" class="text-red-400 hover:text-red-600 bg-white/80 backdrop-blur shadow hover:shadow-md p-1.5 md:p-2 rounded-lg transition-all" title="ลบข้อความ">
                                <i class="fa-solid fa-trash-can text-sm md:text-base"></i>
                            </button>
                        ` : '';
                        
                        const adminToLabel = this.profile.isAdmin ? `<span class="ml-2 text-[10px] md:text-xs bg-primary/20 text-primary border border-primary/30 px-1.5 md:px-2 py-0.5 rounded-full font-bold shadow-sm whitespace-nowrap"><i class="fa-solid fa-users text-[8px] md:text-[10px]"></i> ${msg.to.length}</span>` : '';

                        const sender = predefinedUsers.find(u => u.studentId === msg.from.id);
                        const senderImg = sender ? `<img src="${GITHUB_IMG_BASE_URL}/${sender.id}.png" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" class="w-full h-full object-cover rounded-full absolute inset-0 z-0 m-0 p-0"><span class="relative z-10 hidden text-primary items-center justify-center w-full h-full text-lg">${msg.from.name.substring(0,1)}</span>` : `<span class="text-primary flex items-center justify-center w-full h-full text-lg">${msg.from.name.substring(0,1)}</span>`;

                        msgsHTML += `
                        <div class="bg-white/60 backdrop-blur-md border border-white/60 p-4 md:p-6 rounded-2xl md:rounded-[2rem] flex flex-col sm:flex-row sm:items-start gap-3 md:gap-5 shadow-lg hover:shadow-xl transition-all transform hover:-translate-y-1 group animate-slide-up w-full" style="animation-delay: ${idx * 50}ms">
                            <div class="flex flex-row sm:flex-col items-center justify-between w-full sm:w-auto gap-3 sm:gap-0 border-b border-gray-200/50 sm:border-0 pb-3 sm:pb-0">
                                <div class="flex items-center gap-3">
                                    <div class="flex-shrink-0 w-12 h-12 md:w-16 md:h-16 bg-secondary rounded-full flex items-center justify-center font-bold shadow-md relative overflow-hidden border-2 border-white">
                                        ${senderImg}
                                    </div>
                                    <div class="sm:hidden">
                                        <div class="font-extrabold text-primary text-base break-words leading-tight">${msg.from.name} ${adminToLabel}</div>
                                        <div class="text-[10px] text-primary/60 mt-0.5 font-medium"><i class="fa-regular fa-clock mr-1"></i> ${dateStr}</div>
                                    </div>
                                </div>
                                <div class="sm:hidden flex items-center">
                                    ${adminControls}
                                </div>
                            </div>
                            
                            <div class="flex-1 w-full min-w-0">
                                <div class="hidden sm:flex justify-between items-start mb-2 md:mb-3">
                                    <div class="min-w-0">
                                        <span class="font-extrabold text-primary text-lg md:text-xl tracking-wide break-words">${msg.from.name}</span>
                                        ${adminToLabel}
                                        <div class="text-[10px] md:text-xs text-primary/60 mt-0.5 font-medium"><i class="fa-regular fa-clock mr-1"></i> ${dateStr}</div>
                                    </div>
                                    <div class="flex items-center space-x-2 opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0 ml-2">
                                        ${adminControls}
                                    </div>
                                </div>
                                
                                ${isAudio ? `
                                    <div class="bg-white/80 p-3 md:p-4 rounded-xl md:rounded-2xl border border-white inline-block w-full max-w-sm shadow-sm mt-2 sm:mt-0">
                                        <audio src="${msg.content}" controls class="w-full h-8 md:h-10"></audio>
                                    </div>
                                ` : `
                                    <div class="text-primary bg-white/70 p-4 md:p-5 rounded-xl md:rounded-2xl border border-white whitespace-pre-wrap break-words leading-relaxed shadow-sm text-sm md:text-lg relative font-medium mt-2 sm:mt-0 w-full overflow-hidden">
                                        <i class="fa-solid fa-quote-left absolute top-2 left-2 md:top-3 md:left-3 text-xl md:text-3xl text-primary/10"></i>
                                        <div class="relative z-10 pl-4 md:pl-5 break-words max-w-full">${msg.content}</div>
                                    </div>
                                `}
                            </div>
                        </div>`;
                    });
                }

                return `
                <div class="glass-card rounded-[2rem] md:rounded-[2.5rem] p-4 sm:p-6 md:p-10 shadow-2xl max-w-3xl mx-auto min-h-[75vh] animate-slide-up relative z-20">
                    <div class="flex items-center justify-between mb-6 md:mb-10 border-b border-white/40 pb-4 md:pb-6">
                        <div class="flex items-center w-full">
                            <button onclick="app.showView('home')" class="p-2 sm:p-3 bg-white/20 hover:bg-white/40 hover:shadow-md rounded-xl md:rounded-2xl mr-3 sm:mr-5 transition-all text-primary shadow-sm flex-shrink-0">
                                <i class="fa-solid fa-arrow-left text-lg md:text-xl"></i>
                            </button>
                            <div class="min-w-0">
                                <h2 class="text-xl sm:text-2xl md:text-3xl font-extrabold text-primary flex items-center tracking-wide truncate">
                                    <i class="fa-solid fa-envelope-open-text mr-2 md:mr-3 hidden sm:inline-block"></i> กล่องจดหมาย
                                </h2>
                                <p class="text-primary/70 mt-1 font-bold text-xs md:text-sm truncate">
                                    ${this.profile.isAdmin ? '<span class="text-red-500 bg-red-50 px-2 py-0.5 rounded-md"><i class="fa-solid fa-shield-halved mr-1"></i> โหมดผู้ดูแลระบบ</span>' : 'ข้อความจากเพื่อนและรุ่นน้อง'}
                                </p>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-4 md:space-y-6 relative z-10">
                        ${msgsHTML}
                    </div>
                </div>`;
            }
        };

        window.addEventListener('DOMContentLoaded', () => app.init());

    </script>
</body>
</html>
