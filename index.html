<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Siang - Classroom Voice System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Library สำหรับไฟล์ ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #fffaf5; font-size: 13px; }
        .italic-title { font-style: italic; }
        .orange-theme { color: #f97316; }
        .bg-orange-theme { background-color: #f97316; }
        .custom-modal-backdrop { background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); }
        .recording-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 8px rgba(249, 115, 22, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }
        .btn-orange { background-color: #f97316; color: white; transition: all 0.2s; font-weight: 600; }
        .btn-orange:hover { background-color: #ea580c; }
        .btn-orange:active { transform: scale(0.97); }
        .nav-active { color: #f97316; background-color: #fff7ed; }
        .nav-inactive { color: #94a3b8; }
        audio::-webkit-media-controls-panel { background-color: #fff7ed; }
        .compact-input { background-color: #f8fafc; border: 1px solid #e2e8f0; padding: 0.4rem; border-radius: 0.5rem; font-weight: 500; font-size: 0.8rem; width: 100%; outline: none; }
        .compact-input:focus { border-color: #f97316; }
        .view-card { max-width: 450px; margin: 0 auto; }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

    <!-- Global Modal -->
    <div id="global-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4 custom-modal-backdrop">
        <div class="bg-white rounded-2xl p-5 max-w-xs w-full shadow-2xl animate-in zoom-in duration-300 text-center border border-orange-100">
            <div id="modal-icon-container" class="w-10 h-10 rounded-xl flex items-center justify-center mb-3 mx-auto shadow-sm"></div>
            <h3 id="modal-title" class="text-sm font-black text-slate-800 mb-1 italic-title tracking-tight uppercase leading-none"></h3>
            <p id="modal-message" class="text-slate-500 text-[11px] leading-relaxed mb-5 px-1"></p>
            <div id="modal-actions" class="flex flex-col gap-2">
                <button id="modal-primary-btn" class="w-full btn-orange py-2 rounded-lg font-black uppercase tracking-widest text-[9px] italic-title">ตกลง</button>
                <button id="modal-secondary-btn" class="hidden w-full bg-slate-50 text-slate-400 py-2 rounded-lg font-bold text-[9px] uppercase tracking-widest">ยกเลิก</button>
            </div>
        </div>
    </div>

    <!-- Header (Hidden initially) -->
    <header id="main-header" class="hidden bg-white/80 backdrop-blur-md border-b border-orange-50 sticky top-0 z-50 px-4 py-2 flex justify-between items-center">
        <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
            <div class="bg-orange-theme p-1 rounded-md text-white">
                <i data-lucide="mic-vocal" size="14"></i>
            </div>
            <h1 id="display-project-name" class="text-sm font-black tracking-tighter orange-theme italic-title uppercase">Song Siang</h1>
        </div>
        <div id="auth-status" class="flex items-center gap-2"></div>
    </header>

    <!-- Main Container -->
    <main class="flex-grow p-4 w-full overflow-x-hidden">
        <div id="loading-screen" class="flex flex-col items-center justify-center py-20 gap-3 text-center">
            <div class="w-7 h-7 border-[3px] border-orange-50 border-t-orange-500 rounded-full animate-spin"></div>
            <p class="text-orange-400 font-black uppercase tracking-widest text-[8px] italic-title">Syncing Data</p>
        </div>
        <div id="views" class="hidden animate-in fade-in duration-500"></div>
    </main>

    <!-- Student Nav (Hidden initially) -->
    <nav id="student-nav" class="hidden fixed bottom-3 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur-xl border border-orange-100 rounded-2xl flex gap-1 p-1 z-50 shadow-lg">
        <button onclick="renderView('home')" class="nav-btn p-2 rounded-xl flex items-center justify-center nav-active transition-all" data-view="home">
            <i data-lucide="layout-grid" size="16"></i>
        </button>
        <button onclick="renderView('record')" class="nav-btn p-2 rounded-xl flex items-center justify-center nav-inactive" data-view="record">
            <i data-lucide="mic" size="16"></i>
        </button>
        <button onclick="renderView('inbox')" class="nav-btn p-2 rounded-xl flex items-center justify-center nav-inactive" data-view="inbox">
            <i data-lucide="mail" size="16"></i>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, signInAnonymously, GoogleAuthProvider, onAuthStateChanged, signOut, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, query, where, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLKlp8mLuPsw0zyxy5cead2n0vPDGP2Kw",
            authDomain: "song-siang-fa86e.firebaseapp.com",
            projectId: "song-siang-fa86e",
            storageBucket: "song-siang-fa86e.firebasestorage.app",
            messagingSenderId: "1090864995280",
            appId: "1:1090864995280:web:cf08b12aa883ca830937d5",
            measurementId: "G-KJNWRLY4LC"
        };

        const STUDENT_LIST = [
            { id: "65030001", name: "นางสาวกชกร ทรัพย์โคกสูง", nick: "กิ๊ฟ" }, { id: "65030004", name: "นางสาวกนกวรรณ จันทร์มาเมือง", nick: "ฝ้าย" }, { id: "65030008", name: "นางสาวกมลเนตร ชัยชนะ", nick: "วิว" }, { id: "65030009", name: "นางสาวกมลฤทัย สว่างแจ้ง", nick: "เฟิร์น" }, { id: "65030022", name: "นางสาวกุลภัสสร์ ธีระเพ็ญแสง", nick: "ภัส" }, { id: "65030030", name: "นางสาวจันทรัตน์ อ่อนละมูล", nick: "น้ำฝน" }, { id: "65030036", name: "นายเฉลิมพร วันเพ็ญ", nick: "วันเพ็ญ" }, { id: "65030038", name: "นางสาวชญาสินี วงศ์รักษา", nick: "ต้นข้าว" }, { id: "65030040", name: "นางสาวชนาภา ท้วมเกร็ด", nick: "เต๋าเต๋า" }, { id: "65030043", name: "นายชยาวุธ ภวคุณกร", nick: "นน" }, { id: "65030045", name: "นางสาวชยุตรา เสนากูล", nick: "คะนิ้ง" }, { id: "65030048", name: "นางสาวชวพร ประสงค์ผล", nick: "มิว" }, { id: "65030054", name: "นางสาวโชติกา อายุวรรณ", nick: "กิว" }, { id: "65030057", name: "นายฐิติกานต์ ปุระเตนนท์", nick: "กัน" }, { id: "65030063", name: "นางสาวณัชชา อภิเดช", nick: "กล้องฟิล์ม" }, { id: "65030070", name: "นายณัฐนันท์ เตชัย", nick: "หวัง" }, { id: "65030093", name: "นายธนภัทร ไชยเมือง", nick: "อังเปา" }, { id: "65030094", name: "นายธนภัทร บุญต่าง", nick: "ภู" }, { id: "65030095", name: "นายธนภัทร พ้องเสียง", nick: "เพลง" }, { id: "65030097", name: "นางสาวธรรญชนก กิจพิบูลย์", nick: "ฟาง" }, { id: "65030105", name: "นายธาวิน ทองส่งเสริม", nick: "วิน" }, { id: "65030115", name: "นายนนทวัฒน์ ชีพอุบัติ", nick: "เฟรม" }, { id: "65030123", name: "นางสาวนันทกานต์ ชูจันทร์", nick: "จิ๊บ" }, { id: "65030138", name: "นายปฏิภาณ บำเรอจิต", nick: "ปลั๊ก" }, { id: "65030140", name: "นางสาวปณิตา พงษ์เรือง", nick: "ปิ่น" }, { id: "65030145", name: "นางสาวปรียากร สายสิม", nick: "ปาล์มมี่" }, { id: "65030173", name: "นางสาวพุธิตา ปันฟอง", nick: "ใบเตย" }, { id: "65030193", name: "นายภูวิศ ชินทองเปลว", nick: "โบ๊ท" }, { id: "65030215", name: "นางสาววนิชยา ทองสุข", nick: "ดรีม" }, { id: "65030216", name: "นางสาววนิดา วามะขัน", nick: "มิ้นท์" }, { id: "65030221", name: "นางสาววรัญญา ประสิทธิ์พิชิต", nick: "เมอ" }, { id: "65030225", name: "นางสาววริษา อุ่นวิเศษ", nick: "หมีพู" }, { id: "65030231", name: "นางสาววุฒิชัย อุ่นวิเศษ", nick: "วุฒิ" }, { id: "65030234", name: "นางสาวศศิกานต์ เจริญพันธ์", nick: "แพร์" }, { id: "65030242", name: "นายศิวกร คู่โนรัมย์", nick: "โอเว่น" }, { id: "65030249", name: "นายศุภาวุฒิ ไขดอน", nick: "เบต" }, { id: "65030272", name: "นางสาวอชิรญา ทิพกันทา", nick: "แทมมี่" }, { id: "65030273", name: "นางสาวอติกานต์ เกษแก้ว", nick: "เตย" }, { id: "65030280", name: "นางสาวอภิญญา ภัคศิริกุลวัฒน์", nick: "ตัง" }, { id: "65030282", name: "นางสาวอรกัญญา ปัญญา", nick: "มิก" }, { id: "65030286", name: "นางสาวอริสา ประทีป ณ ถลาง", nick: "ฟิล์ม" }, { id: "65030288", name: "นางสาวอังคณา ใบตะเห", nick: "ดาว" }, { id: "65030290", name: "นายอัฟนาน สาเม๊าะ", nick: "อัฟ" }, { id: "65030292", name: "นางสาวอาทิตยาม พริกเอียด", nick: "ณัฐ" }, { id: "65030295", name: "นางสาวอารียา สุขเหลือง", nick: "อ๋อม" }, { id: "65030298", name: "นายนราวิชญ์ สมันตกุล", nick: "บอส" },
        ];

        // --- State ---
        let user = null;
        let role = 'guest';
        let studentId = '';
        let config = { 
            projectName: 'Song Siang', 
            wordLimit: 50, 
            publicEnabled: true, 
            studentEnabled: true,
            submissionType: 'admin', 
            submissionTitle: 'อัดเสียงส่งงาน'
        };
        let currentView = 'login';
        let targetStudent = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let recordedBase64 = "";
        let isProcessingAudio = false;
        let recognition = null;
        let transcript = "";
        let timer = 0;
        let timerInterval = null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'song-siang-fa86e';

        const fbApp = initializeApp(firebaseConfig);
        const auth = getAuth(fbApp);
        const db = getFirestore(fbApp);
        const provider = new GoogleAuthProvider();

        const getSettingsDoc = () => doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'general');
        const getPublicCollection = (name) => collection(db, 'artifacts', appId, 'public', 'data', name);

        window.showModal = (title, message, type = 'info', onPrimary = null, showSecondary = false) => {
            const modal = document.getElementById('global-modal');
            const iconContainer = document.getElementById('modal-icon-container');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            iconContainer.className = "w-10 h-10 rounded-xl flex items-center justify-center mb-3 mx-auto " + 
                (type === 'error' ? 'bg-red-50 text-red-500' : type === 'success' ? 'bg-green-50 text-green-500' : 'bg-orange-50 text-orange-500');
            iconContainer.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : type === 'success' ? 'check-circle' : 'info'}" size="20"></i>`;
            document.getElementById('modal-primary-btn').onclick = () => { modal.classList.add('hidden'); if(onPrimary) onPrimary(); };
            const secondaryBtn = document.getElementById('modal-secondary-btn');
            secondaryBtn.classList.toggle('hidden', !showSecondary);
            secondaryBtn.onclick = () => modal.classList.add('hidden');
            modal.classList.remove('hidden');
            lucide.createIcons();
        };

        const initAuthFlow = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token).catch(() => signInAnonymously(auth));
                } else { await signInAnonymously(auth); }
            } catch (err) { console.error("Init failed"); }
        };

        onAuthStateChanged(auth, async (u) => {
            user = u;
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('views').classList.remove('hidden');

            if (u && !u.isAnonymous) {
                const email = u.email || "";
                if (email === "ie.architecture65@gmail.com") {
                    role = 'admin'; renderView('admin');
                } else if (email.endsWith('@kmitl.ac.th')) {
                    const prefix = email.split('@')[0];
                    if (STUDENT_LIST.some(s => s.id === prefix)) {
                        role = 'student'; studentId = prefix; renderView('home');
                    } else { await signOut(auth); showModal("Fail", "คุณไม่อยู่ในรายชื่อนักศึกษา", "error"); }
                } else { await signOut(auth); showModal("Fail", "จำกัดเฉพาะ KMITL หรือ Admin", "error"); }
                document.getElementById('main-header').classList.remove('hidden');
            } else {
                role = 'guest'; renderLogin();
                document.getElementById('main-header').classList.add('hidden');
                document.getElementById('student-nav').classList.add('hidden');
            }
            updateAuthUI();

            onSnapshot(getSettingsDoc(), (snap) => {
                if (snap.exists()) {
                    config = { ...config, ...snap.data() };
                    document.getElementById('display-project-name').innerText = config.projectName;
                    if (currentView === 'login') renderLogin();
                    if (currentView === 'admin') renderAdmin();
                }
            }, (err) => console.log("Settings permission issue (Expected before setup)"));
        });

        initAuthFlow();

        window.login = async () => { try { await signInWithPopup(auth, provider); } catch (e) { showModal("Error", e.message, "error"); } };
        window.loginAsPublic = () => { if (!config.publicEnabled) { showModal("Notice", "ระบบปิดชั่วคราว", "info"); return; } role = 'public'; renderHome(); };
        window.logout = () => showModal("ยืนยัน", "ออกจากระบบ?", "info", () => { signOut(auth).then(() => window.location.reload()); }, true);

        function updateAuthUI() {
            const container = document.getElementById('auth-status');
            if (user && !user.isAnonymous) {
                container.innerHTML = `<button onclick="logout()" class="p-1.5 text-slate-300 hover:text-red-500 bg-white rounded-lg shadow-sm border border-orange-50"><i data-lucide="log-out" size="14"></i></button>`;
            } else if (role === 'public') {
                container.innerHTML = `<button onclick="window.location.reload()" class="text-[7px] font-black text-slate-400 bg-white border border-slate-100 px-2.5 py-1 rounded-full flex items-center gap-1 italic-title uppercase">Portal <i data-lucide="log-out" size="8"></i></button>`;
            }
            lucide.createIcons();
        }

        window.renderView = (viewName) => {
            currentView = viewName;
            document.getElementById('student-nav').classList.toggle('hidden', role !== 'student');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('nav-active', b.dataset.view === viewName));
            if (viewName === 'home') renderHome();
            else if (viewName === 'record') renderRecord();
            else if (viewName === 'inbox') renderInbox();
            else if (viewName === 'admin') renderAdmin();
            lucide.createIcons();
        };

        function renderLogin() {
            currentView = 'login';
            document.getElementById('views').innerHTML = `
                <div class="flex flex-col items-center justify-center py-10 animate-in fade-in duration-700">
                    <div class="w-14 h-14 bg-orange-500 text-white rounded-2xl flex items-center justify-center shadow-lg mb-4 transform rotate-3"><i data-lucide="mic-vocal" size="28"></i></div>
                    <h2 class="text-2xl font-black text-slate-800 mb-1 italic-title uppercase text-center tracking-tighter leading-none">${config.projectName}</h2>
                    <p class="text-slate-300 text-[8px] font-black uppercase tracking-[0.4em] mb-8 italic-title">Classroom Portal</p>
                    <div class="w-full max-w-[200px] space-y-3">
                        <button onclick="login()" class="w-full bg-white border border-orange-100 p-2.5 rounded-xl flex items-center justify-center gap-3 shadow-sm active:scale-95 group">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="14">
                            <span class="font-black text-slate-700 text-[10px] uppercase tracking-widest italic-title leading-none">รหัส 65</span>
                        </button>
                        <button onclick="loginAsPublic()" class="w-full ${config.publicEnabled ? 'bg-orange-500 shadow-orange-100' : 'bg-slate-300'} text-white p-3 rounded-xl font-black text-[9px] uppercase tracking-widest flex items-center justify-center gap-3 active:scale-95 italic-title leading-none">
                            <i data-lucide="${config.publicEnabled ? 'send' : 'lock'}" size="12"></i> บุคคลทั่วไป
                        </button>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function renderHome() {
            const container = document.getElementById('views');
            if (role === 'admin') { renderAdmin(); return; }
            if (role === 'public') {
                container.innerHTML = `
                    <div class="space-y-3 animate-in fade-in duration-500 view-card">
                        <div class="orange-gradient rounded-2xl p-4 text-orange-900 border border-white">
                            <h2 class="text-lg font-black italic-title tracking-tighter uppercase leading-none">Voice Selection</h2>
                            <p class="text-orange-800/60 text-[8px] font-bold uppercase tracking-widest italic-title leading-none mt-1">ส่งเสียงความในใจถึงเพื่อน</p>
                        </div>
                        <button onclick="targetStudent={id:'Everyone', nick:'ทุกคนในห้อง'}; renderView('record')" class="w-full bg-white p-3.5 rounded-2xl border border-orange-100 flex items-center gap-3 group">
                            <div class="w-8 h-8 bg-orange-500 text-white rounded-lg flex items-center justify-center shadow-md"><i data-lucide="megaphone" size="14"></i></div>
                            <p class="font-black text-orange-900 text-sm italic-title uppercase tracking-tight italic leading-none">ทุกคนในห้อง</p>
                        </button>
                        <div class="grid grid-cols-2 gap-2" id="student-grid"></div>
                    </div>`;
                STUDENT_LIST.forEach(s => {
                    const btn = document.createElement('button');
                    btn.className = "bg-white p-3 rounded-2xl border border-slate-50 shadow-sm text-left";
                    btn.innerHTML = `<p class="text-[6px] text-slate-300 font-black mb-1 uppercase tracking-tighter leading-none">${s.id}</p><p class="font-black text-slate-700 italic text-xs italic-title leading-none italic">${s.nick}</p>`;
                    btn.onclick = () => { targetStudent = s; renderView('record'); };
                    document.getElementById('student-grid').appendChild(btn);
                });
            } else {
                container.innerHTML = `
                    <div class="space-y-3 animate-in fade-in duration-500 view-card">
                        <div class="bg-white p-5 rounded-3xl border border-orange-50 shadow-sm text-center">
                            <h2 class="text-lg font-black text-slate-800 italic-title uppercase leading-none">Hi, ${STUDENT_LIST.find(s=>s.id===studentId)?.nick || '65'}</h2>
                            <p class="text-slate-400 text-[7px] font-black uppercase tracking-[0.3em] mt-1 italic-title leading-none">Classroom Terminal</p>
                        </div>
                        <button onclick="handleRecordClick()" class="w-full bg-orange-500 text-white p-4 rounded-2xl flex items-center justify-between shadow-lg shadow-orange-100 group">
                            <div class="flex items-center gap-4"><div class="bg-white/20 p-2.5 rounded-lg"><i data-lucide="mic-vocal" size="18"></i></div><div><p class="font-black text-sm italic-title uppercase italic leading-none">${config.submissionTitle}</p></div></div>
                            <i data-lucide="chevron-right" size="18"></i>
                        </button>
                        <button onclick="renderView('inbox')" class="w-full bg-white border border-orange-100 p-4 rounded-2xl flex items-center justify-between shadow-sm group">
                            <div class="flex items-center gap-4"><div class="bg-orange-50 p-2.5 rounded-lg text-orange-400"><i data-lucide="mail" size="18"></i></div><div><p class="font-black text-sm italic-title uppercase text-slate-800 leading-none italic">Inbox</p></div></div>
                            <i data-lucide="chevron-right" size="18" class="text-slate-200"></i>
                        </button>
                    </div>`;
            }
            lucide.createIcons();
        }

        window.handleRecordClick = () => {
            if (config.submissionType === 'peer') { role = 'public'; renderHome(); }
            else { targetStudent = {id:'Admin', nick:'Admin'}; renderView('record'); }
        };

        function renderRecord() {
            transcript = ""; timer = 0; recordedBase64 = ""; isProcessingAudio = false;
            document.getElementById('views').innerHTML = `
                <div class="max-w-[280px] mx-auto space-y-4 animate-in slide-in-from-bottom-6 duration-700">
                    <div class="text-center space-y-1">
                        <h2 class="text-lg font-black text-slate-800 italic-title uppercase leading-none">${targetStudent ? `To: ${targetStudent.nick}` : 'Record'}</h2>
                        <p class="text-orange-500 text-[7px] font-black uppercase tracking-widest">${targetStudent?.id === 'Admin' ? `Limit: ${config.wordLimit} Words` : 'Open Heart'}</p>
                    </div>
                    <div class="bg-white p-6 rounded-[32px] shadow-xl border border-orange-50 flex flex-col items-center gap-6">
                        <div id="timer-display" class="text-4xl font-mono font-black text-slate-100 tracking-tighter leading-none italic-title">00:00</div>
                        <button id="record-btn" onclick="toggleRecording()" class="w-20 h-20 rounded-full bg-orange-500 flex items-center justify-center shadow-lg shadow-orange-100 hover:bg-orange-600 transition-all active:scale-90">
                            <i data-lucide="mic" id="mic-icon" size="28" class="text-white"></i>
                        </button>
                        <div id="status-text" class="text-slate-300 text-[7px] font-black uppercase tracking-widest italic-title leading-none italic">Tap to start</div>
                        <div id="recording-feedback" class="w-full space-y-3 hidden">
                             <div class="w-full bg-orange-50/20 p-3 rounded-xl border border-dashed border-orange-100 text-left">
                                <p id="transcript-preview" class="text-[10px] text-slate-600 italic-title min-h-[3rem] italic">"Waiting..."</p>
                                <div id="audio-preview-container" class="mt-2 hidden"><audio id="audio-preview-el" controls class="w-full h-7 opacity-80"></audio></div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="resetRecording()" class="flex-1 bg-slate-50 text-slate-400 py-2 rounded-lg font-black uppercase tracking-widest text-[8px] italic leading-none">Retry</button>
                                <button id="submit-btn" onclick="submitVoice()" class="flex-1 bg-orange-theme py-2 rounded-lg font-black shadow-md uppercase tracking-widest text-[8px] italic-title text-white italic">Submit</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        window.toggleRecording = async () => {
            const btn = document.getElementById('record-btn');
            const icon = document.getElementById('mic-icon');
            const timerEl = document.getElementById('timer-display');
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream); audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = async () => { 
                        isProcessingAudio = true;
                        const blob = new Blob(audioChunks, { type: 'audio/mp3' });
                        const audioUrl = URL.createObjectURL(blob);
                        document.getElementById('audio-preview-el').src = audioUrl;
                        document.getElementById('audio-preview-container').classList.remove('hidden');
                        const reader = new FileReader(); reader.readAsDataURL(blob);
                        reader.onloadend = () => { recordedBase64 = reader.result; isProcessingAudio = false; };
                    };
                    mediaRecorder.start();
                    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SR) {
                        recognition = new SR(); recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'th-TH';
                        recognition.onresult = (e) => {
                            let text = ""; for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
                            transcript = text;
                            const count = text.trim().split(/\s+/).filter(w => w.length > 0).length;
                            document.getElementById('transcript-preview').innerText = `"${text}"`;
                            const subBtn = document.getElementById('submit-btn');
                            if (targetStudent?.id === 'Admin' && count > config.wordLimit) { subBtn.disabled = true; subBtn.classList.add('opacity-50'); } 
                            else { subBtn.disabled = false; subBtn.classList.remove('opacity-50'); }
                        };
                        recognition.start();
                    }
                    btn.classList.add('recording-pulse', 'bg-red-500'); icon.setAttribute('data-lucide', 'square');
                    timerEl.classList.replace('text-slate-100', 'text-orange-500'); 
                    document.getElementById('status-text').innerText = "RECORDING";
                    timer = 0; timerInterval = setInterval(() => {
                        timer++; const m = Math.floor(timer/60).toString().padStart(2,'0'); const s = (timer%60).toString().padStart(2,'0');
                        timerEl.innerText = `${m}:${s}`;
                    }, 1000); lucide.createIcons();
                } catch (e) { showModal("Mic Error", "ไม่สามารถใช้ไมค์ได้", "error"); }
            } else {
                mediaRecorder.stop(); if(recognition) recognition.stop(); clearInterval(timerInterval);
                btn.classList.add('hidden'); document.getElementById('recording-feedback').classList.remove('hidden');
                document.getElementById('status-text').innerText = "REVIEW";
                timerEl.classList.replace('text-orange-500', 'text-slate-800'); lucide.createIcons();
            }
        };

        window.submitVoice = async () => {
            if (!user) return;
            if (isProcessingAudio) { showModal("Process", "กำลังแปลงไฟล์เสียง...", "info"); return; }
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = ".";
            try {
                const count = transcript.trim().split(/\s+/).filter(w => w.length > 0).length;
                const payload = {
                    from: studentId || "Guest",
                    fromName: user.isAnonymous ? "Guest" : user.displayName,
                    targetId: targetStudent ? targetStudent.id : "Admin",
                    timestamp: new Date().toISOString(),
                    transcript: transcript,
                    wordCount: count,
                    audioData: recordedBase64
                };
                if (role === 'student' && targetStudent?.id === 'Admin') {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'submissions', studentId), payload);
                } else { await addDoc(getPublicCollection('messages'), payload); }
                showModal("Sent!", "ส่งสำเร็จแล้ว", "success", () => renderView('home'));
            } catch (e) { showModal("Error", "ส่งไม่สำเร็จ", "error"); btn.disabled = false; btn.innerText = "Submit"; }
        };

        window.resetRecording = () => { if (mediaRecorder?.state !== 'inactive') mediaRecorder?.stop(); if(recognition) recognition.stop(); clearInterval(timerInterval); renderView('record'); };

        function renderInbox() {
            const container = document.getElementById('views');
            container.innerHTML = `<h2 class="text-xl font-black italic-title mb-4 text-slate-800 tracking-tighter uppercase text-left italic"><i data-lucide="mail" class="text-orange-500 inline mr-2"></i> Inbox</h2><div id="inbox-list" class="grid gap-3"></div>`;
            const q = query(getPublicCollection('messages'), where("targetId", "in", [studentId, "Everyone"]));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById('inbox-list');
                if(!list) return; list.innerHTML = "";
                if (snapshot.empty) { list.innerHTML = `<div class="bg-white p-8 rounded-2xl text-center text-slate-300 italic text-[8px]">No voices.</div>`; return; }
                snapshot.docs.forEach(d => {
                    const msg = d.data(); const isGlobal = msg.targetId === "Everyone";
                    const item = document.createElement('div');
                    item.className = `bg-white p-4 rounded-2xl border ${isGlobal ? 'border-orange-500 shadow-orange-100' : 'border-slate-50 shadow-sm'} text-left`;
                    item.innerHTML = `<div class="flex justify-between items-center mb-2"><span class="text-[7px] font-black ${isGlobal ? 'text-orange-600' : 'text-slate-300'} uppercase italic-title italic">${isGlobal ? 'Global' : 'Secret'}</span><span class="text-[6px] text-slate-300 font-black uppercase">${new Date(msg.timestamp).toLocaleDateString()}</span></div><p class="text-slate-600 italic-title mb-3 text-xs font-medium italic">"${msg.transcript}"</p><audio controls src="${msg.audioData}" class="w-full mb-1 h-8 opacity-80"></audio>`;
                    list.appendChild(item);
                });
                lucide.createIcons();
            });
        }

        function renderAdmin() {
            const container = document.getElementById('views');
            container.innerHTML = `
                <div class="space-y-4 text-left animate-in fade-in view-card">
                    <div class="bg-white p-5 rounded-3xl shadow-xl border border-orange-50">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-lg font-black italic-title text-orange-600 uppercase leading-none">Hub Admin</h2>
                            <button onclick="confirmReset()" class="text-[7px] font-black text-red-300 uppercase italic">Wipe</button>
                        </div>
                        <div class="grid gap-3 mb-5 text-left italic">
                            <div class="space-y-0.5"><label class="text-[7px] font-black text-slate-300 uppercase tracking-widest ml-2 uppercase leading-none italic">Title</label><input id="adm-p-name" type="text" oninput="config.projectName=this.value" value="${config.projectName}" class="compact-input italic"></div>
                            <div class="space-y-0.5"><label class="text-[7px] font-black text-slate-300 uppercase tracking-widest ml-2 uppercase leading-none italic">Words</label><input id="adm-word-limit" type="number" oninput="config.wordLimit=parseInt(this.value)" value="${config.wordLimit}" class="compact-input italic font-black text-base"></div>
                            <div class="space-y-0.5"><label class="text-[7px] font-black text-slate-300 uppercase tracking-widest ml-2 uppercase leading-none italic">Label</label><input id="adm-sub-title" type="text" oninput="config.submissionTitle=this.value" value="${config.submissionTitle}" class="compact-input italic"></div>
                            <div class="grid grid-cols-2 gap-2 mt-1">
                                <button onclick="config.publicEnabled=!config.publicEnabled; renderAdmin()" class="w-full ${config.publicEnabled ? 'bg-orange-500' : 'bg-slate-200'} text-white p-2 rounded-lg font-black text-[7px] uppercase shadow-sm italic">Public: ${config.publicEnabled?'On':'Off'}</button>
                                <button onclick="config.submissionType=config.submissionType==='admin'?'peer':'admin'; renderAdmin()" class="w-full bg-slate-800 text-white p-2 rounded-lg font-black text-[7px] uppercase shadow-sm italic">Type: ${config.submissionType}</button>
                            </div>
                        </div>
                        <button onclick="saveAdminSettings()" id="save-btn" class="w-full btn-orange py-2.5 rounded-xl font-black text-[9px] mb-2 uppercase tracking-widest shadow-lg italic">บันทึกค่า</button>
                        <button onclick="downloadAllAudio()" class="w-full bg-slate-100 text-slate-500 py-2 rounded-xl font-black uppercase text-[8px] italic flex items-center justify-center gap-1.5"><i data-lucide="download" size="10"></i> Download ZIP</button>
                    </div>
                    <div class="space-y-2 italic">
                        <h3 class="font-black text-slate-300 uppercase tracking-widest text-[7px] italic ml-2">Submissions</h3>
                        <div id="admin-submissions" class="grid gap-2"></div>
                    </div>
                </div>`;
            
            onSnapshot(getPublicCollection('submissions'), (snapshot) => {
                const subList = document.getElementById('admin-submissions');
                if(!subList) return; subList.innerHTML = ""; 
                snapshot.docs.forEach(d => {
                    const sub = d.data(); const item = document.createElement('div');
                    item.className = "bg-white p-3 rounded-2xl border border-orange-50 shadow-sm text-left";
                    item.innerHTML = `
                        <div class="flex justify-between items-center mb-2">
                            <div class="flex items-center gap-2">
                                <div class="w-7 h-7 bg-orange-50 rounded-lg flex items-center justify-center text-orange-500 font-black text-[9px] uppercase italic-title">${sub.from.slice(-2)}</div>
                                <div><p class="font-black text-slate-800 italic text-xs italic-title">${STUDENT_LIST.find(s=>s.id===sub.from)?.nick || sub.from}</p><p class="text-[6px] text-slate-300 uppercase">${sub.wordCount} words</p></div>
                            </div>
                            <button onclick="showModal('Transcript', '${sub.transcript.replace(/'/g, "\\'")}', 'info')" class="p-2 text-slate-200 hover:text-orange-500 bg-slate-50 rounded-lg"><i data-lucide="file-text" size="12"></i></button>
                        </div>
                        <audio controls src="${sub.audioData}" class="w-full h-7 opacity-80 rounded-full"></audio>`;
                    subList.appendChild(item);
                });
                lucide.createIcons();
            });
        }

        window.saveAdminSettings = async () => {
            if (!user) return;
            const btn = document.getElementById('save-btn'); btn.disabled = true; btn.innerText = ".";
            try { 
                await setDoc(getSettingsDoc(), {
                    projectName: config.projectName || 'Song Siang',
                    wordLimit: config.wordLimit || 50,
                    publicEnabled: config.publicEnabled,
                    submissionType: config.submissionType,
                    submissionTitle: config.submissionTitle || 'อัดเสียงส่งงาน'
                }, { merge: true }); 
                showModal("Success", "บันทึกค่าลงระบบเรียบร้อย", "success");
            } catch (e) { console.error(e); showModal("Error", "ล้มเหลว: " + e.message, "error"); }
            btn.disabled = false; btn.innerText = "บันทึกค่า";
        };

        window.downloadAllAudio = async () => {
            showModal("Wait", "กำลังรวบรวมไฟล์เสียง...", "info");
            const zip = new JSZip();
            const snapshot = await getDocs(getPublicCollection('submissions'));
            if(snapshot.empty) { showModal("Fail", "ไม่มีข้อมูล", "error"); return; }
            snapshot.docs.forEach(doc => {
                const data = doc.data();
                if(data.audioData) {
                    const student = STUDENT_LIST.find(s => s.id === data.from);
                    const fileName = `${data.from}_${student ? student.nick : 'user'}.mp3`;
                    const base64Data = data.audioData.split(',')[1];
                    zip.file(fileName, base64Data, {base64: true});
                }
            });
            zip.generateAsync({type:"blob"}).then(c => { saveAs(c, "Room65_Voices.zip"); showModal("Complete", "ดาวน์โหลดสำเร็จ", "success"); });
        };

        window.confirmReset = () => {
            showModal("Danger", "ล้างข้อมูลทั้งหมด?", "error", async () => {
                try {
                    const subs = await getDocs(getPublicCollection('submissions'));
                    const msgs = await getDocs(getPublicCollection('messages'));
                    await Promise.all([...subs.docs.map(d => deleteDoc(d.ref)), ...msgs.docs.map(d => deleteDoc(d.ref))]);
                    showModal("Wiped", "ล้างข้อมูลสำเร็จ", "success");
                } catch(e) { showModal("Fail", "ล้มเหลว", "error"); }
            }, true);
        };
    </script>
</body>
</html>
