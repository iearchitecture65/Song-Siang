            <button onclick="renderView('record')" class="nav-btn flex flex-col items-center gap-1 text-slate-400" data-view="record">
                <i data-lucide="mic-2" size="20"></i>

            <button onclick="renderView('inbox')" class="nav-btn flex flex-col items-center gap-1 text-slate-400" data-view="inbox">

        let targetStudent = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let recognition = null;
        let transcript = "";
        let timer = 0;
        let timerInterval = null;

        // --- Initialize ---
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Listen for Global Settings
        onSnapshot(doc(db, "settings", "general"), (doc) => {
            if (doc.exists()) {
                wordLimit = doc.data().wordLimit || 50;
                publicEnabled = doc.data().publicEnabled !== undefined ? doc.data().publicEnabled : true;
                if (currentView === 'login') renderLogin();
            }
        });

        // Auth Listener
        onAuthStateChanged(auth, async (u) => {
            user = u;
            if (u && !u.isAnonymous) {
                const email = u.email || "";
                
                // Admin Special Case
                if (email === "ie.architecture65@gmail.com") {
                    role = 'admin';
                    document.getElementById('main-header').classList.remove('hidden');
                    renderView('admin');
                } 
                // Student Domain Check
                else if (email.endsWith('@kmitl.ac.th')) {
                    const prefix = email.split('@')[0];
                    if (STUDENT_LIST.some(s => s.id === prefix)) {
                        role = 'student';
                        studentId = prefix;
                        document.getElementById('main-header').classList.remove('hidden');
                        renderView('home');
                    } else {
                        await signOut(auth);
                        showAuthError("ขออภัยครับ รหัสนักศึกษาของคุณไม่มีในรายชื่อห้องเรียนนี้");
                    }
                } 
                // Forbidden Email
                else {
                    await signOut(auth);
                    showAuthError("ระบบอนุญาตเฉพาะอีเมล @kmitl.ac.th สำหรับนักศึกษา หรืออีเมลแอดมินเท่านั้น");
                }
            } else if (u && u.isAnonymous) {
                role = 'public';
                document.getElementById('main-header').classList.remove('hidden');
                renderView('home');
            } else {
                role = 'guest';
                document.getElementById('main-header').classList.add('hidden');
                document.getElementById('student-nav').classList.add('hidden');
                renderLogin();
            }
            updateAuthUI();
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('views').classList.remove('hidden');
        });

        // --- Core Functions ---

            try {
                await signInWithPopup(auth, provider);
            } catch (err) {
                showAuthError("เกิดข้อผิดพลาดในการเข้าสู่ระบบ: " + err.message);
            }
        };

        window.loginAsPublic = async () => {
            if (!publicEnabled) {
                showAuthError("ขออภัยครับ ระบบส่งเสียงสำหรับบุคคลทั่วไปถูกปิดโดยแอดมิน");
                return;
            }
            try {
                await signInAnonymously(auth);
            } catch (err) {
                showAuthError("ไม่สามารถเข้าถึงระบบบุคคลทั่วไปได้: " + err.message);
            }

                            <i data-lucide="log-out" size="20"></i>

                    </div>

                        <button onclick="logout()" class="p-2 text-slate-400 hover:text-red-500 transition-colors">

                        <div class="bg-white p-10 rounded-[48px] border border-slate-100 shadow-sm text-center">
                            <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-3xl mx-auto flex items-center justify-center mb-4">
                                <i data-lucide="sparkles" size="40"></i>
                            </div>
                            <h2 class="text-2xl font-black text-slate-800 tracking-tighter">HELLO, ${studentId}</h2>
                            <p class="text-slate-400 mt-1">วันนี้คุณพร้อมส่งคลิปเสียงสำหรับวิชานี้หรือยัง?</p>
                        </div>
                        <div class="grid gap-4">
                            <button onclick="renderView('record')" class="bg-indigo-600 text-white p-8 rounded-[40px] flex items-center justify-between shadow-xl shadow-indigo-100 hover:scale-[1.02] transition-transform group">
                                <div class="flex items-center gap-5">
                                    <div class="bg-indigo-500 p-4 rounded-2xl group-hover:rotate-12 transition-transform"><i data-lucide="mic-2"></i></div>
                                    <div class="text-left">
                                        <p class="font-black text-xl italic tracking-tighter leading-none">อัดเสียงส่งงาน</p>
                                        <p class="text-xs text-indigo-100 opacity-80 mt-2 font-bold uppercase tracking-widest">Classroom Video Submission</p>
                                    </div>
                                </div>
                                <i data-lucide="chevron-right"></i>
                            </button>
                            <button onclick="renderView('inbox')" class="bg-white border border-slate-200 p-8 rounded-[40px] flex items-center justify-between hover:border-indigo-300 transition-all group">
                                <div class="flex items-center gap-5">
                                    <div class="bg-slate-50 p-4 rounded-2xl text-slate-600 group-hover:scale-110 transition-transform"><i data-lucide="inbox"></i></div>
                                    <div class="text-left text-slate-800">
                                        <p class="font-black text-xl italic tracking-tighter leading-none">กล่องเสียงจากเพื่อน</p>
                                        <p class="text-xs text-slate-400 mt-2 font-bold uppercase tracking-widest">Public Messages Inbox</p>
                                    </div>
                                </div>
                                <i data-lucide="chevron-right"></i>
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        function renderRecord() {
            const container = document.getElementById('views');
            transcript = "";
            timer = 0;
            const currentTarget = targetStudent;

            container.innerHTML = `
                <div class="max-w-md mx-auto space-y-8 animate-in slide-in-from-bottom-8 duration-500">
                    <div class="text-center space-y-2">
                        <h2 class="text-3xl font-black text-indigo-900 italic">${currentTarget ? `ส่งถึง: ${currentTarget.nick}` : 'อัดเสียงส่งงาน'}</h2>
                        <p class="text-slate-400 text-sm font-bold uppercase tracking-widest">
                            ${currentTarget ? 'TALK YOUR HEART OUT' : `LIMIT: ${wordLimit} WORDS`}
                        </p>
                    </div>

                    <div class="bg-white p-10 rounded-[56px] shadow-2xl border border-slate-100 flex flex-col items-center gap-8">
                        <div id="timer-display" class="text-6xl font-mono font-bold text-slate-200 tracking-tighter">00:00</div>
                        
                        <div class="relative">
                            <button id="record-btn" onclick="toggleRecording()" class="w-32 h-32 rounded-full bg-indigo-600 flex items-center justify-center shadow-2xl shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-90">
                                <i data-lucide="mic" id="mic-icon" size="48" class="text-white"></i>
                            </button>
                        </div>

                        <div id="status-text" class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em]">Press to start talking</div>

                        <div id="recording-feedback" class="w-full space-y-4 hidden">
                             <div class="w-full bg-slate-50 p-6 rounded-[32px] border border-dashed border-slate-200 text-left">
                                <div class="flex justify-between items-center mb-3">
                                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">AI Transcript</span>
                                    <span id="word-count-badge" class="text-xs font-bold px-3 py-1 rounded-full bg-indigo-100 text-indigo-600">0 / ${currentTarget ? '∞' : wordLimit} คำ</span>
                                </div>
                                <p id="transcript-preview" class="text-sm text-slate-600 italic leading-relaxed min-h-[4rem] line-clamp-3">"รอรับเสียง..."</p>
                            </div>
                            <div class="flex gap-2 pt-2">
                                <button onclick="resetRecording()" class="flex-1 bg-slate-100 py-4 rounded-3xl font-bold text-slate-500 hover:bg-slate-200 transition-all">ยกเลิก</button>
                                <button id="submit-btn" onclick="submitVoice()" class="flex-1 bg-green-500 py-4 rounded-3xl font-bold text-white shadow-lg shadow-green-100 hover:bg-green-600 transition-all">ส่งเสียง</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        window.toggleRecording = async () => {
            const btn = document.getElementById('record-btn');
            const icon = document.getElementById('mic-icon');
            const status = document.getElementById('status-text');
            const feedback = document.getElementById('recording-feedback');
            const timerEl = document.getElementById('timer-display');

            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.start();

                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRecognition) {
                        recognition = new SpeechRecognition();
                        recognition.continuous = true;
                        recognition.interimResults = true;
                        recognition.lang = 'th-TH';
                        recognition.onresult = (e) => {
                            let text = "";
                            for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
                            transcript = text;
                            const count = text.trim().split(/\s+/).filter(w => w.length > 0).length;
                            document.getElementById('transcript-preview').innerText = `"${text}"`;
                            const badge = document.getElementById('word-count-badge');
                            badge.innerText = `${count} / ${targetStudent ? '∞' : wordLimit} คำ`;
                            
                            const submitBtn = document.getElementById('submit-btn');
                            if (!targetStudent && count > wordLimit) {
                                badge.className = 'text-xs font-bold px-3 py-1 rounded-full bg-red-100 text-red-600';
                                submitBtn.disabled = true;
                                submitBtn.classList.add('opacity-50', 'grayscale');
                            } else {
                                badge.className = 'text-xs font-bold px-3 py-1 rounded-full bg-indigo-100 text-indigo-600';
                                submitBtn.disabled = false;
                                submitBtn.classList.remove('opacity-50', 'grayscale');
                            }
                        };
                        recognition.start();
                    }

                    btn.classList.add('recording-pulse', 'bg-red-500');
                    btn.classList.remove('bg-indigo-600');
                    timerEl.classList.replace('text-slate-200', 'text-red-500');
                    status.innerText = "RECORDING IN PROGRESS...";
                    icon.setAttribute('data-lucide', 'square');
                    lucide.createIcons();

                    timer = 0;
                    timerInterval = setInterval(() => {
                        timer++;
                        const m = Math.floor(timer / 60).toString().padStart(2, '0');
                        const s = (timer % 60).toString().padStart(2, '0');
                        timerEl.innerText = `${m}:${s}`;
                    }, 1000);

                } catch (err) { showAuthError("ไมโครโฟนถูกปฏิเสธ: " + err.message); }
            } else {
                mediaRecorder.stop();
                recognition?.stop();
                clearInterval(timerInterval);
                btn.classList.add('hidden');
                feedback.classList.remove('hidden');
                status.innerText = "CHECK & SEND YOUR MESSAGE";
                timerEl.classList.replace('text-red-500', 'text-slate-800');
                icon.setAttribute('data-lucide', 'mic');
                lucide.createIcons();
            }
        };

        window.submitVoice = async () => {
            const btn = document.getElementById('submit-btn');
            if (!user) return;
            btn.disabled = true;
            btn.innerText = "SENDING...";

            try {
                const count = transcript.trim().split(/\s+/).filter(w => w.length > 0).length;
                const payload = {
                    from: studentId || (user.isAnonymous ? "Guest" : user.displayName),
                    targetId: targetStudent ? targetStudent.id : "Admin",
                    timestamp: new Date().toISOString(),
                    wordCount: count,
                    transcript: transcript,
                    driveUrl: "https://drive.google.com/drive/folders/" + serviceAccountMeta.folderId,
                    fileName: `voice_${Date.now()}.mp3`
                };

                if (role === 'student' && !targetStudent) {
                    await setDoc(doc(db, "submissions", studentId), payload);
                } else {
                    await addDoc(collection(db, "messages"), payload);
                }

                document.getElementById('views').innerHTML = `
                    <div class="text-center py-20 space-y-6 animate-in zoom-in duration-500">
                        <div class="w-24 h-24 bg-green-100 text-green-600 rounded-[32px] mx-auto flex items-center justify-center">
                            <i data-lucide="check" size="48"></i>
                        </div>
                        <h2 class="text-3xl font-black text-slate-800 tracking-tighter italic">MESSAGE SENT!</h2>
                        <p class="text-slate-400 font-medium">บันทึกข้อมูลเข้าระบบเรียบร้อยแล้ว</p>
                        <button onclick="renderView('home')" class="bg-indigo-600 text-white px-10 py-4 rounded-3xl font-bold shadow-lg shadow-indigo-100">BACK HOME</button>
                    </div>
                `;
                lucide.createIcons();
                targetStudent = null;
            } catch (e) {
                showAuthError("เกิดข้อผิดพลาดในการบันทึก: " + e.message);
                btn.disabled = false;
                btn.innerText = "ส่งเสียง";
            }
        };

        window.resetRecording = () => {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            recognition?.stop();
            clearInterval(timerInterval);
            renderView('record');
        };

        function renderInbox() {
            const container = document.getElementById('views');
            if (!user || role !== 'student') { renderView('home'); return; }

            container.innerHTML = `
                <div class="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <h2 class="text-2xl font-black text-slate-800 flex items-center gap-3 italic tracking-tighter">
                        <i data-lucide="mail" class="text-indigo-600"></i> INBOX
                    </h2>
                    <div id="inbox-list" class="grid gap-4">
                        <div class="flex justify-center py-20"><div class="w-8 h-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div></div>
                    </div>
                </div>
            `;
            const list = document.getElementById('inbox-list');
            const q = query(collection(db, "messages"), where("targetId", "in", [studentId, "Everyone"]));
            
            onSnapshot(q, (snapshot) => {
                list.innerHTML = "";
                if (snapshot.empty) {
                    list.innerHTML = `<div class="bg-white p-12 rounded-[48px] text-center border border-slate-100 text-slate-400 font-medium italic">ยังไม่มีใครส่งเสียงหาคุณในตอนนี้</div>`;
                    return;
                }
                snapshot.docs.forEach(d => {
                    const msg = d.data();
                    const isGlobal = msg.targetId === "Everyone";
                    const item = document.createElement('div');
                    item.className = `bg-white p-6 rounded-[36px] shadow-sm border ${isGlobal ? 'border-indigo-200' : 'border-slate-100'} space-y-4 text-left`;
                    item.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-[10px] font-bold ${isGlobal ? 'text-indigo-600' : 'text-slate-400'} uppercase tracking-widest">${isGlobal ? 'GLOBAL MESSAGE' : 'PRIVATE MESSAGE'}</p>
                                <p class="text-[10px] text-slate-300 font-medium">${new Date(msg.timestamp).toLocaleString('th-TH')}</p>
                            </div>
                        </div>
                        <p class="text-sm text-slate-600 italic leading-relaxed">"${msg.transcript}"</p>
                        <a href="${msg.driveUrl}" target="_blank" class="inline-flex items-center gap-2 text-indigo-600 text-xs font-bold bg-indigo-50 px-3 py-2 rounded-xl">
                            <i data-lucide="play-circle" size="16"></i> LISTEN AUDIO
                        </a>
                    `;
                    list.appendChild(item);
                });
                lucide.createIcons();
            });
        }

        function renderAdmin() {
            const container = document.getElementById('views');
            if (role !== 'admin') { renderView('home'); return; }

            container.innerHTML = `
                <div class="space-y-10 animate-in fade-in slide-in-from-bottom-4 duration-500 text-left">
                    <div class="bg-white p-8 rounded-[48px] shadow-xl border border-indigo-50 space-y-8">
                        <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-3 tracking-tighter italic">
                            <i data-lucide="settings" class="text-indigo-600"></i> ADMIN PANEL
                        </h2>
                        
                        <div class="grid sm:grid-cols-2 gap-8">
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Word Limit (Student)</label>
                                <input id="word-limit-input" type="number" value="${wordLimit}" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-[24px] focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-black text-2xl tracking-tighter italic">
                            </div>
                            
                            <div class="space-y-2 flex flex-col justify-end">
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Public Access (Guest Mode)</label>
                                <button onclick="togglePublicAccess()" id="public-toggle-btn" class="w-full ${publicEnabled ? 'bg-green-500 shadow-green-100' : 'bg-red-500 shadow-red-100'} text-white p-4 rounded-[24px] font-bold flex items-center justify-between px-6 shadow-lg transition-all">
                                    <span>${publicEnabled ? 'เปิดใช้งานอยู่' : 'ปิดใช้งานอยู่'}</span>
                                    <i data-lucide="${publicEnabled ? 'check-circle' : 'x-circle'}"></i>
                                </button>
                            </div>
                        </div>

                        <button onclick="saveAdminSettings()" id="save-settings-btn" class="w-full bg-indigo-600 text-white py-5 rounded-[28px] font-bold shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-95">UPDATE SETTINGS</button>
                    </div>

                    <div class="space-y-4 text-left">
                        <h3 class="text-lg font-bold text-slate-700 uppercase tracking-tighter flex items-center gap-2 ml-2">
                             <i data-lucide="layout-list" size="20"></i> STUDENT SUBMISSIONS
                        </h3>
                        <div id="admin-submissions" class="grid gap-3"></div>
                    </div>
                </div>
            `;
            
            const subList = document.getElementById('admin-submissions');
            onSnapshot(collection(db, "submissions"), (snapshot) => {
                subList.innerHTML = "";
                if (snapshot.empty) {
                    subList.innerHTML = `<div class="text-center py-10 text-slate-300 text-sm italic">No submissions yet</div>`;
                    return;
                }
                snapshot.docs.forEach(d => {
                    const sub = d.data();
                    const sInfo = STUDENT_LIST.find(s => s.id === sub.from);
                    const item = document.createElement('div');
                    item.className = "bg-white p-5 rounded-[36px] border border-slate-100 shadow-sm flex flex-col sm:flex-row justify-between items-center gap-4 text-left";
                    item.innerHTML = `
                        <div class="flex items-center gap-4 w-full text-left">
                            <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 font-bold text-xs">${sub.from.slice(-2)}</div>
                            <div class="flex-1">
                                <p class="font-bold text-slate-800">${sInfo ? sInfo.nick : sub.from}</p>
                                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">${sub.wordCount} words | ${sub.from}</p>
                            </div>
                        </div>
                        <a href="${sub.driveUrl}" target="_blank" class="w-full sm:w-auto bg-slate-100 hover:bg-indigo-100 text-slate-600 hover:text-indigo-600 px-6 py-2.5 rounded-2xl text-xs font-bold transition-all text-center">Open Drive</a>
                    `;
                    subList.appendChild(item);
                });
                lucide.createIcons();
            });
            lucide.createIcons();
        }

        window.togglePublicAccess = () => {
            publicEnabled = !publicEnabled;
            renderAdmin(); // Re-render locally to show change
        };

        window.saveAdminSettings = async () => {
            if (!user || role !== 'admin') return;
            const btn = document.getElementById('save-settings-btn');
            const val = document.getElementById('word-limit-input').value;
            btn.disabled = true;
            btn.innerText = "UPDATING...";
            try {
                await setDoc(doc(db, "settings", "general"), { 
                    wordLimit: parseInt(val),
                    publicEnabled: publicEnabled
                });
                alert("บันทึกการตั้งค่าทั้งหมดเรียบร้อยแล้ว!");
            } catch (e) { showAuthError("บันทึกไม่สำเร็จ: " + e.message); }
            btn.disabled = false;
            btn.innerText = "UPDATE SETTINGS";
        };

        window.closeErrorModal = () => {
            document.getElementById('error-modal').classList.add('hidden');
        };

        function showAuthError(msg) {
            document.getElementById('error-message').innerHTML = msg;
            document.getElementById('error-modal').classList.remove('hidden');
            lucide.createIcons();
        }

    </script>
</body>
</html>
