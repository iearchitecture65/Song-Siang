            init: async function() {
                try {
                    await signInAnonymously(auth);
                    const savedProfile = localStorage.getItem('songSiangProfile');
                    if (savedProfile) {
                        this.profile = JSON.parse(savedProfile);
                        this.showView('home');
                        this.setupMessagesListener();
                    } else {
                        this.showView('login');
                    }
                } catch (e) {
                    console.error("Auth error:", e);
                }

                this.currentView = viewName;
                const root = document.getElementById('appRoot');
                const nav = document.getElementById('navMenu');
                
                if(this.profile) nav.classList.remove('hidden');
                else nav.classList.add('hidden');

                if(viewName === 'login') root.innerHTML = this.renderLogin1();
                else if(viewName === 'home') root.innerHTML = this.renderHome();
                else if(viewName === 'compose') root.innerHTML = this.renderCompose();
                else if(viewName === 'inbox') root.innerHTML = this.renderInbox();
            },

            loginSuccess: function(userProfile) {
                this.profile = userProfile;
                localStorage.setItem('songSiangProfile', JSON.stringify(userProfile));
                this.setupMessagesListener();
                Swal.fire({
                    icon: 'success',
                    title: `ยินดีต้อนรับ ${userProfile.name}!`,

                    background: '#fff',
                    color: '#2b71b8'

                    confirmButtonColor: '#d33',

                        this.profile = null;
                        localStorage.removeItem('songSiangProfile');
                        if(this.unsubscribeMsgs) this.unsubscribeMsgs();
                        this.showView('login');
                    }
                });
            },

            setupMessagesListener: function() {
                if(this.unsubscribeMsgs) this.unsubscribeMsgs();
                if(!this.profile) return;

                const msgsRef = collection(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages');
                this.unsubscribeMsgs = onSnapshot(msgsRef, (snapshot) => {
                    const allMsgs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const myMsgs = allMsgs.filter(msg => this.profile.isAdmin || msg.to.includes(this.profile.studentId));
                    myMsgs.sort((a, b) => b.timestamp - a.timestamp);
                    this.messages = myMsgs;
                    
                    if(this.currentView === 'inbox') this.showView('inbox'); // re-render
                });
            },

                        </button>
                    </div>
                </div>`;
            },

            requestOTP: async function() {
                const idInput = document.getElementById('inputId').value.replace(/[^0-9]/g, '');
                if(idInput.length !== 8) return Swal.fire('แจ้งเตือน', 'กรุณากรอกรหัสนักศึกษาให้ครบ 8 หลัก', 'warning');
                
                // Admin Bypass
                if(idInput === '65030900') {
                    return this.loginSuccess({ studentId: '65030900', fullName: 'ผู้ดูแลระบบ', name: 'Admin', isPredefined: true, isAdmin: true });
                }

                this.tempStudentId = idInput;
                const btn = document.getElementById('btnReqOTP');
                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> กำลังส่งรหัส...';
                btn.disabled = true;

                const generatedOtp = Math.floor(100000 + Math.random() * 900000).toString();
                const targetEmail = `${idInput}@kmitl.ac.th`;
                
                // สร้างรหัสอ้างอิง (Ref) สุ่ม 6 ตัวอักษร
                const refCode = Math.random().toString(36).substring(2, 8).toUpperCase();
                this.currentRef = refCode;

                try {
                    // แนบ ref ไปกับ URL ด้วย
                    const response = await fetch(`${APPS_SCRIPT_URL}?email=${encodeURIComponent(targetEmail)}&otp=${generatedOtp}&ref=${refCode}`);
                    const result = await response.json();
                    
                    if(result.status === 'success') {
                        this.actualOtp = generatedOtp;
                        document.getElementById('appRoot').innerHTML = this.renderLogin2();
                        setTimeout(() => document.getElementById('otp-0').focus(), 100);
                    } else {
                        Swal.fire('ข้อผิดพลาด', result.message, 'error');
                        btn.innerHTML = 'รับรหัสยืนยันผ่านอีเมล <i class="fa-solid fa-arrow-right ml-2"></i>';
                        btn.disabled = false;
                    }
                } catch(e) {
                    Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ส่งอีเมลได้', 'error');
                    btn.innerHTML = 'รับรหัสยืนยันผ่านอีเมล <i class="fa-solid fa-arrow-right ml-2"></i>';
                    btn.disabled = false;
                }
            },

                    </div>
                    <div class="p-8 space-y-6">
                        <div class="text-center">
                            <p class="text-sm text-gray-500">รหัสถูกส่งไปยังอีเมลสถาบันแล้ว</p>
                            <p class="font-bold text-lg text-primary mt-1">${this.tempStudentId}@kmitl.ac.th</p>
                            <div class="mt-3 mb-1 inline-block bg-blue-50 border border-blue-100 text-blue-700 px-3 py-1.5 rounded-full text-xs font-bold tracking-wider shadow-sm">
                                <i class="fa-solid fa-hashtag mr-1"></i> Ref: ${this.currentRef}
                            </div>
                            <p class="text-xs text-gray-400 mt-2"><i class="fa-solid fa-circle-info"></i> โปรดตรวจสอบในโฟลเดอร์สแปมด้วย</p>
                        </div>
                        <div class="flex justify-between gap-2 px-2" id="otpContainer">${inputs}</div>
                        <button onclick="app.showView('login')" class="w-full py-3 text-sm font-medium text-gray-400 hover:text-primary transition-colors">
                            <i class="fa-solid fa-rotate-left"></i> เปลี่ยนรหัสนักศึกษา
                        </button>
                    </div>
                </div>`;
            },

            onOtpInput: function(el, index) {
                if(isNaN(el.value)) { el.value = ""; return; }
                if(el.value !== "" && index < 5) document.getElementById(`otp-${index+1}`).focus();
                this.checkFullOtp();
            },
            onOtpKeydown: function(e, index) {
                if(e.key === "Backspace" && e.target.value === "" && index > 0) {
                    document.getElementById(`otp-${index-1}`).focus();
                }
            },
            checkFullOtp: function() {
                let currentOtp = "";
                for(let i=0; i<6; i++) currentOtp += document.getElementById(`otp-${i}`).value;
                if(currentOtp.length === 6) {
                    if(currentOtp === this.actualOtp) {
                        const existingUser = predefinedUsers.find(u => u.studentId === this.tempStudentId);
                        if(existingUser) this.loginSuccess(existingUser);
                        else document.getElementById('appRoot').innerHTML = this.renderLogin3();
                    } else {
                        Swal.fire('ไม่ถูกต้อง', 'รหัส OTP ไม่ถูกต้อง กรุณาลองใหม่', 'error');
                        for(let i=0; i<6; i++) document.getElementById(`otp-${i}`).value = '';
                        document.getElementById('otp-0').focus();
                    }
                }
            },

            renderLogin3: function() {
                return `
                <div class="max-w-md mx-auto glass-card rounded-[2rem] overflow-hidden mt-10 animate-fade-in border border-white/40">
                    <div class="p-8 text-center bg-secondary relative">
                        <div class="absolute inset-0 bg-gradient-to-b from-white/30 to-transparent"></div>
                        <h2 class="text-3xl font-extrabold text-primary relative z-10 drop-shadow-sm">ยินดีต้อนรับ</h2>
                    </div>
                    <div class="p-8 space-y-6">
                        <div class="bg-blue-50/50 p-5 rounded-2xl text-sm text-primary text-center border border-blue-100 shadow-inner">
                            <span class="text-3xl block mb-2 animate-bounce">👋</span>
                            ดูเหมือนคุณจะเป็นรุ่นน้อง หรือผู้ใช้ใหม่ <br/>แนะนำตัวให้พวกเราหน่อยครับ!
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-2 pl-1">ชื่อเล่น / ชื่อเรียก</label>
                            <input type="text" id="inputNewName" placeholder="กรอกชื่อของคุณ..." 
                                class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-2 border-gray-100 focus:bg-white focus:border-secondary focus:ring-4 focus:ring-secondary/30 transition-all outline-none text-lg"
                                onkeypress="if(event.key === 'Enter') app.registerNewUser()">
                        </div>
                        <button onclick="app.registerNewUser()" 
                            class="w-full py-4 bg-secondary hover:bg-yellow-400 text-primary rounded-2xl font-bold text-lg shadow-[0_10px_20px_rgba(253,223,49,0.3)] transition-all transform hover:-translate-y-1">
                            เริ่มต้นใช้งาน <i class="fa-solid fa-rocket ml-2"></i>
                        </button>
                    </div>
                </div>`;
            },
            registerNewUser: function() {
                const name = document.getElementById('inputNewName').value.trim();
                if(!name) return Swal.fire('แจ้งเตือน', 'กรุณากรอกชื่อของคุณ', 'warning');
                this.loginSuccess({ studentId: this.tempStudentId, name: name, isPredefined: false });
            },

            // ==========================================
            // HOME / GRID FLOW
            // ==========================================
            toggleUser: function(id) {
                const idx = this.selectedIds.indexOf(id);
                if(idx > -1) this.selectedIds.splice(idx, 1);
                else this.selectedIds.push(id);
                this.showView('home'); // re-render fast enough for vanilla
            },
            selectAllUsers: function() {
                if(this.selectedIds.length === predefinedUsers.length) this.selectedIds = [];
                else this.selectedIds = predefinedUsers.map(u => u.studentId);
                this.showView('home');
            },

            renderHome: function() {
                let gridHTML = '';
                predefinedUsers.forEach(user => {
                    const isSelected = this.selectedIds.includes(user.studentId);
                    const imgUrl = `${GITHUB_IMG_BASE_URL}/${user.id}.png`;
                    
                    gridHTML += `
                    <div class="flex flex-col items-center animate-fade-in user-card ${isSelected ? 'user-selected' : ''}" style="animation-delay: ${user.id * 15}ms">
                        <button onclick="app.toggleUser('${user.studentId}')"
                            class="relative w-16 h-16 md:w-20 md:h-20 rounded-full shadow-lg flex items-center justify-center text-primary font-bold text-xl bg-secondary user-avatar border-4 border-transparent overflow-hidden group">
                            
                            <!-- รูปภาพดึงจาก Github -->
                            <img src="${imgUrl}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" 
                                 class="w-full h-full object-cover rounded-full absolute inset-0 z-0" alt="${user.name}">
                            
                            <!-- Fallback ถ้าไม่มีรูป -->
                            <span class="relative z-10 hidden">${user.name.substring(0, 2)}</span>
                            
                            <!-- Overlay ตอนโฮเวอร์ -->
                            <div class="absolute inset-0 bg-primary/20 opacity-0 group-hover:opacity-100 transition-opacity z-10"></div>
                            
                            ${isSelected ? `<div class="absolute -top-1 -right-1 bg-green-500 text-white rounded-full p-1 border-2 border-white z-20 shadow-md transform scale-110"><i class="fa-solid fa-check text-xs"></i></div>` : ''}
                        </button>
                        <span class="text-white text-xs mt-2 font-medium bg-black/40 px-3 py-1 rounded-full backdrop-blur-md border border-white/10 shadow-sm">
                            ${user.name}
                        </span>
                    </div>`;
                });

                const fabHTML = this.selectedIds.length > 0 ? `
                    <div class="fixed bottom-8 left-0 right-0 flex justify-center z-50 animate-bounce">
                        <button onclick="app.showView('compose')" class="bg-secondary hover:bg-yellow-400 text-primary px-8 py-4 rounded-full font-extrabold shadow-[0_10px_30px_rgba(253,223,49,0.5)] flex items-center space-x-3 text-lg border-4 border-white/50 backdrop-blur-md transform transition hover:scale-105">
                            <i class="fa-solid fa-paper-plane text-xl"></i>
                            <span>ส่งข้อความหา ${this.selectedIds.length} คน</span>
                        </button>
                    </div>
                ` : '';

                return `
                <div class="animate-fade-in pb-24">
                    <div class="flex justify-between items-end mb-8 text-white glass-panel p-6 rounded-3xl border-t border-l border-white/20">
                        <div>
                            <h2 class="text-3xl font-bold drop-shadow-md">สวัสดี, ${this.profile.name} <span class="animate-pulse inline-block">👋</span></h2>
                            <p class="text-blue-100 mt-1 opacity-90 font-light">เลือกคนที่คุณต้องการส่งเสียงถึงได้เลย</p>
                        </div>
                        <button onclick="app.selectAllUsers()" class="bg-white/10 hover:bg-white/20 backdrop-blur border border-white/30 px-5 py-2.5 rounded-full text-sm font-medium transition shadow-lg flex items-center">
                            <i class="fa-solid fa-users mr-2"></i> 
                            ${this.selectedIds.length === predefinedUsers.length ? 'ยกเลิกทั้งหมด' : 'เลือกทั้งหมด'}
                        </button>
                    </div>
                    <div class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-7 lg:grid-cols-9 gap-x-4 gap-y-8">
                        ${gridHTML}
                    </div>
                    ${fabHTML}
                </div>`;
            },

            // ==========================================
            // COMPOSE FLOW
            // ==========================================
            setComposeMode: function(mode) {
                this.composeMode = mode;
                this.showView('compose'); // trigger re-render
            },

            renderCompose: function() {
                const isAudio = this.composeMode === 'audio';
                const audioArea = this.audioBlob ? `
                    <div class="w-full space-y-4 flex flex-col items-center">
                        <div class="bg-green-100 text-green-700 px-4 py-2 rounded-full font-medium text-sm flex items-center shadow-inner"><i class="fa-solid fa-check-circle mr-2"></i> บันทึกเสียงเสร็จสิ้น!</div>
                        <audio src="${URL.createObjectURL(this.audioBlob)}" controls class="w-full max-w-sm rounded-full shadow-md"></audio>
                        <button onclick="app.resetAudio()" class="text-sm text-red-500 hover:text-red-700 hover:underline"><i class="fa-solid fa-rotate-right"></i> อัดใหม่</button>
                    </div>
                ` : `
                    <div class="flex flex-col items-center">
                        <div class="text-5xl font-mono mb-6 font-bold tracking-wider ${this.isRecording ? 'text-red-500 animate-pulse' : 'text-gray-300'} drop-shadow-sm">
                            00:${String(this.recordingTime).padStart(2, '0')}
                        </div>
                        <button onclick="app.toggleRecord()" class="w-28 h-28 rounded-full flex items-center justify-center text-white shadow-[0_10px_30px_rgba(0,0,0,0.15)] transition-all transform hover:scale-105 relative ${this.isRecording ? 'bg-red-500' : 'bg-gradient-to-tr from-primary to-blue-400'}">
                            ${this.isRecording ? 
                                '<div class="absolute inset-0 rounded-full border-4 border-red-300 animate-ping"></div><i class="fa-solid fa-stop text-4xl relative z-10"></i>' : 
                                '<i class="fa-solid fa-microphone text-5xl relative z-10"></i>'}
                        </button>
                        <p class="text-sm text-gray-500 mt-6 bg-gray-100 px-4 py-1.5 rounded-full font-medium shadow-inner">
                            ${this.isRecording ? 'กำลังบันทึก... กดเพื่อหยุด' : `กดเพื่อเริ่มอัดเสียง (สูงสุด ${MAX_AUDIO_TIME} วิ)`}
                        </p>
                    </div>
                `;

                const textArea = `
                    <div class="w-full flex flex-col h-full animate-fade-in">
                        <textarea id="txtMessage" class="w-full flex-1 p-5 rounded-2xl border-2 border-gray-100 focus:bg-white bg-gray-50 focus:border-secondary focus:ring-4 focus:ring-secondary/20 outline-none resize-none min-h-[200px] text-lg shadow-inner transition-all" placeholder="พิมพ์ความรู้สึกของคุณที่นี่..."></textarea>
                        <div class="text-right text-sm mt-3 font-medium text-gray-400" id="wordCount">
                            จำกัด ${MAX_WORDS} คำ
                        </div>
                    </div>
                `;

                return `
                <div class="bg-white rounded-[2rem] p-8 shadow-2xl max-w-2xl mx-auto border border-gray-100 animate-slide-up">
                    <div class="flex items-center mb-8 pb-4 border-b border-gray-100">
                        <button onclick="app.showView('home')" class="p-3 hover:bg-gray-100 rounded-full mr-4 transition text-gray-400 hover:text-primary">
                            <i class="fa-solid fa-arrow-left text-xl"></i>
                        </button>
                        <div>
                            <h2 class="text-2xl font-bold text-primary">สร้างข้อความใหม่</h2>
                            <p class="text-sm text-gray-500 font-medium mt-1">ส่งถึง: <span class="bg-secondary/30 text-primary px-2 py-0.5 rounded-md">${this.selectedIds.length} คน</span></p>
                        </div>
                    </div>

                    <div class="flex bg-gray-100 p-1.5 rounded-2xl mb-8 shadow-inner relative">
                        <button onclick="app.setComposeMode('audio')" class="flex-1 py-3.5 rounded-xl font-bold flex items-center justify-center space-x-2 transition-all z-10 ${isAudio ? 'bg-white shadow-md text-primary' : 'text-gray-400 hover:text-gray-600'}">
                            <i class="fa-solid fa-microphone-lines text-lg"></i> <span>ส่งเสียง</span>
                        </button>
                        <button onclick="app.setComposeMode('text')" class="flex-1 py-3.5 rounded-xl font-bold flex items-center justify-center space-x-2 transition-all z-10 ${!isAudio ? 'bg-white shadow-md text-primary' : 'text-gray-400 hover:text-gray-600'}">
                            <i class="fa-solid fa-keyboard text-lg"></i> <span>พิมพ์ข้อความ</span>
                        </button>
                    </div>

                    <div class="min-h-[300px] flex flex-col justify-center items-center border-2 border-dashed border-gray-200 rounded-[2rem] p-8 bg-gray-50/50 relative overflow-hidden">
                        ${isAudio ? audioArea : textArea}
                    </div>

                    <div class="mt-8 flex justify-end">
                        <button onclick="app.sendMessage()" id="btnSend" class="px-10 py-4 rounded-2xl font-bold text-primary flex items-center space-x-3 transition-all bg-secondary hover:bg-yellow-400 shadow-[0_10px_20px_rgba(253,223,49,0.3)] transform hover:-translate-y-1">
                            <i class="fa-solid fa-paper-plane text-xl"></i> <span>ส่งข้อความเลย!</span>
                        </button>
                    </div>
                </div>`;
            },

            toggleRecord: async function() {
                if(this.isRecording) {
                    this.mediaRecorder.stop();
                    this.isRecording = false;
                    clearInterval(this.timerInterval);
                    this.showView('compose');
                } else {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        this.mediaRecorder = new MediaRecorder(stream);
                        this.audioChunks = [];

                        this.mediaRecorder.ondataavailable = e => { if (e.data.size > 0) this.audioChunks.push(e.data); };
                        this.mediaRecorder.onstop = () => {
                            this.audioBlob = new Blob(this.audioChunks, { type: 'audio/webm' });
                            stream.getTracks().forEach(track => track.stop());
                            this.showView('compose'); // update UI
                        };

                        this.mediaRecorder.start();
                        this.isRecording = true;
                        this.recordingTime = 0;
                        this.audioBlob = null;
                        this.showView('compose');

                        this.timerInterval = setInterval(() => {
                            this.recordingTime++;
                            if(this.recordingTime >= MAX_AUDIO_TIME) this.toggleRecord();
                            else this.showView('compose'); // re-render timer (inefficient but works for vanilla)
                        }, 1000);
                    } catch (e) {
                        Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเข้าถึงไมโครโฟนได้ กรุณาอนุญาตการเข้าถึง', 'error');
                    }
                }
            },
            resetAudio: function() { this.audioBlob = null; this.showView('compose'); },

            sendMessage: async function() {
                const btn = document.getElementById('btnSend');
                let content = '';
                
                if(this.composeMode === 'text') {
                    content = document.getElementById('txtMessage').value.trim();
                    if(!content) return Swal.fire('แจ้งเตือน', 'กรุณาพิมพ์ข้อความ', 'warning');
                    const wc = content.split(/\s+/).filter(w=>w.length>0).length;
                    if(wc > MAX_WORDS) return Swal.fire('แจ้งเตือน', `จำกัดไม่เกิน ${MAX_WORDS} คำ`, 'warning');
                } else {
                    if(!this.audioBlob) return Swal.fire('แจ้งเตือน', 'กรุณาอัดเสียงก่อนส่ง', 'warning');
                    // Convert Blob to Base64
                    content = await new Promise((res) => {
                        const reader = new FileReader();
                        reader.onloadend = () => res(reader.result);
                        reader.readAsDataURL(this.audioBlob);
                    });
                }

                btn.disabled = true;
                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> <span>กำลังส่ง...</span>';

                try {
                    const messageData = {
                        from: { id: this.profile.studentId, name: this.profile.name },
                        to: this.selectedIds,
                        type: this.composeMode,
                        content: content,
                        timestamp: Date.now()
                    };
                    const msgsRef = collection(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages');
                    await addDoc(msgsRef, messageData);
                    
                    Swal.fire({ icon: 'success', title: 'ส่งเรียบร้อย!', showConfirmButton: false, timer: 1500 });
                    this.selectedIds = [];
                    this.audioBlob = null;
                    this.showView('inbox');
                } catch (e) {
                    Swal.fire('ข้อผิดพลาด', 'ไม่สามารถส่งข้อความได้', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-paper-plane text-xl"></i> <span>ส่งข้อความเลย!</span>';
                }
            },

            // ==========================================
            // INBOX FLOW
            // ==========================================
            deleteMsg: async function(id) {
                Swal.fire({
                    title: 'ลบข้อความนี้?', text: "จะไม่สามารถกู้คืนได้", icon: 'warning',
                    showCancelButton: true, confirmButtonColor: '#d33', cancelButtonColor: '#3085d6',
                    confirmButtonText: 'ลบเลย', cancelButtonText: 'ยกเลิก'
                }).then(async (result) => {
                    if (result.isConfirmed) {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages', id));
                        Swal.fire({ icon:'success', title:'ลบแล้ว', showConfirmButton:false, timer:1000});
                    }
                });
            },

            renderInbox: function() {
                let msgsHTML = '';
                if(this.messages.length === 0) {
                    msgsHTML = `
                        <div class="text-center py-24 flex flex-col items-center justify-center animate-fade-in">
                            <div class="w-32 h-32 bg-gray-50 rounded-full flex items-center justify-center mb-6 shadow-inner border border-gray-100">
                                <i class="fa-solid fa-inbox text-5xl text-gray-300"></i>
                            </div>
                            <p class="text-gray-400 font-medium text-lg">ยังไม่มีข้อความถึงคุณในขณะนี้</p>
                        </div>`;
                } else {
                    this.messages.forEach((msg, idx) => {
                        const dateStr = new Date(msg.timestamp).toLocaleString('th-TH');
                        const isAudio = msg.type === 'audio';
                        const adminControls = this.profile.isAdmin ? `
                            <button onclick="app.deleteMsg('${msg.id}')" class="text-red-400 hover:text-red-600 bg-white shadow hover:shadow-md p-2 rounded-lg transition-all" title="ลบข้อความ">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        ` : '';
                        
                        const adminToLabel = this.profile.isAdmin ? `<span class="ml-2 text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-normal shadow-sm">ถึง ${msg.to.length} คน</span>` : '';

                        // หา User Profile ของคนส่งเพื่อเอารูปมาโชว์ (ถ้าเป็น 45 คนหลัก)
                        const sender = predefinedUsers.find(u => u.studentId === msg.from.id);
                        const senderImg = sender ? `<img src="${GITHUB_IMG_BASE_URL}/${sender.id}.png" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" class="w-full h-full object-cover rounded-full absolute inset-0 z-0"><span class="relative z-10 hidden text-primary">${msg.from.name.substring(0,1)}</span>` : `<span class="text-primary">${msg.from.name.substring(0,1)}</span>`;

                        msgsHTML += `
                        <div class="bg-white border border-gray-100 p-6 rounded-[2rem] flex flex-col sm:flex-row sm:items-start gap-5 shadow-sm hover:shadow-xl transition-all transform hover:-translate-y-1 group animate-slide-up" style="animation-delay: ${idx * 50}ms">
                            <div class="flex-shrink-0 w-14 h-14 bg-secondary rounded-full flex items-center justify-center font-bold text-2xl shadow-inner relative overflow-hidden border-2 border-secondary">
                                ${senderImg}
                            </div>
                            <div class="flex-1 w-full">
                                <div class="flex justify-between items-start mb-3">
                                    <div>
                                        <span class="font-extrabold text-primary text-xl tracking-wide">${msg.from.name}</span>
                                        ${adminToLabel}
                                        <div class="text-xs text-gray-400 mt-0.5"><i class="fa-regular fa-clock mr-1"></i> ${dateStr}</div>
                                    </div>
                                    <div class="flex items-center space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                        ${adminControls}
                                    </div>
                                </div>
                                
                                ${isAudio ? `
                                    <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 inline-block w-full max-w-md shadow-inner">
                                        <audio src="${msg.content}" controls class="w-full h-10"></audio>
                                    </div>
                                ` : `
                                    <div class="text-gray-700 bg-blue-50/50 p-5 rounded-2xl border border-blue-100 whitespace-pre-wrap leading-relaxed shadow-sm text-lg relative">
                                        <i class="fa-solid fa-quote-left absolute top-3 left-3 text-2xl text-blue-200/50"></i>
                                        <div class="relative z-10 pl-4">${msg.content}</div>
                                    </div>
                                `}
                            </div>
                        </div>`;
                    });
                }

                return `
                <div class="bg-white/95 backdrop-blur-xl rounded-[2.5rem] p-6 md:p-10 shadow-2xl max-w-3xl mx-auto min-h-[75vh] border border-white/50 animate-slide-up">
                    <div class="flex items-center justify-between mb-10 border-b border-gray-100 pb-6">
                        <div class="flex items-center">
                            <button onclick="app.showView('home')" class="p-3 bg-gray-50 hover:bg-secondary hover:text-primary hover:shadow-md rounded-2xl mr-5 transition-all text-gray-500">
                                <i class="fa-solid fa-arrow-left text-xl"></i>
                            </button>
                            <div>
                                <h2 class="text-3xl font-extrabold text-primary flex items-center tracking-wide">
                                    กล่องจดหมาย
                                </h2>
                                <p class="text-gray-500 mt-1 font-medium">
                                    ${this.profile.isAdmin ? '<span class="text-red-500"><i class="fa-solid fa-shield-halved"></i> โหมดผู้ดูแลระบบ: เห็นข้อความทั้งหมด</span>' : 'ข้อความจากเพื่อนและรุ่นน้องที่ส่งถึงคุณ'}
                                </p>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-6 relative z-10">
                        ${msgsHTML}
                    </div>
                </div>`;
            }
        };

        // Initialize App on load
        window.addEventListener('DOMContentLoaded', () => app.init());

    </script>
</body>
</html>
