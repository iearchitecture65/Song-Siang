                    this.showView('home');
                }
            },

            checkBlockStatus: async function(uid) {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_user_status', uid);
                const snap = await getDoc(docRef);
                return snap.exists() && snap.data().isBlocked === true;
            },

            setupUsersListener: function() {
                if(this.unsubscribeUsers) this.unsubscribeUsers();
                if(!this.profile || !this.profile.isAdmin) return;

                const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'song_siang_user_status');
                this.unsubscribeUsers = onSnapshot(usersRef, (snapshot) => {
                    this.registeredUsers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (this.currentView === 'manage_users') this.renderUserManagementUI();
                });
            },

            toggleMobileMenu: function() {
                this.isMobileMenuOpen = !this.isMobileMenuOpen;
                const menu = document.getElementById('mobileDropdown');
                const hamIcon = document.getElementById('navHamburger').querySelector('i');
                const contentWrapper = document.getElementById('mainContentWrapper');
                const fabContainer = document.getElementById('globalFabContainer');
                
                if (this.isMobileMenuOpen) {
                    menu.classList.remove('hidden');
                    menu.classList.add('flex');
                    hamIcon.classList.remove('fa-bars');
                    hamIcon.classList.add('fa-xmark');
                    contentWrapper.classList.add('menu-open-blur');
                    if(fabContainer) fabContainer.classList.add('menu-open-blur');
                } else {
                    menu.classList.add('hidden');
                    menu.classList.remove('flex');
                    hamIcon.classList.add('fa-bars');
                    hamIcon.classList.remove('fa-xmark');
                    contentWrapper.classList.remove('menu-open-blur');
                    if(fabContainer) fabContainer.classList.remove('menu-open-blur');
                }
            },

            closeMobileMenu: function() {
                this.isMobileMenuOpen = false;
                const menu = document.getElementById('mobileDropdown');
                const hamIcon = document.getElementById('navHamburger')?.querySelector('i');
                const contentWrapper = document.getElementById('mainContentWrapper');
                const fabContainer = document.getElementById('globalFabContainer');

                if(menu) {
                    menu.classList.add('hidden');
                    menu.classList.remove('flex');
                }
                if(hamIcon) {
                    hamIcon.classList.add('fa-bars');
                    hamIcon.classList.remove('fa-xmark');
                }
                if(contentWrapper) {
                    contentWrapper.classList.remove('menu-open-blur');
                }
                if(fabContainer) {
                    fabContainer.classList.remove('menu-open-blur');
                }
            },

            loadGlobalSettings: function() {
                const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_settings', 'config');
                onSnapshot(settingsRef, (docSnap) => {
                    if(docSnap.exists()) {
                        const data = docSnap.data();
                        this.maxChars = data.maxChars || 500;
                        this.maxAudioTime = data.maxAudioTime || 30;
                    }
                });
            },

            preloadImages: function() {
                if(this.preloadedImages) return;
                predefinedUsers.forEach(u => {
                    const imgUrl = `${GITHUB_IMG_BASE_URL}/${u.id}.png`;
                    const img = new Image();
                    img.src = imgUrl;
                    img.onload = () => { this.imageCache[imgUrl] = true; };
                });
                this.preloadedImages = true;
            },

            getRelationshipLabel: function() {
                if (!this.profile) return "คน";
                const sid = this.profile.studentId;
                if (!sid || sid.startsWith('G')) return "คน";

                const yearMatch = sid.match(/^\d{2}/);
                if (!yearMatch) return "คน";
                const year = parseInt(yearMatch[0]);

                if (year < 65) return "น้อง"; 
                if (year > 65) return "พี่";   
                
                const isPredefined = predefinedUsers.some(u => u.studentId === sid);
                return isPredefined ? "เพื่อน" : "คน";
            },

            renderImage: function(src, altText, extraClass = "") {
                const isLoaded = this.imageCache[src];
                const baseId = btoa(src).substring(0,10);
                return `
                    <div class="img-container relative w-full h-full flex items-center justify-center bg-secondary/50 overflow-hidden">
                        <div id="loader-${baseId}" class="img-loading-spinner absolute z-10 ${isLoaded ? 'hidden' : ''}"></div>
                        <img src="${src}" 
                             alt="${altText}"
                             class="w-full h-full object-cover relative z-20 ${isLoaded ? 'loaded' : ''} ${extraClass}"
                             onload="app.onImageLoaded(this, '${src}')"
                             onerror="app.onImageError(this)">
                    </div>
                `;
            },

            onImageLoaded: function(img, src) {
                this.imageCache[src] = true;
                img.classList.add('loaded');
                const baseId = btoa(src).substring(0,10);
                const loader = document.getElementById(`loader-${baseId}`);
                if (loader) loader.classList.add('hidden');
                
                // Fixed: Ensure fallback is hidden if image loaded successfully
                const container = img.parentElement;
                if (container) {
                    const fallback = container.parentElement.querySelector('.fallback-name');
                    if (fallback) {
                        fallback.classList.add('hidden');
                        fallback.classList.remove('flex');
                    }
                }
            },

            onImageError: function(img) {
                const container = img.parentElement;
                if (container) {
                    const loader = container.querySelector('.img-loading-spinner');
                    if (loader) loader.classList.add('hidden');
                    const fallback = container.parentElement.querySelector('.fallback-name');
                    if (fallback) {
                        fallback.classList.remove('hidden');
                        fallback.classList.add('flex');
                    }
                }
                img.style.display = 'none';
            },

            showView: function(viewName) {
                this.closeMobileMenu();
                this.currentView = viewName;
                const root = document.getElementById('appRoot');
                const navDesk = document.getElementById('navMenuDesktop');
                const navHam = document.getElementById('navHamburger');
                
                if(this.profile) {
                    navDesk.classList.remove('md:hidden');
                    navDesk.classList.add('md:flex');
                    navHam.classList.remove('hidden');
                    
                    const showAdmin = this.profile.isAdmin;
                    const showFeed = this.profile.isPredefined || this.profile.isAdmin;
                    const showInbox = this.profile.isPredefined || this.profile.isAdmin;

                    document.getElementById('btnAdminDesk').classList.toggle('hidden', !showAdmin);
                    document.getElementById('btnAdminMob').classList.toggle('hidden', !showAdmin);
                    document.getElementById('btnUsersDesk').classList.toggle('hidden', !showAdmin);
                    document.getElementById('btnUsersMob').classList.toggle('hidden', !showAdmin);
                    
                    document.getElementById('btnFeedDesk').classList.toggle('hidden', !showFeed);
                    document.getElementById('btnFeedMob').classList.toggle('hidden', !showFeed);

                    document.getElementById('btnInboxDesk').classList.toggle('hidden', !showInbox);
                    document.getElementById('btnInboxMob').classList.toggle('hidden', !showInbox);
                } else {
                    navDesk.classList.add('md:hidden');
                    navDesk.classList.remove('md:flex');
                    navHam.classList.add('hidden');
                }

                if(viewName === 'login') root.innerHTML = this.renderLogin1();
                else if(viewName === 'feed') { root.innerHTML = this.renderFeed(); this.updateFAB(); }
                else if(viewName === 'home') { root.innerHTML = this.renderHome(); this.updateFAB(); }
                else if(viewName === 'compose') { root.innerHTML = this.renderCompose(); this.updateFAB(); }
                else if(viewName === 'inbox') { 
                    if (!(this.profile.isPredefined || this.profile.isAdmin)) { this.showView('home'); return; }
                    this.adminSearchQuery = ''; 
                    root.innerHTML = this.renderInbox(); 
                    this.updateFAB(); 
                }
                else if(viewName === 'settings') { root.innerHTML = this.renderSettings(); this.updateFAB(); }
                else if(viewName === 'manage_users') { root.innerHTML = this.renderUserManagement(); this.setupUsersListener(); }
                
                if (viewName !== 'home' && viewName !== 'feed') {
                    const globalFab = document.getElementById('globalFabContainer');
                    if (globalFab) globalFab.innerHTML = '';
                }
            },

            loginSuccess: async function(userProfile) {
                const isBlocked = await this.checkBlockStatus(userProfile.studentId);
                if (isBlocked) {
                    return glassSwal.fire('การเข้าถึงถูกจำกัด', 'บัญชีของคุณถูกระงับการใช้งาน', 'error');
                }

                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_user_status', userProfile.studentId), {
                    name: userProfile.name,
                    fullName: userProfile.fullName || userProfile.name,
                    lastLogin: Date.now(),
                    isPredefined: !!userProfile.isPredefined,
                    isBlocked: false
                }, { merge: true });

                this.profile = userProfile;
                localStorage.setItem('songSiangProfile', JSON.stringify(userProfile));
                this.setupMessagesListener();
                this.setupUsersListener();
                
                 glassSwal.fire({
                    iconHtml: '<i class="fa-solid fa-check text-primary text-5xl"></i>',
                    title: `ยินดีต้อนรับ ${userProfile.name}!`,
                    html: 'เข้าสู่ระบบเรียบร้อยแล้ว',
                    timer: 1500,
                    showConfirmButton: false
                });
                
                this.showView(userProfile.isPredefined || userProfile.isAdmin ? 'feed' : 'home');
            },

            logout: function() {
                this.closeMobileMenu();
                glassSwal.fire({
                    title: 'ออกจากระบบ?',
                    iconHtml: '<i class="fa-solid fa-arrow-right-from-bracket text-red-400 text-5xl"></i>',
                    showCancelButton: true,
                    confirmButtonText: 'ออกจากระบบ',
                    cancelButtonText: 'ยกเลิก'
                }).then((result) => {
                    if (result.isConfirmed) {
                        this.profile = null;
                        localStorage.removeItem('songSiangProfile');
                        if(this.unsubscribeMsgs) this.unsubscribeMsgs();
                        if(this.unsubscribeUsers) this.unsubscribeUsers();
                        this.showView('login');
                    }
                });
            },

            setupMessagesListener: function() {
                if(this.unsubscribeMsgs) this.unsubscribeMsgs();
                if(!this.profile) return;

                const msgsRef = collection(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages');
                this.unsubscribeMsgs = onSnapshot(msgsRef, (snapshot) => {
                    const allMsgs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    allMsgs.sort((a, b) => b.timestamp - a.timestamp);
                    this.allMessages = allMsgs; 
                    
                    const myMsgs = allMsgs.filter(msg => this.profile.isAdmin || msg.to.includes(this.profile.studentId));
                    this.messages = myMsgs; 
                    
                    if(this.currentView === 'inbox') {
                        const container = document.getElementById('inboxMessageContainer');
                        if(container) container.innerHTML = this.renderInboxMessagesList();
                    } 
                    else if(this.currentView === 'feed') this.showView('feed');
                });
            },

            requestOTP: async function() {
                const idInput = document.getElementById('inputId').value.replace(/[^0-9]/g, '');
                if(idInput.length !== 8) return glassSwal.fire('แจ้งเตือน', 'กรุณากรอกรหัสนักศึกษาให้ครบ 8 หลัก', 'warning');
                
                if(idInput === '65030900') {
                    return this.loginSuccess({ studentId: '65030900', fullName: 'ผู้ดูแลระบบ', name: 'Admin', isPredefined: true, isAdmin: true });
                }

                this.tempStudentId = idInput;
                const btn = document.getElementById('btnReqOTP');
                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> กำลังส่งรหัส...';
                btn.disabled = true;

                this.preloadImages();

                const generatedOtp = Math.floor(100000 + Math.random() * 900000).toString();
                const targetEmail = `${idInput}@kmitl.ac.th`;
                const refCode = Math.random().toString(36).substring(2, 8).toUpperCase();
                this.currentRef = refCode;

                try {
                    const response = await fetch(`${APPS_SCRIPT_URL}?email=${encodeURIComponent(targetEmail)}&otp=${generatedOtp}&ref=${refCode}`);
                    const result = await response.json();
                    
                    if(result.status === 'success') {
                        this.actualOtp = generatedOtp;
                        document.getElementById('appRoot').innerHTML = this.renderLogin2();
                        setTimeout(() => document.getElementById('otp-0').focus(), 100);
                    } else {
                        glassSwal.fire('ข้อผิดพลาด', result.message, 'error');
                        btn.innerHTML = 'เข้าสู่ระบบ <i class="fa-solid fa-right-to-bracket ml-2"></i>';
                        btn.disabled = false;
                    }
                } catch(e) {
                    glassSwal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ส่งอีเมลได้', 'error');
                    btn.innerHTML = 'เข้าสู่ระบบ <i class="fa-solid fa-right-to-bracket ml-2"></i>';
                    btn.disabled = false;
                }
            },

            onOtpInput: function(el, index) {

            checkFullOtp: function() {

                    if(val) currentOtp += val;

            exportUsersToExcel: function() {
                const allUsers = [...predefinedUsers];
                this.registeredUsers.forEach(reg => {
                    if (!allUsers.find(u => u.studentId === reg.id)) {
                        allUsers.push({ studentId: reg.id, name: reg.name, fullName: reg.fullName, isPredefined: false });
                    }
                });

                let csv = "\uFEFF"; 
                csv += "รหัสนักศึกษา,ชื่อเรียก,ชื่อ-นามสกุล,สถานะผู้ใช้\n";
                allUsers.forEach(u => {
                    const regData = this.registeredUsers.find(r => r.id === u.studentId) || {};
                    const status = regData.isBlocked ? "ระงับการใช้งาน" : (regData.lastLogin ? "ปกติ" : "ยังไม่เคยเข้าสู่ระบบ");
                    csv += `"${u.studentId}","${u.name}","${u.fullName || ''}","${status}"\n`;
                });

                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", `รายชื่อสมาชิก_ส่งเสียง_${new Date().toLocaleDateString('th-TH').replace(/\//g,'-')}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            },

            setMemberSearch: function(val) {
                this.memberSearchQuery = val;
                this.renderUserManagementUI();

            renderUserManagementUI: function() {
                const container = document.getElementById('usersListContainer');
                if (!container) return;

                const queryStr = this.memberSearchQuery.toLowerCase().trim();
                const allUsers = [...predefinedUsers];
                this.registeredUsers.forEach(reg => {
                    if (!allUsers.find(u => u.studentId === reg.id)) {
                        allUsers.push({ studentId: reg.id, name: reg.name, fullName: reg.fullName, isPredefined: false });
                    }
                });

                const filtered = allUsers.filter(u => 
                    u.name.toLowerCase().includes(queryStr) || 
                    u.studentId.toLowerCase().includes(queryStr) ||
                    (u.fullName && u.fullName.toLowerCase().includes(queryStr))
                );

                if (filtered.length === 0) {
                    container.innerHTML = '<p class="text-center py-10 text-white/60">ไม่พบสมาชิกที่ตรงตามเงื่อนไข</p>';
                    return;
                }

                container.innerHTML = filtered.map(u => {
                    const regData = this.registeredUsers.find(r => r.id === u.studentId) || {};
                    const isBlocked = regData.isBlocked === true;
                    const lastLogin = regData.lastLogin ? new Date(regData.lastLogin).toLocaleString('th-TH') : 'ยังไม่เคยเข้าสู่ระบบ';
                    
                    return `
                        <div class="bg-white/60 p-4 rounded-2xl flex flex-col sm:flex-row items-center gap-4 border border-white/40 transition-all ${isBlocked ? 'opacity-60 bg-red-100/50' : 'hover:bg-white/80'}">
                            <div class="w-12 h-12 bg-secondary rounded-full flex-center-all font-bold text-primary shadow-sm border border-white relative shrink-0 overflow-hidden">
                                ${u.studentId.startsWith('G') ? '<i class="fa-solid fa-user-tag text-lg"></i>' : (u.id ? app.renderImage(`${GITHUB_IMG_BASE_URL}/${u.id}.png`, u.name) : `<span class="h-full w-full flex-center-all">${this.getAbbr(u.name)}</span>`)}
                                <span class="fallback-name h-full w-full flex-center-all hidden absolute inset-0 z-10 bg-secondary">${this.getAbbr(u.name)}</span>
                            </div>
                            <div class="flex-1 text-center sm:text-left min-w-0 w-full">
                                <div class="font-extrabold text-primary flex items-center justify-center sm:justify-start gap-2 truncate">
                                    ${u.name} 
                                    ${u.studentId.startsWith('G') ? '<span class="text-[9px] bg-blue-500 text-white px-1.5 rounded-full font-medium shrink-0">Guest</span>' : ''}
                                    ${isBlocked ? '<span class="text-[9px] bg-red-500 text-white px-1.5 rounded-full font-medium shrink-0">Blocked</span>' : ''}
                                </div>
                                <div class="text-[10px] text-primary/70 font-medium truncate">${u.studentId} | ${u.fullName || ''}</div>
                                <div class="text-[9px] text-primary/50 mt-1 italic">ล่าสุด: ${lastLogin}</div>
                            </div>
                            <div class="flex gap-2 shrink-0">
                                <button onclick="app.toggleUserBlock('${u.studentId}', ${isBlocked})" class="px-3 py-2 rounded-xl text-[10px] font-bold text-white transition-all ${isBlocked ? 'bg-green-500 hover:bg-green-600' : 'bg-orange-500 hover:bg-orange-600'}">
                                    ${isBlocked ? '<i class="fa-solid fa-unlock mr-1"></i> ปลดบล็อก' : '<i class="fa-solid fa-ban mr-1"></i> บล็อก'}
                                </button>
                                <button onclick="app.deleteUserFromSystem('${u.studentId}')" class="px-3 py-2 rounded-xl text-[10px] font-bold text-white bg-red-500 hover:bg-red-600 transition-all">
                                    <i class="fa-solid fa-trash-can mr-1"></i> ลบ
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            },

            toggleUserBlock: async function(uid, currentlyBlocked) {
                const action = currentlyBlocked ? 'ปลดบล็อก' : 'บล็อก';
                glassSwal.fire({
                    title: `${action}สมาชิก?`,
                    text: currentlyBlocked ? 'สมาชิกจะสามารถกลับมาใช้งานระบบได้ปกติ' : 'สมาชิกจะไม่สามารถเข้าสู่ระบบและใช้งานได้',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonText: action,
                    cancelButtonText: 'ยกเลิก'
                }).then(async (result) => {
                    if (result.isConfirmed) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_user_status', uid), {
                            isBlocked: !currentlyBlocked
                        }, { merge: true });
                        glassSwal.fire({ iconHtml: '<i class="fa-solid fa-check text-primary text-5xl"></i>', title: 'ดำเนินการสำเร็จ!', showConfirmButton: false, timer: 1000 });
                    }
                });
            },

            deleteUserFromSystem: async function(uid) {
                glassSwal.fire({
                    title: 'ลบข้อมูลสมาชิก?',
                    text: 'ข้อมูลสถานะการเข้าสู่ระบบจะถูกลบ ข้อมูลการล็อกอินจะถูกล้าง',
                    icon: 'error',
                    showCancelButton: true,
                    confirmButtonText: 'ลบข้อมูล',
                    cancelButtonText: 'ยกเลิก'
                }).then(async (result) => {
                    if (result.isConfirmed) {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_user_status', uid));
                        glassSwal.fire({ iconHtml: '<i class="fa-solid fa-check text-primary text-5xl"></i>', title: 'ลบเรียบร้อย!', showConfirmButton: false, timer: 1000 });
                    }
                });
            },

            viewFeedMessage: function(msgId) {
                const msg = this.allMessages.find(m => m.id === msgId);
                if(!msg) return;
                
                const isAnonymous = msg.from.isAnonymous;
                let displayName = isAnonymous ? 'ผู้ไม่ประสงค์ออกนาม' : msg.from.name;
                
                if (this.profile.isAdmin && isAnonymous) {
                     const realSender = predefinedUsers.find(u => u.studentId === msg.from.id);
                     if(realSender) displayName += ` (${realSender.name})`;
                }

                if (msg.type === 'audio') {
                    glassSwal.fire({
                        title: `เสียงจาก ${displayName}`,
                        html: `<audio src="${msg.content}" controls autoplay class="w-full mt-4"></audio>`,
                        showConfirmButton: true,
                        confirmButtonText: 'ปิดหน้าต่าง'
                    });
                } else {
                    glassSwal.fire({
                        title: `ข้อความจาก ${displayName}`,
                        html: `<div class="mt-4 p-5 bg-white/70 rounded-2xl text-left text-primary border border-white/50 whitespace-pre-wrap break-words font-medium shadow-inner relative"><i class="fa-solid fa-quote-left absolute top-3 left-3 text-xl text-primary/20"></i><div class="pl-6 pt-1">${msg.content.trim()}</div></div>`,
                        showConfirmButton: true,
                        confirmButtonText: 'ปิดหน้าต่าง'
                    });
                }
            },

            renderFeed: function() {
                let msgsHTML = '';
                const myStudentId = this.profile.studentId;
                const filteredMessages = this.allMessages.filter(msg => {
                    if (this.profile.isAdmin) return true;
                    const toMe = msg.to.includes(myStudentId);
                    const toEveryone = msg.to.length >= predefinedUsers.length;
                    return toMe || toEveryone;
                });

                if(filteredMessages.length === 0) {
                    msgsHTML = `
                        <div class="w-full flex justify-center py-20 animate-fade-in">
                            <div class="text-center">
                                <i class="fa-regular fa-comments text-5xl text-white/30 mb-3"></i>
                                <p class="text-white/70 font-medium">ยังไม่มีความเคลื่อนไหวถึงคุณในขณะนี้</p>
                            </div>
                        </div>`;
                } else {
                    filteredMessages.forEach((msg, idx) => {
                        const isAudio = msg.type === 'audio';
                        const isAnonymous = msg.from.isAnonymous;
                        let senderImg = '';
                        
                        if (isAnonymous) {
                            senderImg = `<div class="w-full h-full flex items-center justify-center bg-slate-700 text-white rounded-full"><i class="fa-solid fa-user-secret text-2xl"></i></div>`;
                        } else {
                            const sender = predefinedUsers.find(u => u.studentId === msg.from.id);
                            // Fixed: Ensure abbreviation is hidden when image exists by correctly using 'hidden' class
                            senderImg = sender ? 
                                `${app.renderImage(`${GITHUB_IMG_BASE_URL}/${sender.id}.png`, msg.from.name)}<span class="fallback-name absolute inset-0 z-10 hidden flex-center-all text-primary font-bold text-[1.5rem] bg-secondary">${this.getAbbr(msg.from.name)}</span>` : 
                                `<div class="w-full h-full flex-center-all text-primary font-bold text-lg">${this.getAbbr(msg.from.name)}</div>`;
                        }
                        
                        const baseSize = Math.floor(Math.random() * (120 - 70 + 1) + 70); 
                        const animDelay = (Math.random() * 2).toFixed(1);
                        const animDuration = (3.5 + Math.random() * 2.5).toFixed(1);
                        const randomX = (Math.random() * 20 - 10).toFixed(1);
                        const randomY = (Math.random() * 20 - 10).toFixed(1);
                        
                        let badgeContent = '';
                        if (isAudio) {
                            const duration = msg.audioDuration != null ? msg.audioDuration : '?';
                            badgeContent = `<i class="fa-solid fa-play text-primary text-[10px]"></i> <span class="text-[10px] font-bold text-primary ml-1">${duration} วิ</span>`;
                        } else {
                            badgeContent = `<span class="truncate text-[10px] font-bold text-primary max-w-[80px]">${msg.content.trim()}</span>`;
                        }

                        msgsHTML += `
                        <div class="flex justify-center float-anim p-3" style="animation-duration: ${animDuration}s; animation-delay: ${animDelay}s; transform: translate(${randomX}px, ${randomY}px);">
                            <div onclick="app.viewFeedMessage('${msg.id}')" class="relative rounded-full shadow-xl border-2 border-white/60 ${isAnonymous ? 'bg-slate-700' : 'bg-secondary'} group transform transition-transform hover:scale-110 cursor-pointer" style="width: ${baseSize}px; height: ${baseSize}px;">
                                <div class="w-full h-full rounded-full overflow-hidden relative">
                                    ${senderImg}
                                </div>
                                <div class="absolute -bottom-1 -right-2 bg-white/95 backdrop-blur-md rounded-full px-3 py-1 flex items-center justify-center shadow-lg border border-white/50 z-30 min-w-fit whitespace-nowrap">
                                    ${badgeContent}
                                </div>
                            </div>
                        </div>`;
                    });
                }

                return `
                <div class="animate-fade-in pb-32">
                    <div class="text-center mb-8">
                        <h2 class="text-2xl md:text-4xl font-bold text-white drop-shadow-md">ข้อความ</h2>
                        <p class="text-blue-100 text-xs md:text-sm mt-2 opacity-80">เฉพาะข้อความที่ส่งถึงคุณและข้อความสาธารณะ</p>
                    </div>
                    <div class="flex flex-wrap justify-center items-center gap-4 sm:gap-8 px-2 max-w-5xl mx-auto">
                        ${msgsHTML}
                    </div>
                </div>`;
            },

            toggleUser: function(id, btnElement) {
                const idx = this.selectedIds.indexOf(id);
                const isAdding = idx === -1;
                
                if (isAdding) this.selectedIds.push(id);
                else this.selectedIds.splice(idx, 1);

                if (btnElement) {
                    const checkIcon = btnElement.querySelector('.check-indicator');
                    if (isAdding) {
                        btnElement.classList.add('ring-4', 'ring-secondary', 'scale-110', 'shadow-[0_0_20px_rgba(253,223,49,0.7)]');
                        if (checkIcon) { checkIcon.classList.remove('hidden'); checkIcon.classList.add('flex'); }
                    } else {
                        btnElement.classList.remove('ring-4', 'ring-secondary', 'scale-110', 'shadow-[0_0_20px_rgba(253,223,49,0.7)]');
                        if (checkIcon) { checkIcon.classList.remove('flex'); checkIcon.classList.add('hidden'); }
                    }
                }
                this.updateFAB();
            },
            
            selectAllUsers: function() {
                const container = document.getElementById('usersGrid');
                if (!container) return;
                
                const isSelectingAll = this.selectedIds.length !== predefinedUsers.length;
                this.selectedIds = isSelectingAll ? predefinedUsers.map(u => u.studentId) : [];
                
                const buttons = container.querySelectorAll('button[data-student-id]');
                buttons.forEach(btn => {
                    const checkIcon = btn.querySelector('.check-indicator');
                    if (isSelectingAll) {
                        btn.classList.add('ring-4', 'ring-secondary', 'scale-110', 'shadow-[0_0_20px_rgba(253,223,49,0.7)]');
                        if (checkIcon) { checkIcon.classList.remove('hidden'); checkIcon.classList.add('flex'); }
                    } else {
                        btn.classList.remove('ring-4', 'ring-secondary', 'scale-110', 'shadow-[0_0_20px_rgba(253,223,49,0.7)]');
                        if (checkIcon) { checkIcon.classList.remove('flex'); checkIcon.classList.add('hidden'); }
                    }
                });

                const btnSelectAll = document.getElementById('btnSelectAll');
                if (btnSelectAll) {
                    btnSelectAll.innerHTML = `<i class="fa-solid fa-users sm:mr-2"></i> <span class="hidden sm:inline">${isSelectingAll ? 'ยกเลิกทั้งหมด' : 'เลือกทุกคน'}</span><span class="sm:hidden">${isSelectingAll ? 'ยกเลิก' : 'ทั้งหมด'}</span>`;

                        </div>
                        <audio src="${URL.createObjectURL(this.audioBlob)}" controls class="w-full max-w-sm rounded-full shadow-lg border-2 border-white/50"></audio>
                        <button onclick="app.resetAudio()" class="text-xs text-red-500 hover:text-red-700 font-bold mt-2 py-2 px-4 bg-white/50 rounded-full transition-all"><i class="fa-solid fa-rotate-right mr-1"></i> อัดใหม่</button>
                    </div>` : `
                    <div class="flex flex-col items-center">
                        <div class="text-5xl md:text-6xl font-mono mb-6 font-extrabold tracking-wider ${this.isRecording ? 'text-red-500 animate-pulse' : 'text-primary/40'} drop-shadow-sm">
                            00:${String(this.recordingTime).padStart(2, '0')}
                        </div>
                        <button onclick="app.toggleRecord()" class="w-24 h-24 sm:w-32 rounded-full flex items-center justify-center text-white shadow-xl transition-all transform hover:scale-105 relative ${this.isRecording ? 'bg-red-500' : 'bg-gradient-to-tr from-primary to-blue-400'}">
                            ${this.isRecording ? 
                                '<div class="absolute inset-0 rounded-full border-4 border-red-300 animate-ping"></div><i class="fa-solid fa-stop text-4xl relative z-10"></i>' : 
                                '<i class="fa-solid fa-microphone text-5xl relative z-10"></i>'}
                        </button>
                        <p class="text-xs text-gray-500 mt-6 bg-white/50 px-5 py-2 rounded-full font-bold shadow-sm border border-white/60 text-center">
                            ${this.isRecording ? '<i class="fa-solid fa-record-vinyl animate-spin text-red-500 mr-1"></i> กำลังบันทึก...' : `กดเพื่อเริ่มอัดเสียง (สูงสุด ${this.maxAudioTime} วิ)`}
                        </p>
                    </div>`;

                const textArea = `
                    <div class="w-full flex flex-col h-full animate-fade-in relative">
                        <textarea id="txtMessage" oninput="app.updateCharCount()" class="glass-input w-full flex-1 p-4 rounded-2xl outline-none resize-none min-h-[180px] text-base text-primary shadow-inner font-medium break-words" placeholder="พิมพ์ความรู้สึกของคุณที่นี่..."></textarea>
                        <div class="text-right text-xs mt-2 font-bold text-primary/60" id="charCountDisplay">
                            0 / ${this.maxChars} ตัวอักษร
                        </div>
                    </div>`;

                return `
                <div class="glass-card rounded-[2rem] p-6 md:p-8 shadow-2xl max-2xl mx-auto animate-slide-up">
                    <div class="flex items-center mb-6 pb-4 border-b border-white/40">
                        <button onclick="app.showView('home')" class="p-2.5 hover:bg-white/40 bg-white/20 rounded-full mr-4 transition text-primary shadow-sm flex-shrink-0">
                            <i class="fa-solid fa-arrow-left text-lg"></i>
                        </button>
                        <div class="overflow-hidden">
                            <h2 class="text-xl font-extrabold text-white truncate">สร้างข้อความใหม่</h2>
                            <p class="text-xs text-white/90 font-bold mt-1 truncate">
                                ส่งถึง: <span class="inline-block bg-secondary text-primary px-3 py-1 rounded-full shadow-sm ml-1 leading-none">${this.selectedIds.length} ${label}</span>
                            </p>
                        </div>
                    </div>
                    <div class="flex bg-white/30 p-1 rounded-2xl mb-6 shadow-inner relative border border-white/40">
                        <button onclick="app.setComposeMode('audio')" class="flex-1 py-3 rounded-xl text-sm font-bold flex items-center justify-center space-x-2 transition-all z-10 ${isAudio ? 'bg-white shadow-md text-primary' : 'text-primary/60'}">
                            <i class="fa-solid fa-microphone-lines text-base"></i> <span>ส่งเสียง</span>
                        </button>
                        <button onclick="app.setComposeMode('text')" class="flex-1 py-3 rounded-xl text-sm font-bold flex items-center justify-center space-x-2 transition-all z-10 ${!isAudio ? 'bg-white shadow-md text-primary' : 'text-primary/60'}">
                            <i class="fa-solid fa-keyboard text-base"></i> <span>พิมพ์ข้อความ</span>
                        </button>
                    </div>
                    <div class="min-h-[250px] flex flex-col justify-center items-center border-2 border-dashed border-white/60 rounded-3xl p-6 bg-white/20 shadow-inner">
                        ${isAudio ? audioArea : textArea}
                    </div>
                    <!-- Footer buttons: flex-col-reverse for mobile (Anon bottom), sm:flex-row for desktop -->
                    <div class="mt-8 flex flex-col-reverse sm:flex-row justify-end gap-3">
                        <button onclick="app.sendMessage(true)" id="btnSendAnon" class="px-6 py-3.5 rounded-xl font-bold text-white border-2 border-dashed border-white bg-transparent hover:bg-white/10 transition-all shadow-lg text-sm flex items-center justify-center gap-2">
                            <i class="fa-solid fa-user-secret"></i> <span>ส่งแบบไม่ระบุตัวตน</span>
                        </button>
                        <!-- Normal button: flex-grow (sm:flex-[2]) to be longer on desktop -->
                        <button onclick="app.sendMessage(false)" id="btnSendNormal" class="px-6 py-3.5 rounded-xl font-extrabold text-primary bg-secondary hover:bg-yellow-400 shadow-lg transform hover:-translate-y-1 text-sm flex items-center justify-center gap-2 sm:flex-[2] sm:min-w-[200px]">
                            <i class="fa-solid fa-paper-plane"></i> <span>${sendBtnLabel}</span>
                        </button>
                    </div>
                </div>`;
            },

            toggleRecord: async function() {
                if(this.isRecording) {
                    this.mediaRecorder.stop();
                    this.isRecording = false;
                    clearInterval(this.timerInterval);
                    this.showView('compose');
                } else {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        let options = {};
                        if (MediaRecorder.isTypeSupported('audio/mp4')) options = { mimeType: 'audio/mp4' };
                        else if (MediaRecorder.isTypeSupported('audio/webm')) options = { mimeType: 'audio/webm' };
                        
                        this.mediaRecorder = new MediaRecorder(stream, options);
                        this.audioChunks = [];
                        this.mediaRecorder.ondataavailable = e => { if (e.data.size > 0) this.audioChunks.push(e.data); };
                        this.mediaRecorder.onstop = () => {
                            const type = this.mediaRecorder.mimeType || 'audio/mp4';
                            this.audioBlob = new Blob(this.audioChunks, { type: type });
                            this.lastRecordingTime = this.recordingTime > 0 ? this.recordingTime : 1; 
                            stream.getTracks().forEach(track => track.stop());
                            this.showView('compose'); 
                        };
                        this.mediaRecorder.start();
                        this.isRecording = true;
                        this.recordingTime = 0;
                        this.audioBlob = null;
                        this.showView('compose');
                        this.timerInterval = setInterval(() => {
                            this.recordingTime++;
                            if(this.recordingTime >= this.maxAudioTime) this.toggleRecord();
                            else {
                                const timeDisplay = document.querySelector('.font-mono');
                                if (timeDisplay) timeDisplay.textContent = `00:${String(this.recordingTime).padStart(2, '0')}`;
                            }
                        }, 1000);
                    } catch (e) {
                        glassSwal.fire('ข้อผิดพลาด', 'ไม่สามารถเข้าถึงไมโครโฟนได้', 'error');
                    }
                }
            },
            resetAudio: function() { 
                this.audioBlob = null; 
                this.recordingTime = 0; 
                this.showView('compose'); 
            },

            sendMessage: async function(isAnonymous = false) {
                const btnNormal = document.getElementById('btnSendNormal');
                const btnAnon = document.getElementById('btnSendAnon');
                const activeBtn = isAnonymous ? btnAnon : btnNormal;
                const originalHTML = activeBtn.innerHTML;

                let content = '';
                if(this.composeMode === 'text') {
                    content = document.getElementById('txtMessage').value.trim();
                    if(!content) return glassSwal.fire('แจ้งเตือน', 'กรุณาพิมพ์ข้อความ', 'warning');
                    if(content.length > this.maxChars) return glassSwal.fire('แจ้งเตือน', `จำกัดไม่เกิน ${this.maxChars} ตัวอักษร`, 'warning');
                } else {
                    if(!this.audioBlob) return glassSwal.fire('แจ้งเตือน', 'กรุณาอัดเสียงก่อนส่ง', 'warning');
                    content = await new Promise((res) => {
                        const reader = new FileReader();
                        reader.onloadend = () => res(reader.result);
                        reader.readAsDataURL(this.audioBlob);
                    });
                }

                btnNormal.disabled = true; btnAnon.disabled = true;
                activeBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> <span>กำลังส่ง...</span>';

                try {
                    const senderName = isAnonymous ? 'ผู้ไม่ประสงค์ออกนาม' : this.profile.name;
                    const messageData = {
                        from: { id: this.profile.studentId, name: senderName, isAnonymous: isAnonymous },
                        to: this.selectedIds,
                        type: this.composeMode,
                        content: content,
                        audioDuration: this.composeMode === 'audio' ? this.lastRecordingTime : null,
                        timestamp: Date.now()
                    };
                    const msgsRef = collection(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages');
                    await addDoc(msgsRef, messageData);
                    
                    glassSwal.fire({ 
                        iconHtml: isAnonymous ? '<i class="fa-solid fa-user-secret text-slate-700 text-5xl"></i>' : '<i class="fa-solid fa-check text-primary text-5xl"></i>',
                        title: 'ส่งเรียบร้อย!', showConfirmButton: false, timer: 1500 
                    });
                    this.selectedIds = []; this.audioBlob = null; this.recordingTime = 0;
                    if(this.profile.isPredefined || this.profile.isAdmin) this.showView('feed');
                    else this.showView('home');
                } catch (e) {
                    glassSwal.fire('ข้อผิดพลาด', 'ไม่สามารถส่งข้อความได้', 'error');
                    btnNormal.disabled = false; btnAnon.disabled = false; activeBtn.innerHTML = originalHTML;
                }
            },

            deleteMsg: async function(id) {
                glassSwal.fire({
                    title: 'ลบข้อความนี้?', 
                    html: "จะไม่สามารถกู้คืนได้", 
                    iconHtml: '<i class="fa-solid fa-trash-can text-red-400 text-5xl"></i>',
                    showCancelButton: true, confirmButtonText: 'ลบเลย', cancelButtonText: 'ยกเลิก'
                }).then(async (result) => {
                    if (result.isConfirmed) {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages', id));
                        glassSwal.fire({ iconHtml: '<i class="fa-solid fa-check text-primary text-5xl"></i>', title: 'ลบสำเร็จ!', showConfirmButton: false, timer: 1500 });
                    }
                });
            },

            deleteAllFiltered: async function() {
                const queryStr = this.adminSearchQuery.toLowerCase().trim();
                const toDelete = this.messages.filter(msg => {
                    if (msg.from.name.toLowerCase().includes(queryStr) || msg.from.id.toLowerCase().includes(queryStr)) return true;
                    let foundInTo = false;
                    msg.to.forEach(toId => {
                        if (toId.toLowerCase().includes(queryStr)) foundInTo = true;
                        const preUser = predefinedUsers.find(u => u.studentId === toId);
                        if (preUser && (preUser.name.toLowerCase().includes(queryStr) || preUser.fullName.toLowerCase().includes(queryStr))) foundInTo = true;
                    });
                    return foundInTo;
                });

                if (toDelete.length === 0) return;

                glassSwal.fire({
                    title: `ลบทั้งหมด ${toDelete.length} รายการ?`,
                    html: `การดำเนินการนี้จะลบข้อความทั้งหมดที่แสดงอยู่จากการค้นหา: <b>"${queryStr}"</b>`,
                    icon: 'warning', showCancelButton: true, confirmButtonText: 'ลบทั้งหมด', cancelButtonText: 'ยกเลิก'
                }).then(async (result) => {
                    if (result.isConfirmed) {
                        const batch = writeBatch(db);
                        toDelete.forEach(m => {
                            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages', m.id);
                            batch.delete(ref);
                        });
                        await batch.commit();
                        glassSwal.fire({ iconHtml: '<i class="fa-solid fa-check text-primary text-5xl"></i>', title: 'ลบสำเร็จ!', showConfirmButton: false, timer: 1500 });
                        this.setAdminSearch('');
                        const searchInput = document.querySelector('input[placeholder*="แอดมิน: ค้นหา"]');
                        if(searchInput) searchInput.value = '';
                    }
                });
            },

            factoryReset: async function() {
                const { value: password } = await glassSwal.fire({
                    title: 'ล้างข้อมูลทั้งหมด?',
                    html: 'ระบุรหัสแอดมินเพื่อยืนยันการล้างข้อมูลข้อความทั้งหมดในระบบ',
                    input: 'password',
                    inputPlaceholder: 'รหัสแอดมิน 8 หลัก',
                    showCancelButton: true,
                    confirmButtonText: 'ยืนยัน',
                    cancelButtonText: 'ยกเลิก'
                });

                if (password === '65030900') {
                    glassSwal.fire({
                        title: 'คุณแน่ใจจริงๆ ใช่ไหม?',
                        text: "ข้อมูลข้อความทั้งหมดจะถูกลบถาวร!",
                        icon: 'error',
                        showCancelButton: true,
                        confirmButtonText: 'ล้างระบบทันที!',
                        cancelButtonText: 'ยกเลิก'
                    }).then(async (result) => {
                        if (result.isConfirmed) {
                            const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages'));
                            const batch = writeBatch(db);
                            snap.forEach(d => batch.delete(d.ref));
                            await batch.commit();
                            glassSwal.fire({ iconHtml: '<i class="fa-solid fa-check text-primary text-5xl"></i>', title: 'ล้างระบบสำเร็จ!', showConfirmButton: false, timer: 1500 });
                        }
                    });
                } else if (password) {
                    glassSwal.fire('รหัสไม่ถูกต้อง', '', 'error');
                }
            },

            setAdminSearch: function(val) {
                this.adminSearchQuery = val;
                const container = document.getElementById('inboxMessageContainer');
                const groupHeader = document.getElementById('searchGroupHeader');
                if (container) container.innerHTML = this.renderInboxMessagesList();
                if (groupHeader) groupHeader.innerHTML = this.renderSearchHeader();
            },

            renderSearchHeader: function() {
                if (!this.profile.isAdmin || this.adminSearchQuery.trim() === '') return '';
                const queryStr = this.adminSearchQuery.toLowerCase().trim();
                const count = this.messages.filter(msg => {
                    if (msg.from.name.toLowerCase().includes(queryStr) || msg.from.id.toLowerCase().includes(queryStr)) return true;
                    let foundInTo = false;
                    msg.to.forEach(toId => {
                        if (toId.toLowerCase().includes(queryStr)) foundInTo = true;
                        const preUser = predefinedUsers.find(u => u.studentId === toId);
                        if (preUser && (preUser.name.toLowerCase().includes(queryStr) || preUser.fullName.toLowerCase().includes(queryStr))) foundInTo = true;
                    });
                    return foundInTo;
                }).length;

                return `
                    <div class="bg-primary/10 border border-primary/20 p-4 rounded-2xl flex flex-col sm:flex-row justify-between items-center mb-6 animate-fadeIn gap-3">
                        <div class="text-primary font-bold text-sm">
                            พบ <span class="text-lg">${count}</span> รายการที่ตรงกับ "${this.adminSearchQuery}"
                        </div>
                        <button onclick="app.deleteAllFiltered()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-md transition-all flex items-center justify-center gap-2">
                            <i class="fa-solid fa-trash-sweep"></i> ลบรายการที่ค้นหาทั้งหมด
                        </button>
                    </div>`;
            },

            renderInboxMessagesList: function() {
                let displayMessages = this.messages;
                if (this.profile.isAdmin && this.adminSearchQuery.trim() !== '') {
                    const queryStr = this.adminSearchQuery.toLowerCase().trim();
                    displayMessages = this.messages.filter(msg => {
                        if (msg.from.name.toLowerCase().includes(queryStr) || msg.from.id.toLowerCase().includes(queryStr)) return true;
                        let foundInTo = false;
                        msg.to.forEach(toId => {
                            if (toId.toLowerCase().includes(queryStr)) foundInTo = true;
                            const preUser = predefinedUsers.find(u => u.studentId === toId);
                            if (preUser && (preUser.name.toLowerCase().includes(queryStr) || preUser.fullName.toLowerCase().includes(queryStr))) foundInTo = true;
                        });
                        return foundInTo;
                    });
                }

                let msgsHTML = '';
                if(displayMessages.length === 0) {
                    msgsHTML = `
                        <div class="text-center py-20 flex flex-col items-center justify-center animate-fade-in">
                            <i class="fa-solid fa-envelope-open text-5xl text-white/30 mb-4"></i>
                            <p class="text-white/90 font-bold text-lg">${this.profile.isAdmin && this.adminSearchQuery ? 'ไม่พบข้อมูลที่ค้นหา' : 'ยังไม่มีข้อความ'}</p>
                        </div>`;
                } else {
                    displayMessages.forEach((msg, idx) => {
                        const dateStr = new Date(msg.timestamp).toLocaleString('th-TH');
                        const isAudio = msg.type === 'audio';
                        const isAnonymous = msg.from.isAnonymous;
                        let senderImg = '';
                        let displayName = msg.from.name;
                        
                        const adminControls = this.profile.isAdmin ? `
                            <button onclick="app.deleteMsg('${msg.id}')" class="text-red-400 hover:text-red-600 bg-white/80 p-2 rounded-lg transition-all shadow-sm">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>` : '';
                        
                        if (this.profile.isAdmin && isAnonymous) {
                             const realSender = predefinedUsers.find(u => u.studentId === msg.from.id);
                             displayName += ` <span class="text-[10px] text-red-500 bg-red-50 px-1 rounded ml-1 border border-red-100">(${realSender ? realSender.name : msg.from.id})</span>`;
                        }

                        if (isAnonymous) {
                             senderImg = `<div class="w-full h-full flex items-center justify-center bg-slate-700 text-white rounded-full"><i class="fa-solid fa-user-secret text-lg"></i></div>`;
                        } else {
                            const sender = predefinedUsers.find(u => u.studentId === msg.from.id);
                            // Fixed: Abr text z-index and hidden logic
                            senderImg = sender ? 
                                `${app.renderImage(`${GITHUB_IMG_BASE_URL}/${sender.id}.png`, msg.from.name)}<span class="fallback-name absolute inset-0 z-10 hidden flex-center-all text-primary w-full h-full text-sm font-bold bg-secondary">${this.getAbbr(msg.from.name)}</span>` : 
                                `<span class="text-primary flex-center-all w-full h-full text-sm font-bold">${this.getAbbr(msg.from.name)}</span>`;
                        }

                        msgsHTML += `
                        <div class="bg-white/60 backdrop-blur-md border border-white/60 p-4 rounded-[2rem] flex flex-col sm:flex-row gap-4 shadow-lg hover:shadow-xl transition-all group animate-slide-up w-full" style="animation-delay: ${idx * 15}ms">
                            <div class="flex items-center justify-between sm:block">
                                <div class="flex items-center gap-3">
                                    <div class="w-12 h-12 bg-secondary rounded-full flex items-center justify-center font-bold shadow-md relative overflow-hidden border-2 border-white">
                                        ${senderImg}
                                    </div>
                                    <div class="sm:hidden min-w-0 flex-1">
                                        <div class="font-extrabold text-primary text-sm truncate">${displayName}</div>
                                        <div class="text-[9px] text-primary/60"><i class="fa-regular fa-clock mr-1"></i> ${dateStr}</div>
                                    </div>
                                </div>
                                <div class="sm:hidden">${adminControls}</div>
                            </div>
                            <div class="flex-1 w-full min-w-0">
                                <div class="hidden sm:flex justify-between items-start mb-2">
                                    <div class="min-w-0 flex-1">
                                        <span class="font-extrabold text-primary text-base truncate block">${displayName}</span>
                                        <div class="text-[10px] text-primary/60"><i class="fa-regular fa-clock mr-1"></i> ${dateStr}</div>
                                    </div>
                                    <div class="opacity-0 group-hover:opacity-100 transition-opacity ml-2 shrink-0">${adminControls}</div>
                                </div>
                                ${isAudio ? `
                                    <div class="bg-white/90 p-2 rounded-xl border border-white w-fit shadow-sm max-w-full">
                                        <audio src="${msg.content}" controls class="h-8 w-[200px] max-w-full"></audio>
                                    </div>` : `
                                    <div class="text-primary bg-white/80 border border-white/50 px-5 py-3 rounded-2xl shadow-sm text-sm relative font-medium w-fit max-w-full">
                                        <i class="fa-solid fa-quote-left absolute top-2 left-3 text-xl text-primary/20"></i>
                                        <div class="pl-6 pt-1 break-words">${msg.content.trim()}</div>
                                    </div>`}
                            </div>
                        </div>`;
                    });
                }
                return msgsHTML;
            },

            renderInbox: function() {
                let adminControlsHTML = '';
                if (this.profile.isAdmin) {
                    adminControlsHTML = `
                        <div class="mb-6 space-y-4">
                            <div class="relative">
                                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-white/70 text-sm"></i>
                                <input type="text" placeholder="แอดมิน: ค้นหาด้วยชื่อ หรือรหัส..." 
                                    class="w-full pl-10 pr-4 py-3 rounded-xl bg-white/30 border border-white/40 outline-none transition-all text-sm font-medium text-white placeholder:text-white/80 shadow-inner"
                                    onkeyup="app.setAdminSearch(this.value)" value="${this.adminSearchQuery}">
                            </div>
                            <div id="searchGroupHeader">
                                ${this.renderSearchHeader()}
                            </div>
                        </div>`;
                }

                return `
                <div class="glass-card rounded-[2rem] p-4 sm:p-8 shadow-2xl max-w-3xl mx-auto min-h-[75vh] animate-slide-up relative flex flex-col">
                    <div class="flex items-center justify-between mb-6 border-b border-white/40 pb-5">
                        <div class="flex items-center">
                            <button onclick="app.showView(app.profile.isPredefined ? 'feed' : 'home')" class="p-3 bg-white/20 hover:bg-white/40 rounded-2xl mr-4 transition text-white shadow-sm">
                                <i class="fa-solid fa-arrow-left text-xl"></i>
                            </button>
                            <div>
                                <h2 class="text-xl font-extrabold text-white drop-shadow-md">กล่องจดหมาย</h2>
                                <p class="text-blue-100 text-xs font-bold">${this.profile.isAdmin ? 'แผงควบคุมผู้ดูแลระบบ' : 'ข้อความถึงคุณ'}</p>
                            </div>
                        </div>
                        ${this.profile.isAdmin ? `
                            <button onclick="app.factoryReset()" class="bg-red-500/80 hover:bg-red-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg transition-all">
                                <i class="fa-solid fa-triangle-exclamation mr-1"></i> ล้างระบบ
                            </button>` : ''}
                    </div>
                    ${adminControlsHTML}
                    <div id="inboxMessageContainer" class="flex-1 overflow-y-auto pr-1 space-y-4 relative z-10 custom-scrollbar">
                        ${this.renderInboxMessagesList()}
                    </div>
                </div>`;
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            // Force scroll to top on refresh
            if ('scrollRestoration' in history) {
                history.scrollRestoration = 'manual';
            }
            window.scrollTo(0, 0);
            
            app.init();
        });
    </script>
</body>
</html>
