            viewUserHistory: async function(uid) {
                glassSwal.fire({
                    title: 'กำลังโหลดข้อมูล...',
                    html: '<i class="fa-solid fa-circle-notch fa-spin text-4xl text-primary mt-4 mb-3"></i>',
                    showConfirmButton: false,
                    allowOutsideClick: false
                });

                try {
                    const sessionsRef = collection(db, 'artifacts', appId, 'public', 'data', 'song_siang_sessions');
                    const sessionsSnap = await getDocs(sessionsRef);
                    
                    let sessions = sessionsSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(s => s.uid === uid);
                    sessions.sort((a, b) => a.loginAt - b.loginAt); 

                    const userMessages = this.allMessages.filter(m => m.from.id === uid);
                    userMessages.sort((a, b) => a.timestamp - b.timestamp);

                    sessions.forEach(session => { session.messages = []; });
                    let legacyMessages = [];

                    userMessages.forEach(msg => {
                        let targetSession = null;
                        for (let i = sessions.length - 1; i >= 0; i--) {
                            if (sessions[i].loginAt <= msg.timestamp) {
                                targetSession = sessions[i];
                                break;
                            }
                        }
                        if (targetSession) {
                            targetSession.messages.push(msg);
                        } else {
                            legacyMessages.push(msg); 
                        }
                    });

                    if (legacyMessages.length > 0) {
                        sessions.unshift({
                            id: 'legacy',
                            loginAt: legacyMessages[0].timestamp,
                            logoutAt: null,
                            messages: legacyMessages,
                            isLegacy: true
                        });
                    }

                    sessions.reverse();

                    let html = `<div class="max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar text-left mt-2">`;
                    html += `<div class="mb-4 text-center"><span class="bg-secondary text-primary font-bold px-3 py-1 rounded-full text-xs shadow-sm">เข้าใช้งานทั้งหมด ${sessions.filter(s=>!s.isLegacy).length} ครั้ง</span></div>`;

                    if (sessions.length === 0) {
                        html += `<p class="text-center text-gray-500 py-6 font-medium">ไม่พบประวัติการเข้าใช้งาน</p>`;
                    } else {
                        sessions.forEach((s, idx) => {
                            const loginDate = new Date(s.loginAt).toLocaleString('th-TH');
                            let durationStr = "ไม่ระบุเวลาออก";
                            
                            if (s.isLegacy) {
                                durationStr = "ข้อความเก่าก่อนมีระบบเก็บประวัติ";
                            } else if (s.logoutAt) {
                                const diffMins = Math.max(1, Math.round((s.logoutAt - s.loginAt) / 60000));
                                durationStr = `${diffMins} นาที`;
                            } else if (s.messages.length > 0) {
                                const lastMsgTime = s.messages[s.messages.length - 1].timestamp;
                                const diffMins = Math.max(1, Math.round((lastMsgTime - s.loginAt) / 60000));
                                durationStr = `~${diffMins} นาที (อิงจากข้อความล่าสุด)`;
                            }

                            let msgsHtml = '';
                            if (s.messages.length > 0) {
                                msgsHtml = `<div class="mt-2 space-y-2 border-l-2 border-primary/30 pl-3 py-1">`;
                                s.messages.forEach(m => {
                                    const mTime = new Date(m.timestamp).toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
                                    const contentPreview = m.type === 'audio' ? 
                                        `<i class="fa-solid fa-microphone text-secondary mr-1 drop-shadow-sm"></i> เสียง (${m.audioDuration}วิ)` : 
                                        `"${m.content.substring(0, 30)}${m.content.length > 30 ? '...' : ''}"`;
                                    msgsHtml += `
                                        <div class="text-xs bg-white/70 p-2 rounded-lg border border-gray-200 shadow-sm">
                                            <span class="font-extrabold text-primary mr-1 text-[10px] bg-primary/10 px-1.5 py-0.5 rounded">[${mTime}]</span> 
                                            <span class="text-gray-700 font-medium">${contentPreview}</span>
                                        </div>`;
                                });
                                msgsHtml += `</div>`;
                            } else {
                                msgsHtml = `<p class="text-xs text-gray-400 italic mt-2 ml-2">- ไม่มีการส่งข้อความในครั้งนี้ -</p>`;
                            }

                            const sessionTitle = s.isLegacy ? 'ข้อมูลเก่า' : `ครั้งที่ ${sessions.filter(ses=>!ses.isLegacy).length - (sessions.filter(ses=>!ses.isLegacy).indexOf(s))}`;

                            html += `
                            <div class="mb-4 bg-gray-50 p-4 rounded-2xl border border-gray-200 shadow-sm relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-1 h-full bg-secondary"></div>
                                <div class="flex justify-between items-start mb-2">
                                    <div class="font-extrabold text-primary text-sm">${sessionTitle}</div>
                                    <div class="text-[10px] bg-blue-100 text-blue-800 px-2 py-1 rounded-full font-bold shadow-sm whitespace-nowrap ml-2"><i class="fa-regular fa-hourglass-half mr-1"></i> ${durationStr}</div>
                                </div>
                                <div class="text-[11px] text-gray-500 mb-2 font-medium"><i class="fa-solid fa-right-to-bracket mr-1"></i> เข้าสู่ระบบ: ${loginDate}</div>
                                ${msgsHtml}
                            </div>`;
                        });
                    }
                    html += `</div>`;

                    const user = predefinedUsers.find(u => u.studentId === uid) || this.registeredUsers.find(r => r.id === uid);
                    const userName = user ? user.name : uid;

                    glassSwal.fire({
                        title: `ประวัติการใช้งาน`,
                        html: `<div class="text-sm font-bold text-gray-600 mb-1">ของ ${userName}</div>${html}`,
                        confirmButtonText: 'ปิดหน้าต่าง',
                        customClass: {
                            popup: 'rounded-[2rem] border border-white/50 shadow-2xl backdrop-blur-xl w-[95%] max-w-lg bg-white/95',
                            title: 'text-primary font-extrabold text-xl md:text-2xl mt-2',
                            confirmButton: 'bg-secondary text-primary rounded-xl px-6 py-3 font-bold shadow-lg transition hover:scale-105 w-full mt-2',
                        }
                    });

                } catch (err) {
                    console.error("Error fetching history:", err);
                    glassSwal.fire('ข้อผิดพลาด', 'ไม่สามารถโหลดข้อมูลประวัติได้', 'error');
                }
            },

            viewAllHistory: async function() {
                glassSwal.fire({
                    title: 'กำลังโหลดข้อมูล...',
                    html: '<i class="fa-solid fa-circle-notch fa-spin text-4xl text-primary mt-4 mb-3"></i>',
                    showConfirmButton: false,
                    allowOutsideClick: false
                });

                try {
                    const correctSessionsRef = collection(db, 'artifacts', appId, 'public', 'data', 'song_siang_sessions');
                    const sessionsSnap = await getDocs(correctSessionsRef);
                    
                    let allFetchedSessions = sessionsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                    allFetchedSessions.sort((a, b) => a.loginAt - b.loginAt); 

                    let displaySessions = [...allFetchedSessions].sort((a, b) => b.loginAt - a.loginAt);
                    
                    let html = `<div class="max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar text-left mt-2">`;
                    html += `<div class="mb-4 text-center"><span class="bg-secondary text-primary font-bold px-3 py-1 rounded-full text-xs shadow-sm">ประวัติการใช้งานทั้งหมด (${displaySessions.length} รายการ)</span></div>`;

                    if (displaySessions.length === 0) {
                        html += `<p class="text-center text-gray-500 py-6 font-medium">ไม่พบประวัติการเข้าใช้งาน</p>`;
                    } else {
                        displaySessions.forEach((s) => {
                            const loginDate = new Date(s.loginAt).toLocaleString('th-TH');
                            
                            const userSessions = allFetchedSessions.filter(ses => ses.uid === s.uid);
                            const currentIdx = userSessions.findIndex(ses => ses.id === s.id);
                            const nextSession = userSessions[currentIdx + 1];
                            
                            const endTime = s.logoutAt || (nextSession ? nextSession.loginAt - 1 : Date.now());

                            const sessionMessages = this.allMessages.filter(m => 
                                m.from.id === s.uid && 
                                m.timestamp >= s.loginAt && 
                                m.timestamp <= endTime
                            );
                            sessionMessages.sort((a, b) => a.timestamp - b.timestamp);

                            let durationStr = "ไม่ระบุเวลาออก";
                            if (s.logoutAt) {
                                const diffMins = Math.max(1, Math.round((s.logoutAt - s.loginAt) / 60000));
                                durationStr = `${diffMins} นาที`;
                            } else if (sessionMessages.length > 0) {
                                const lastMsgTime = sessionMessages[sessionMessages.length - 1].timestamp;
                                const diffMins = Math.max(1, Math.round((lastMsgTime - s.loginAt) / 60000));
                                durationStr = `~${diffMins} นาที (อิงจากข้อความล่าสุด)`;
                            } else {
                                const diffNow = Math.round((Date.now() - s.loginAt) / 60000);
                                if (diffNow < 120) durationStr = `กำลังใช้งาน (~${diffNow} นาที)`;
                            }

                            let msgsHtml = '';
                            if (sessionMessages.length > 0) {
                                msgsHtml = `<div class="mt-2 space-y-2 border-l-2 border-primary/30 pl-3 py-1">`;
                                sessionMessages.forEach(m => {
                                    const mTime = new Date(m.timestamp).toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});
                                    const contentPreview = m.type === 'audio' ? 
                                        `<i class="fa-solid fa-microphone text-secondary mr-1 drop-shadow-sm"></i> เสียง (${m.audioDuration}วิ)` : 
                                        `"${m.content.substring(0, 30)}${m.content.length > 30 ? '...' : ''}"`;
                                    msgsHtml += `
                                        <div class="text-xs bg-white/70 p-2 rounded-lg border border-gray-200 shadow-sm">
                                            <span class="font-extrabold text-primary mr-1 text-[10px] bg-primary/10 px-1.5 py-0.5 rounded">[${mTime}]</span> 
                                            <span class="text-gray-700 font-medium">${contentPreview}</span>
                                        </div>`;
                                });
                                msgsHtml += `</div>`;
                            } else {
                                msgsHtml = `<p class="text-xs text-gray-400 italic mt-2 ml-2">- ไม่มีการส่งข้อความ -</p>`;
                            }

                            const user = predefinedUsers.find(u => u.studentId === s.uid) || this.registeredUsers.find(r => r.id === s.uid);
                            const userName = user ? user.name : s.uid;
                            const isGuest = s.uid.startsWith('G');
                            const badge = isGuest ? '<span class="bg-blue-500 text-white px-1.5 py-0.5 rounded text-[8px] ml-1">Guest</span>' : '';

                            html += `
                            <div class="mb-4 bg-gray-50 p-4 rounded-2xl border border-gray-200 shadow-sm relative overflow-hidden">
                                <div class="absolute top-0 left-0 w-1 h-full bg-secondary"></div>
                                <div class="flex justify-between items-start mb-2">
                                    <div class="font-extrabold text-primary text-sm flex items-center">
                                        <i class="fa-solid fa-user-circle mr-2 text-secondary text-lg"></i>
                                        ${userName} ${badge}
                                    </div>
                                    <div class="text-[10px] bg-blue-100 text-blue-800 px-2 py-1 rounded-full font-bold shadow-sm whitespace-nowrap ml-2"><i class="fa-regular fa-hourglass-half mr-1"></i> ${durationStr}</div>
                                </div>
                                <div class="text-[11px] text-gray-500 mb-2 font-medium"><i class="fa-solid fa-right-to-bracket mr-1"></i> เข้าสู่ระบบ: ${loginDate}</div>
                                ${msgsHtml}
                            </div>`;
                        });
                    }
                    html += `</div>`;

                    glassSwal.fire({
                        title: `ประวัติการใช้งานรวม`,
                        html: html,
                        confirmButtonText: 'ปิดหน้าต่าง',
                        customClass: {
                            popup: 'rounded-[2rem] border border-white/50 shadow-2xl backdrop-blur-xl w-[95%] max-w-lg bg-white/95',
                            title: 'text-primary font-extrabold text-xl md:text-2xl mt-2',
                            confirmButton: 'bg-secondary text-primary rounded-xl px-6 py-3 font-bold shadow-lg transition hover:scale-105 w-full mt-2',
                        }
                    });

                } catch (err) {
                    console.error("Error fetching all history:", err);
                    glassSwal.fire('ข้อผิดพลาด', 'ไม่สามารถโหลดข้อมูลประวัติรวมได้', 'error');
                }
            },

            deleteAllFilteredMembers: async function() {
                const filtered = this.getFilteredUsers();
                if (filtered.length === 0) return;

                glassSwal.fire({
                    title: `ลบข้อมูล ${filtered.length} สมาชิก?`,
                    html: `การดำเนินการนี้จะลบข้อมูลสถานะสมาชิกที่ค้นหาทั้งหมด (เฉพาะสมาชิกที่เคยเข้าระบบ)`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonText: 'ลบข้อมูลทั้งหมด',
                    cancelButtonText: 'ยกเลิก'
                }).then(async (result) => {
                    if (result.isConfirmed) {
                        const batch = writeBatch(db);
                        filtered.forEach(u => {
                            if (this.registeredUsers.some(r => r.id === u.studentId)) {
                                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_user_status', u.studentId);
                                batch.delete(ref);
                            }
                        });
                        await batch.commit();
                        glassSwal.fire({ iconHtml: '<i class="fa-solid fa-check text-primary text-5xl"></i>', title: 'ดำเนินการสำเร็จ!', showConfirmButton: false, timer: 1000 });
                        this.memberSearchQuery = '';
                        this.renderUserManagementUI();
                    }
                });
            },

            toggleUserBlock: async function(uid, currentlyBlocked) {
                const action = currentlyBlocked ? 'ปลดบล็อก' : 'บล็อก';
                glassSwal.fire({
                    title: `${action}สมาชิก?`,
                    text: currentlyBlocked ? 'สมาชิกจะสามารถกลับมาใช้งานระบบได้ปกติ' : 'สมาชิกจะไม่สามารถเข้าสู่ระบบและใช้งานได้',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonText: action,
                    cancelButtonText: 'ยกเลิก'
                }).then(async (result) => {
                    if (result.isConfirmed) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_user_status', uid), {
                            isBlocked: !currentlyBlocked
                        }, { merge: true });
                        glassSwal.fire({ iconHtml: '<i class="fa-solid fa-check text-primary text-5xl"></i>', title: 'ดำเนินการสำเร็จ!', showConfirmButton: false, timer: 1000 });
                    }
                });
            },

            deleteUserFromSystem: async function(uid) {
                glassSwal.fire({
                    title: 'ลบข้อมูลสมาชิก?',
                    text: 'ข้อมูลสถานะการเข้าสู่ระบบจะถูกลบ ข้อมูลการล็อกอินจะถูกล้าง',
                    icon: 'error',
                    showCancelButton: true,
                    confirmButtonText: 'ลบข้อมูล',
                    cancelButtonText: 'ยกเลิก'
                }).then(async (result) => {
                    if (result.isConfirmed) {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_user_status', uid));
                        glassSwal.fire({ iconHtml: '<i class="fa-solid fa-check text-primary text-5xl"></i>', title: 'ลบเรียบร้อย!', showConfirmButton: false, timer: 1000 });
                    }
                });
            },

            viewFeedMessage: function(msgId) {
                const msg = this.allMessages.find(m => m.id === msgId);
                if(!msg) return;
                
                const isAnonymous = msg.from.isAnonymous;
                let displayName = isAnonymous ? 'ผู้ไม่ประสงค์ออกนาม' : msg.from.name;
                
                if (this.profile.isAdmin && isAnonymous) {
                     const realSender = predefinedUsers.find(u => u.studentId === msg.from.id);
                     if(realSender) displayName += ` (${realSender.name})`;
                }

                let recipientInfo = '';
                const toCount = msg.to && Array.isArray(msg.to) ? msg.to.length : 0;
                const isEveryone = toCount >= predefinedUsers.length;
                
                if (isEveryone) {
                    recipientInfo = `<div class="mb-2 text-center cursor-pointer hover:underline text-[10px] text-gray-500 font-medium" onclick="app.showRecipientList('${msg.id}')"><i class="fa-solid fa-users mr-1"></i>ส่งถึงทุกคน</div>`;
                } else if (toCount > 1) {
                    recipientInfo = `<div class="mb-2 text-center cursor-pointer hover:underline text-[10px] text-gray-500 font-medium" onclick="app.showRecipientList('${msg.id}')"><i class="fa-solid fa-user-group mr-1"></i>ส่งถึง ${toCount} คน</div>`;
                }

                const shareBtn = `
                <div class="mt-2 pt-2 border-t border-gray-100 text-center -mb-1">
                    <button onclick="app.openSharePreview('${msg.id}')" class="text-[12px] text-primary/60 hover:text-primary font-bold transition-colors">
                        บันทึก หรือแชร์ <i class="fa-solid fa-chevron-right ml-1 text-[10px]"></i>
                    </button>
                </div>`;

                if (msg.type === 'audio') {
                    glassSwal.fire({
                        title: `เสียงจาก ${displayName}`,
                        html: `<audio src="${msg.content}" controls autoplay class="w-full mt-2 mb-3"></audio>${recipientInfo}${shareBtn}`,
                        showConfirmButton: true,
                        confirmButtonText: 'ปิดหน้าต่าง'
                    });
                } else {
                    glassSwal.fire({
                        title: `ข้อความจาก ${displayName}`,
                        html: `<div class="mt-2 mb-3 p-4 bg-white/70 rounded-2xl text-left text-primary border border-white/50 whitespace-pre-wrap break-words font-medium shadow-inner relative"><i class="fa-solid fa-quote-left absolute top-3 left-3 text-xl text-primary/20"></i><div class="pl-6 pt-1">${msg.content.trim()}</div></div>${recipientInfo}${shareBtn}`,
                        showConfirmButton: true,
                        confirmButtonText: 'ปิดหน้าต่าง'
                    });
                }
            },

            refreshLinkExpiry: async function(msgId) {
                try {
                    const msgRef = doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages', msgId);
                    await updateDoc(msgRef, {
                        linkExpiryAt: Date.now()
                    });
                } catch(e) {
                    console.error("Failed to refresh link expiry", e);
                }
            },

            copyShareLink: async function(msgId) {
                await this.refreshLinkExpiry(msgId);
                
                const link = `${window.location.origin}${window.location.pathname}?m=${msgId}`;
                const textArea = document.createElement("textarea");
                textArea.value = link;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    glassSwal.fire({ title: 'คัดลอกลิงก์แชร์แล้ว!', text: `จะหมดอายุใน ${this.shareExpiryMinutes} นาที`, iconHtml: '<i class="fa-solid fa-circle-check text-primary text-5xl drop-shadow-md"></i>', timer: 1200, showConfirmButton: false });
                } catch (err) {
                    glassSwal.fire('ข้อผิดพลาด', 'ไม่สามารถคัดลอกลิงก์ได้', 'error');
                }
                document.body.removeChild(textArea);
            },

            openSharePreview: async function(msgId) {
                glassSwal.fire({
                    title: 'กำลังเตรียมรูปภาพ...',
                    html: '<div class="flex flex-col items-center"><i class="fa-solid fa-circle-notch fa-spin text-4xl text-primary mt-4 mb-3"></i><p class="text-sm text-gray-600 font-bold">กำลังประมวลผลรูปภาพขั้นสูง...</p><p class="text-[10px] text-gray-400 mt-1">(อาจใช้เวลา 5-6 วินาที เพื่อภาพที่คมชัดและสมบูรณ์ที่สุด)</p></div>',
                    showConfirmButton: false,
                    allowOutsideClick: false
                });

                try {
                    await document.fonts.load('400 16px "Prompt"');
                    await document.fonts.load('800 16px "Prompt"');
                    await document.fonts.ready;
                } catch(e) { console.warn("Font loading wait failed"); }

                const msg = this.allMessages.find(m => m.id === msgId);
                if(!msg) { glassSwal.close(); return; }
                
                const isAnonymous = msg.from.isAnonymous;
                let displayName = isAnonymous ? 'ผู้ไม่ประสงค์ออกนาม' : msg.from.name;
                
                if (this.profile.isAdmin && isAnonymous) {
                     const realSender = predefinedUsers.find(u => u.studentId === msg.from.id);
                     if(realSender) displayName += ` (${realSender.name})`;
                }

                let senderImgInside = '';
                const abbr = this.getAbbr(msg.from.name);
                
                const fetchAsBase64 = (url) => {
                    return new Promise((resolve) => {
                        const img = new Image();
                        img.crossOrigin = 'anonymous';
                        img.onload = () => {
                            try {
                                const canvas = document.createElement('canvas');
                                canvas.width = img.width;
                                canvas.height = img.height;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0);
                                resolve(canvas.toDataURL('image/png'));
                            } catch (e) {
                                resolve(null);
                            }
                        };
                        img.onerror = () => resolve(null);
                        img.src = url;
                    });
                };

                if (isAnonymous) {
                    senderImgInside = `<div class="w-12 h-12 rounded-full bg-slate-700 flex items-center justify-center shrink-0 border border-gray-200 relative z-10" style="background-color: #334155;"><svg class="w-6 h-6 fill-current text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M224 256c70.7 0 128-57.3 128-128S294.7 0 224 0 96 57.3 96 128s57.3 128 128 128zm-45.7 48C79.8 304 0 383.8 0 482.3C0 498.7 13.3 512 29.7 512H418.3c16.4 0 29.7-13.3 29.7-29.7C448 383.8 368.2 304 269.7 304H178.3z"/></svg></div>`;
                } else {
                    const sender = predefinedUsers.find(u => u.studentId === msg.from.id);
                    if (sender) {
                        const imgSrc = `${GITHUB_IMG_BASE_URL}/${sender.id}.png`;
                        const base64 = await fetchAsBase64(imgSrc);
                        if (base64) {
                            senderImgInside = `<img src="${base64}" class="w-12 h-12 rounded-full object-cover shrink-0 border border-gray-200 relative z-10" style="background-color: #fddf31;">`;
                        } else {
                            senderImgInside = `<div class="w-12 h-12 rounded-full bg-[#fddf31] flex items-center justify-center shrink-0 border border-gray-200 relative z-10" style="background-color: #fddf31;"><span class="text-[#2b71b8] font-bold text-lg">${abbr}</span></div>`;
                        }
                    } else {
                        senderImgInside = `<div class="w-12 h-12 rounded-full bg-[#fddf31] flex items-center justify-center shrink-0 border border-gray-200 relative z-10" style="background-color: #fddf31;"><span class="text-[#2b71b8] font-bold text-lg">${abbr}</span></div>`;
                    }
                }
                
                const dateStr = new Date(msg.timestamp).toLocaleString('th-TH');

                const cardHtml = `
                    <div id="capture-card" class="bg-white border-[3px] border-[#2b71b8] rounded-[2rem] w-full mx-auto text-left flex flex-col relative" style="font-family: 'Prompt', sans-serif !important; box-sizing: border-box; width: 340px; visibility: visible;">
                        <div class="p-5 flex flex-col h-full bg-white rounded-[1.8rem]">
                            <div class="flex items-center gap-3 mb-3 border-b border-gray-100 pb-3">
                                ${senderImgInside}
                                <div class="flex flex-col justify-center min-w-0 flex-1">
                                    <span class="font-extrabold text-[#2b71b8] text-[16px] leading-tight" style="word-break: break-word;">${displayName}</span>
                                    <span class="text-[10px] text-gray-500 mt-0.5 flex items-center">
                                        <svg class="w-3 h-3 fill-current mr-1 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M256 0a256 256 0 1 1 0 512A256 256 0 1 1 256 0zM232 120V256c0 8 4 15.5 10.7 20l96 64c11 7.4 25.9 4.4 33.3-6.7s4.4-25.9-6.7-33.3L280 243.2V120c0-13.3-10.7-24-24-24s-24 10.7-24 24z"/></svg>
                                        ${dateStr}
                                    </span>
                                </div>
                            </div>
                            <div class="relative flex-1 flex flex-col justify-center w-full">
                                ${msg.type === 'text' ? `
                                    <div class="w-full bg-[#f8f9fa] rounded-2xl p-4 pt-5 pb-4 relative border border-gray-100" style="box-sizing: border-box;">
                                        <svg class="absolute top-2 left-3 w-4 h-4 text-[#2b71b8]/20 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><path d="M0 216C0 149.7 53.7 96 120 96h8c17.7 0 32 14.3 32 32s-14.3 32-32 32h-8c-30.9 0-56 25.1-56 56v8h64c35.3 0 64 28.7 64 64v64c0 35.3-28.7 64-64 64H64c-35.3 0-64-28.7-64-64V320 288 216zm256 0c0-66.3 53.7-120 120-120h8c17.7 0 32 14.3 32 32s-14.3 32-32 32h-8c-30.9 0-56 25.1-56 56v8h64c35.3 0 64 28.7 64 64v64c0 35.3-28.7 64-64 64H320c-35.3 0-64-28.7-64-64V320 288 216z"/></svg>
                                        <div class="text-[#2b71b8] text-[14px] font-medium leading-relaxed whitespace-pre-wrap break-words pl-5 relative z-10">${msg.content.trim()}</div>
                                    </div>
                                ` : `
                                    <div class="w-full bg-[#f8f9fa] rounded-2xl p-4 border border-gray-100 flex items-center justify-start gap-3" style="box-sizing: border-box;">
                                        <div class="w-10 h-10 rounded-full bg-[#fddf31] flex items-center justify-center text-[#2b71b8] shrink-0" style="background-color: #fddf31;">
                                            <svg class="w-4 h-4 fill-current ml-1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><path d="M73 39c-14.8-9.1-33.4-9.4-48.5-.9S0 62.6 0 80V432c0 17.4 9.4 33.4 24.5 41.9s33.7 8.1 48.5-.9L361 297c14.3-8.7 23-24.2 23-41s-8.7-32.2-23-41L73 39z"/></svg>
                                        </div>
                                        <span class="font-bold text-[#2b71b8] text-[14px] whitespace-nowrap">คลิปเสียง (${msg.audioDuration || '?'} วิ)</span>
                                    </div>
                                `}
                            </div>
                            <div class="mt-4 flex items-center justify-center opacity-30 text-center">
                                <span class="text-[9px] font-black text-slate-800 tracking-[0.3em] uppercase">SONG SIANG</span>
                            </div>
                        </div>
                    </div>
                `;
                
                const offscreenContainer = document.getElementById('offscreenRenderer');
                offscreenContainer.innerHTML = cardHtml;

                try {
                    const cardToCapture = offscreenContainer.querySelector('#capture-card');
                    
                    const imgs = cardToCapture.querySelectorAll('img');
                    await Promise.all(Array.from(imgs).map(img => {
                        if (img.complete && img.naturalHeight !== 0) return Promise.resolve();
                        return new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });
                    }));

                    void cardToCapture.offsetWidth;
                    await new Promise(r => setTimeout(r, 500));

                    try { await htmlToImage.toPng(cardToCapture, { cacheBust: true, useCORS: true, pixelRatio: 1 }); } catch (e) {}
                    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
                    await new Promise(r => setTimeout(r, 1000));

                    try { await htmlToImage.toPng(cardToCapture, { cacheBust: true, useCORS: true, pixelRatio: 2 }); } catch (e) {}
                    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
                    await new Promise(r => setTimeout(r, 1000));

                    try { await htmlToImage.toPng(cardToCapture, { cacheBust: true, useCORS: true, pixelRatio: 3 }); } catch (e) {}
                    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
                    await new Promise(r => setTimeout(r, 2000));

                    const dataUrl = await htmlToImage.toPng(cardToCapture, {
                        quality: 1,
                        pixelRatio: 3,
                        cacheBust: true,
                        useCORS: true,
                        style: { transform: 'none', margin: '0' }
                    });
                    
                    offscreenContainer.innerHTML = '';

                    glassSwal.fire({
                        title: 'พรีวิวและแชร์',
                        html: `
                            <div class="flex justify-center my-2 rounded-[2rem] overflow-hidden bg-transparent mx-auto border-[3px] border-[#2b71b8] shadow-md" style="max-width: 320px;">
                                <img id="generated-preview-img" src="${dataUrl}" class="w-full h-auto block rounded-[1.8rem]" alt="Preview">
                            </div>
                            <div class="mt-6 flex gap-3">
                                <button onclick="app.triggerDownload()" class="flex-1 py-3.5 bg-primary hover:bg-blue-600 text-white rounded-2xl font-bold text-sm shadow-lg transition-all flex items-center justify-center gap-2 transform active:scale-95">
                                    <i class="fa-solid fa-download"></i> บันทึก
                                </button>
                                <button onclick="app.shareMessageText('${msg.id}')" class="flex-1 py-3.5 bg-green-500 hover:bg-green-600 text-white rounded-2xl font-bold text-sm shadow-lg transition-all flex items-center justify-center gap-2 transform active:scale-95">
                                    <i class="fa-solid fa-share-nodes"></i> แชร์
                                </button>
                            </div>
                            <p class="mt-4 text-[10px] text-gray-400 font-medium text-center italic">หรือแตะค้างที่รูปเพื่อบันทึก</p>
                        `,
                        showConfirmButton: false,
                        showCloseButton: true,
                        customClass: {
                            popup: 'rounded-[2.5rem] border border-white/50 shadow-2xl backdrop-blur-xl w-[95%] max-w-sm bg-white/95 px-3 py-6',
                            title: 'text-primary font-extrabold text-xl mb-1'
                        }
                    });

                } catch (err) {
                    console.error("Capture error:", err);
                    offscreenContainer.innerHTML = '';
                    glassSwal.fire('ข้อผิดพลาด', 'ไม่สามารถสร้างรูปภาพได้ กรุณาลองใหม่อีกครั้ง', 'error');
                }
            },

            triggerDownload: function() {
                const img = document.getElementById('generated-preview-img');
                if (!img) return;
                
                const link = document.createElement('a');
                link.download = `SongSiang_${Date.now()}.png`;
                link.href = img.src;
                link.click();
                
                glassSwal.fire({
                    iconHtml: '<i class="fa-solid fa-circle-check text-primary text-5xl drop-shadow-md"></i>',
                    title: 'บันทึกรูปภาพสำเร็จ!',
                    timer: 1500,
                    showConfirmButton: false
                });
            },

            shareMessageText: async function(msgId) {
                await this.refreshLinkExpiry(msgId);
                
                const msg = this.allMessages.find(m => m.id === msgId);
                if(!msg) return;
                
                const link = `${window.location.origin}${window.location.pathname}?m=${msgId}`;
                let displayName = msg.from.isAnonymous ? 'ผู้ไม่ประสงค์ออกนาม' : msg.from.name;
                let shareText = '';
                
                if (msg.type === 'text') {
                    shareText = `"${msg.content.trim()}"\n\n- ส่งเสียงจาก ${displayName}\nดูข้อความเต็มได้ที่: ${link}\n[ส่งจาก Song Siang]`;
                } else {
                    shareText = `ส่งเสียงจาก ${displayName} (ข้อความเสียง)\nคลิกเพื่อฟัง: ${link}\n\n[ส่งจาก Song Siang]`;
                }

                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: 'ส่งเสียง | Song Siang',
                            text: shareText
                        });
                        glassSwal.fire({ title: 'แชร์สำเร็จ!', iconHtml: '<i class="fa-solid fa-circle-check text-primary text-5xl drop-shadow-md"></i>', timer: 1000, showConfirmButton: false });
                    } catch (err) {
                        console.log('Share failed:', err);
                    }
                } else {
                    try {
                        await navigator.clipboard.writeText(shareText);
                        glassSwal.fire({ title: 'คัดลอกข้อความแชร์แล้ว!', text: 'สามารถนำไปวางในแอปต่างๆ ได้เลย', iconHtml: '<i class="fa-solid fa-circle-check text-primary text-5xl drop-shadow-md"></i>', timer: 1500, showConfirmButton: false });
                    } catch (e) {
                         const textArea = document.createElement("textarea");
                         textArea.value = shareText;
                         document.body.appendChild(textArea);
                         textArea.select();
                         try {
                             document.execCommand('copy');
                             glassSwal.fire({ title: 'คัดลอกข้อความแล้ว!', iconHtml: '<i class="fa-solid fa-circle-check text-primary text-5xl drop-shadow-md"></i>', timer: 1000, showConfirmButton: false });
                         } catch (err) {
                             glassSwal.fire('ข้อผิดพลาด', 'ไม่สามารถแชร์ได้', 'error');
                         }
                         document.body.removeChild(textArea);
                    }
                }
            },

            renderFeed: function() {
                let msgsHTML = '';
                const myStudentId = this.profile.studentId;
                const filteredMessages = this.allMessages.filter(msg => {
                    if (this.profile.isAdmin) return true;
                    const toMe = msg.to && Array.isArray(msg.to) && msg.to.includes(myStudentId);
                    const toEveryone = msg.to && Array.isArray(msg.to) && msg.to.length >= predefinedUsers.length;
                    return toMe || toEveryone;
                });

                if (this.isLoadingData) {
                    msgsHTML = `
                        <div class="w-full flex justify-center py-20 animate-fade-in">
                            <div class="text-center">
                                <i class="fa-solid fa-circle-notch fa-spin text-5xl text-white/30 mb-4"></i>
                                <p class="text-white/70 font-medium mt-3">กำลังโหลดข้อความ...</p>
                            </div>
                        </div>`;
                } else if(filteredMessages.length === 0) {
                    msgsHTML = `
                        <div class="w-full flex justify-center py-20 animate-fade-in">
                            <div class="text-center">
                                <i class="fa-regular fa-comments text-5xl text-white/30 mb-3"></i>
                                <p class="text-white/70 font-medium">ยังไม่มีความเคลื่อนไหวถึงคุณในขณะนี้</p>
                            </div>
                        </div>`;
                } else {
                    filteredMessages.forEach((msg, idx) => {
                        const isAudio = msg.type === 'audio';
                        const isAnonymous = msg.from.isAnonymous;
                        let senderImg = '';
                        const abbr = this.getAbbr(msg.from.name);
                        
                        if (isAnonymous) {
                            senderImg = `<div class="w-full h-full flex items-center justify-center bg-slate-700 text-white rounded-full"><i class="fa-solid fa-user-secret text-2xl"></i></div>`;
                        } else {
                            const sender = predefinedUsers.find(u => u.studentId === msg.from.id);
                            senderImg = sender ? 
                                `${app.renderImage(`${GITHUB_IMG_BASE_URL}/${sender.id}.png`, msg.from.name)}<span class="fallback-name absolute inset-0 z-10 hidden flex-center-all text-primary font-bold text-[1.5rem] bg-secondary">${abbr}</span>` : 
                                `<div class="w-full h-full flex-center-all text-primary font-bold text-lg bg-secondary">${abbr}</div>`;
                        }
                        
                        const baseSize = Math.floor(Math.random() * (160 - 70 + 1) + 70); 
                        const animDelay = (Math.random() * 3).toFixed(1);
                        const animDuration = (4 + Math.random() * 3).toFixed(1);
                        const randomX = Math.floor(Math.random() * 100) - 50; 
                        const randomY = Math.floor(Math.random() * 80) - 40;
                        const marginL = Math.floor(Math.random() * 40);
                        const marginR = Math.floor(Math.random() * 40);
                        const marginT = Math.floor(Math.random() * 30);
                        const marginB = Math.floor(Math.random() * 30);
                        const zIndex = Math.floor(Math.random() * 20) + 10;
                        
                        let badgeContent = '';
                        if (isAudio) {
                            const duration = msg.audioDuration != null ? msg.audioDuration : '?';
                            badgeContent = `<i class="fa-solid fa-play text-primary text-[10px]"></i> <span class="text-[10px] font-bold text-primary ml-1">${duration} วิ</span>`;
                        } else {
                            badgeContent = `<span class="truncate text-[10px] font-bold text-primary max-w-[80px]">${msg.content.trim()}</span>`;
                        }

                        msgsHTML += `
                        <div class="flex justify-center float-anim relative" style="animation-duration: ${animDuration}s; animation-delay: ${animDelay}s; transform: translate(${randomX}px, ${randomY}px); margin: ${marginT}px ${marginR}px ${marginB}px ${marginL}px; z-index: ${zIndex};">
                            <div onclick="app.viewFeedMessage('${msg.id}')" class="relative rounded-full shadow-2xl border-2 border-white/60 ${isAnonymous ? 'bg-slate-700' : 'bg-secondary'} group transform transition-transform hover:scale-110 cursor-pointer" style="width: ${baseSize}px; height: ${baseSize}px;">
                                <div class="w-full h-full rounded-full overflow-hidden relative">
                                    ${senderImg}
                                </div>
                                <div class="absolute -bottom-1 -right-2 bg-white/95 backdrop-blur-md rounded-full px-3 py-1 flex items-center justify-center shadow-lg border border-white/50 z-30 min-w-fit whitespace-nowrap">
                                    ${badgeContent}
                                </div>
                            </div>
                        </div>`;
                    });
                }

                return `
                <div class="animate-fade-in pb-32">

            drawVisualizer: function() {
                if (!this.isRecording || !this.audioAnalyser) return;
                
                const canvas = document.getElementById('audio-canvas');
                if (!canvas) {
                    this.visualizerFrame = requestAnimationFrame(() => this.drawVisualizer());
                    return;
                }

                const rect = canvas.getBoundingClientRect();
                if (canvas.width !== rect.width * 2) {
                    canvas.width = rect.width * 2; 
                    canvas.height = rect.height * 2;
                }

                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;

                const bufferLength = this.audioAnalyser.frequencyBinCount;
                const dataArray = new Uint8Array(bufferLength);
                this.audioAnalyser.getByteFrequencyData(dataArray);
                
                let sum = 0;
                let maxVal = 0;
                for(let i = 0; i < bufferLength; i++) {
                    sum += dataArray[i];
                    if (dataArray[i] > maxVal) maxVal = dataArray[i];
                }
                const average = sum / bufferLength;
                const vol = Math.min(1, (average * 1.5 + maxVal * 0.5) / 255); 

                this.audioHistory.push(vol);

                const barWidth = 6;
                const barGap = 4;
                const maxBars = Math.floor(width / (barWidth + barGap));

                if (this.audioHistory.length > maxBars) {
                    this.audioHistory.shift();
                }

                ctx.clearRect(0, 0, width, height);
                ctx.strokeStyle = '#2b71b8'; 
                ctx.lineWidth = barWidth;
                ctx.lineCap = 'round';

                const y = height / 2;

                for (let i = 0; i < this.audioHistory.length; i++) {
                    const v = this.audioHistory[i];
                    const smoothV = Math.max(0.08, Math.pow(v, 1.2));
                    const barHeight = Math.max(barWidth, smoothV * height * 0.65);
                    const x = i * (barWidth + barGap) + barWidth / 2;
                    ctx.beginPath();
                    ctx.moveTo(x, y - barHeight / 2);
                    ctx.lineTo(x, y + barHeight / 2);
                    ctx.stroke();
                }
                
                this.visualizerFrame = requestAnimationFrame(() => this.drawVisualizer());
            },

            toggleRecord: async function() {
                if(this.isRecording) {
                    this.mediaRecorder.stop();
                    this.isRecording = false;
                    clearInterval(this.timerInterval);
                    if (this.visualizerFrame) cancelAnimationFrame(this.visualizerFrame);
                    if (this.audioContext && this.audioContext.state !== 'closed') this.audioContext.close();
                } else {
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                        let options = {};
                        if (MediaRecorder.isTypeSupported('audio/mp4')) options = { mimeType: 'audio/mp4' };
                        else if (MediaRecorder.isTypeSupported('audio/webm')) options = { mimeType: 'audio/webm' };
                        
                        this.mediaRecorder = new MediaRecorder(stream, options);
                        this.audioChunks = [];
                        this.mediaRecorder.ondataavailable = e => { if (e.data.size > 0) this.audioChunks.push(e.data); };
                        this.mediaRecorder.onstop = () => {
                            const type = this.mediaRecorder.mimeType || 'audio/mp4';
                            this.audioBlob = new Blob(this.audioChunks, { type: type });
                            this.lastRecordingTime = this.recordingTime > 0 ? this.recordingTime : 1; 
                            stream.getTracks().forEach(track => track.stop());
                            this.showView('compose'); 
                        };

                        try {
                            this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                            const source = this.audioContext.createMediaStreamSource(stream);
                            this.audioAnalyser = this.audioContext.createAnalyser();
                            this.audioAnalyser.fftSize = 128; 
                            source.connect(this.audioAnalyser);
                        } catch (err) {
                            console.log("Audio visualizer init error:", err);
                        }

                        this.mediaRecorder.start();
                        this.isRecording = true;
                        this.recordingTime = 0;
                        this.audioBlob = null;
                        this.audioHistory = [];
                        this.showView('compose');
                        this.drawVisualizer();

                        this.timerInterval = setInterval(() => {
                            this.recordingTime++;
                            if(this.recordingTime >= this.maxAudioTime) this.toggleRecord();
                            else {
                                const timeDisplay = document.getElementById('recordingTimerDisplay');
                                if (timeDisplay) timeDisplay.textContent = `00:${String(this.recordingTime).padStart(2, '0')}`;
                            }
                        }, 1000);
                    } catch (e) {
                        glassSwal.fire('ข้อผิดพลาด', 'ไม่สามารถเข้าถึงไมโครโฟนได้', 'error');
                    }
                }
            },
            resetAudio: function() { 
                this.audioBlob = null; 
                this.recordingTime = 0; 
                this.showView('compose'); 
            },

            sendMessage: async function(isAnonymous = false) {
                const btnNormal = document.getElementById('btnSendNormal');
                const btnAnon = document.getElementById('btnSendAnon');
                const activeBtn = isAnonymous ? btnAnon : btnNormal;
                const originalHTML = activeBtn.innerHTML;

                let content = '';
                if(this.composeMode === 'text') {
                    content = document.getElementById('txtMessage').value.trim();
                    if(!content) return glassSwal.fire('แจ้งเตือน', 'กรุณาพิมพ์ข้อความ', 'warning');
                    if(content.length > this.maxChars) return glassSwal.fire('แจ้งเตือน', `จำกัดไม่เกิน ${this.maxChars} ตัวอักษร`, 'warning');
                } else {
                    if(!this.audioBlob) return glassSwal.fire('แจ้งเตือน', 'กรุณาอัดเสียงก่อนส่ง', 'warning');
                    content = await new Promise((res) => {
                        const reader = new FileReader();
                        reader.onloadend = () => res(reader.result);
                        reader.readAsDataURL(this.audioBlob);
                    });
                }

                btnNormal.disabled = true; btnAnon.disabled = true;
                activeBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> <span>กำลังส่ง...</span>';

                try {
                    const senderName = isAnonymous ? 'ผู้ไม่ประสงค์ออกนาม' : this.profile.name;
                    const messageData = {
                        from: { id: this.profile.studentId, name: senderName, isAnonymous: isAnonymous },
                        to: this.selectedIds,
                        type: this.composeMode,
                        content: content,
                        audioDuration: this.composeMode === 'audio' ? this.lastRecordingTime : null,
                        timestamp: Date.now()
                    };
                    const msgsRef = collection(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages');
                    await addDoc(msgsRef, messageData);
                    
                    glassSwal.fire({ 
                        iconHtml: isAnonymous ? '<i class="fa-solid fa-user-secret text-slate-700 text-5xl"></i>' : '<i class="fa-solid fa-check text-primary text-5xl"></i>',
                        title: 'ส่งเรียบร้อย!', showConfirmButton: false, timer: 1500 
                    });
                    this.selectedIds = []; this.audioBlob = null; this.recordingTime = 0;
                    if(this.profile.isPredefined || this.profile.isAdmin) this.showView('feed');
                    else this.showView('home');
                } catch (e) {
                    glassSwal.fire('ข้อผิดพลาด', 'ไม่สามารถส่งข้อความได้', 'error');
                    btnNormal.disabled = false; btnAnon.disabled = false; activeBtn.innerHTML = originalHTML;
                }
            },

            deleteAllFiltered: async function() {
                const queryStr = this.adminSearchQuery.toLowerCase().trim();
                const toDelete = this.messages.filter(msg => {
                    if (msg.from.name.toLowerCase().includes(queryStr) || msg.from.id.toLowerCase().includes(queryStr)) return true;
                    let foundInTo = false;
                    if (msg.to && Array.isArray(msg.to)) {
                        msg.to.forEach(toId => {
                            if (toId.toLowerCase().includes(queryStr)) foundInTo = true;
                            const preUser = predefinedUsers.find(u => u.studentId === toId);
                            if (preUser && (preUser.name.toLowerCase().includes(queryStr) || preUser.fullName.toLowerCase().includes(queryStr))) foundInTo = true;
                        });
                    }
                    return foundInTo;
                });

                if (toDelete.length === 0) return;

                glassSwal.fire({
                    title: `ลบทั้งหมด ${toDelete.length} รายการ?`,
                    html: `การดำเนินการนี้จะลบข้อความทั้งหมดที่แสดงอยู่จากการค้นหา: <b>"${queryStr}"</b>`,
                    icon: 'warning', showCancelButton: true, confirmButtonText: 'ลบทั้งหมด', cancelButtonText: 'ยกเลิก'
                }).then(async (result) => {
                    if (result.isConfirmed) {
                        const batch = writeBatch(db);
                        toDelete.forEach(m => {
                            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages', m.id);
                            batch.delete(ref);
                        });
                        await batch.commit();
                        glassSwal.fire({ iconHtml: '<i class="fa-solid fa-check text-primary text-5xl"></i>', title: 'ลบสำเร็จ!', showConfirmButton: false, timer: 1500 });
                        this.setAdminSearch('');
                    }
                });
            },

            startAutoPilot: function() {
                if (this.autoPilotInterval) clearInterval(this.autoPilotInterval);
                this.autoPilotInterval = setInterval(() => this.checkAndRunAutoPilot(), 60000);
                console.log("AutoPilot System Started");
            },

            stopAutoPilot: function() {
                if (this.autoPilotInterval) {
                    clearInterval(this.autoPilotInterval);
                    this.autoPilotInterval = null;
                }
                console.log("AutoPilot System Stopped");
            },

            // ฟังก์ชันใหม่: เช็คว่าข้อความนี้ "ค้างส่ง" สำหรับคนๆ นี้หรือไม่ (แยกรายบุคคล)
            isMsgEligibleForUser: function(m, uid) {
                // เช็คก่อนว่าข้อความนี้ส่งถึงคนนี้ไหม
                const isToUser = m.to && Array.isArray(m.to) && (m.to.includes(uid) || m.to.length >= predefinedUsers.length);
                if (!isToUser) return false;
                
                // ถ้าระบุว่าให้รีเซ็ตสถานะเฉพาะคนนี้
                if (m.resetForUsers && m.resetForUsers.includes(uid)) return true;
                
                // คืนค่าสถานะปกติ (ถ้ายังไม่เคยส่งเลย)
                return !m.emailSent;
            },

            checkAndRunAutoPilot: async function() {
                if (!this.profile || !this.profile.isAdmin || !this.emailConfig.autoPilot) return;

                // ป้องกันการรันซ้อนทับกัน ถ้ารอบเก่ายังส่งไม่เสร็จ (แก้ปัญหาส่งเบิ้ล 2-3 รอบ)
                if (this.isProcessingAutoPilot) return;
                this.isProcessingAutoPilot = true;

                try {
                    const now = new Date();
                    const currentDay = now.getDay().toString(); // 0=Sun, 1=Mon...
                    const currentHours = String(now.getHours()).padStart(2, '0');
                    const currentMinutes = String(now.getMinutes()).padStart(2, '0');
                    const currentTimeStr = `${currentHours}:${currentMinutes}`;

                    let msgsToProcess = this.allMessages.filter(m => {
                        // ข้ามข้อความที่เคยส่งแล้วและไม่ได้ถูกสั่งให้รีเซ็ต
                        if (m.emailSent && (!m.resetForUsers || m.resetForUsers.length === 0)) return false;
                        return true;
                    });

                    if (msgsToProcess.length === 0) return;

                    let eligibleMsgs = [];
                    let shouldSend = false;

                    if (this.emailConfig.sendType === 'delay') {
                        const delayMs = (this.emailConfig.delayMinutes || 0) * 60 * 1000;
                        eligibleMsgs = msgsToProcess.filter(m => (Date.now() - m.timestamp) >= delayMs);
                        if (eligibleMsgs.length > 0) shouldSend = true;
                    } else if (this.emailConfig.sendType === 'schedule') {
                        if (this.emailConfig.scheduleDays.includes(currentDay) && this.emailConfig.scheduleTime === currentTimeStr) {
                            // ป้องกันการส่งซ้ำในนาทีเดียวกัน ทั้งแท็บปัจจุบัน และกรณีเปิดค้างไว้หลายแท็บ (ใช้ localStorage ล็อคไว้)
                            const todayStr = now.toDateString() + '-' + currentTimeStr;
                            if (this.lastScheduleSentTime === todayStr || localStorage.getItem('lastScheduleSentTime') === todayStr) return;
                            
                            this.lastScheduleSentTime = todayStr;
                            localStorage.setItem('lastScheduleSentTime', todayStr);

                            eligibleMsgs = msgsToProcess;
                            if (eligibleMsgs.length > 0) shouldSend = true;
                        }
                    }

                    if (!shouldSend || eligibleMsgs.length === 0) return;

                    const userGroups = {};
                    // จัดกลุ่มข้อความที่จะส่ง โดยอิงความถูกต้องแบบรายบุคคล
                    predefinedUsers.forEach(u => {
                        const userMsgs = eligibleMsgs.filter(m => this.isMsgEligibleForUser(m, u.studentId));
                        if (userMsgs.length > 0) {
                            userGroups[u.studentId] = userMsgs;
                        }
                    });

                    for (const uid in userGroups) {
                        if ((this.emailConfig.excludedAutoPilotUsers || []).includes(uid)) continue;

                        const user = predefinedUsers.find(u => u.studentId === uid);
                        if (user) {
                            const userMsgs = userGroups[uid]; 
                            const htmlBody = this.buildEmailTemplate(user, userMsgs);
                            const email = `${uid}@kmitl.ac.th`;

                            try {
                                const response = await fetch(this.EMAIL_API_URL, {
                                    method: "POST",
                                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                                    body: JSON.stringify({
                                        email: email,
                                        subject: `คุณมีข้อความใหม่จากระบบ Song Siang [อัตโนมัติ]`,
                                        htmlBody: htmlBody
                                    })
                                });
                                
                                const resJson = await response.json();
                                
                                // ถ้าส่งผ่านแล้ว ให้เคลียร์สถานะของคนๆ นี้ออก
                                if (resJson.status === 'success') {
                                    const batch = writeBatch(db);
                                    userMsgs.forEach(m => {
                                        const ref = doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages', m.id);
                                        let newReset = (m.resetForUsers || []).filter(id => id !== uid);
                                        batch.update(ref, { 
                                            emailSent: true, 
                                            resetForUsers: newReset,
                                            linkExpiryAt: Date.now() // เริ่มนับเวลาหมดอายุใหม่จากจุดนี้
                                        });
                                    });
                                    await batch.commit();
                                }
                            } catch(e) { console.error("AutoPilot send failed", e); }
                            await new Promise(r => setTimeout(r, 1500));
                        }
                    }
                } finally {
                    this.isProcessingAutoPilot = false;
                }
            },

                document.getElementById('emailDelaySettings').className = type === 'delay' ? 'block mb-4 p-4 bg-black/10 rounded-xl border border-white/10' : 'hidden';
                document.getElementById('emailScheduleSettings').className = type === 'schedule' ? 'block mb-4 p-4 bg-black/10 rounded-xl border border-white/10' : 'hidden';
                
                document.querySelectorAll('[onclick^="app.setEmailSendType"]').forEach(el => {

                const delayMinutes = parseInt(document.getElementById('inpEmailDelay').value) || 0;

                this.emailConfig.onlyNew = onlyNew;

                this.emailConfig.scheduleTime = scheduleTime;

                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_settings', 'config'), { 
                        emailConfig: this.emailConfig
                    }, { merge: true });

                    if (isAutoPilot && !this.autoPilotInterval) this.startAutoPilot();

            confirmResetEmailStatus: async function() {
                const checkboxes = document.querySelectorAll('.reset-target-checkbox:checked');
                if (checkboxes.length === 0) return glassSwal.fire('แจ้งเตือน', 'กรุณาเลือกผู้ใช้อย่างน้อย 1 คน', 'warning');
                
                const selectedUids = Array.from(checkboxes).map(cb => cb.value);

                glassSwal.fire({
                    title: 'กำลังรีเซ็ต...',
                    html: '<i class="fa-solid fa-circle-notch fa-spin text-4xl text-primary mt-4 mb-3"></i>',
                    showConfirmButton: false,
                    allowOutsideClick: false
                });

                try {
                    const batch = writeBatch(db);
                    const msgsToReset = this.allMessages.filter(m => m.emailSent);
                    let resetCount = 0;

                    msgsToReset.forEach(m => {
                        const targetUids = selectedUids.filter(uid => m.to && (m.to.includes(uid) || m.to.length >= predefinedUsers.length));
                        
                        if (targetUids.length > 0) {
                            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages', m.id);
                            let currentReset = m.resetForUsers ? [...m.resetForUsers] : [];
                            let modified = false;
                            
                            targetUids.forEach(uid => {
                                if (!currentReset.includes(uid)) {
                                    currentReset.push(uid);
                                    modified = true;
                                }
                            });
                            
                            // อัปเดตเฉพาะอาเรย์ resetForUsers โดยไม่ต้องปรับ emailSent หลัก
                            if (modified) {
                                batch.update(ref, { resetForUsers: currentReset }); 
                                resetCount++;
                            }
                        }
                    });

                    if (resetCount > 0) {
                        await batch.commit();
                        glassSwal.fire({
                            iconHtml: '<i class="fa-solid fa-check-circle text-green-500 text-5xl"></i>',
                            title: 'รีเซ็ตสำเร็จ!',
                            text: `ดึงข้อความกลับมาค้างส่งให้คนที่เลือกเรียบร้อยแล้ว`,
                            showConfirmButton: false,
                            timer: 2000
                        });
                        this.showView('admin_email_system');

                    }
                } catch (e) {
                    glassSwal.fire('ข้อผิดพลาด', 'ไม่สามารถรีเซ็ตได้', 'error');
                    console.error(e);
                }
            },
