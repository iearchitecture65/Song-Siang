            startWatchdog: function(ms = 5000) {
                if (this.watchdogTimer) clearTimeout(this.watchdogTimer);
                this.watchdogTimer = setTimeout(() => {
                    console.error("System hung. Handling soft reset...");
                    this.stopWatchdog();
                }, ms);
            },

            stopWatchdog: function() {
                if (this.watchdogTimer) {
                    clearTimeout(this.watchdogTimer);
                    this.watchdogTimer = null;
                }
            },

            emergencyReset: async function() {
                console.warn("Initiating Soft Reset to clear session...");
                this.profile = null;
                localStorage.removeItem('songSiangProfile');
                localStorage.removeItem('currentSessionId');
                this.stopWatchdog();
                this.showView('login');
            },

            showPermissionError: function() {
                this.stopWatchdog();
                glassSwal.fire({
                    iconHtml: '<i class="fa-solid fa-database text-red-500 text-5xl drop-shadow-md"></i>',
                    title: 'ติดปัญหา Firebase Rules',
                    html: `
                    <div class="text-left text-sm mt-2 text-gray-700 font-medium space-y-3">
                        <p class="text-center font-bold text-red-500 bg-red-50 border border-red-200 py-1 rounded">Permission Denied</p>
                        <p>ระบบตรวจพบว่าฐานข้อมูล Firebase ของคุณปิดกั้นการเข้าถึง ทำให้ไม่สามารถใช้งานได้ กรุณาตั้งค่าดังนี้:</p>
                        <div class="bg-gray-100 p-3 rounded-xl border border-gray-200 text-xs">
                            1. ไปที่เว็บไซต์ Firebase Console<br>
                            2. เลือกเมนู <b>Firestore Database</b> > แท็บ <b>Rules</b><br>
                            3. เปลี่ยนโค้ดให้บรรทัดกลางเป็น:<br>
                            <code class="text-red-500 font-bold block my-1">allow read, write: if true;</code>
                            4. กดปุ่ม <b>Publish</b> แล้วรีเฟรชหน้านี้ใหม่
                        </div>
                    </div>`,
                    confirmButtonText: 'รับทราบวิธีแก้ไข',
                    allowOutsideClick: false
                });
            },

            init: async function() {
                this.startWatchdog(10000); 
                this.isLoadingData = true;
                try {
                    await signInAnonymously(auth);

                    await new Promise((resolve) => {
                        const unsub = onAuthStateChanged(auth, (user) => {
                            if (user) {
                                unsub();
                                resolve(user);
                            }
                        });
                    });
                    
                    const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_settings', 'config');
                    const docSnap = await getDoc(settingsRef);
                    if(docSnap.exists()) {
                        const data = docSnap.data();
                        this.isSiteActive = data.isSiteActive !== undefined ? data.isSiteActive : true;
                        this.shareExpiryMinutes = data.shareExpiryMinutes !== undefined ? data.shareExpiryMinutes : (data.shareExpiryHours !== undefined ? data.shareExpiryHours * 60 : 1440);
                        this.otpSkipTime = data.otpSkipTimeMinutes !== undefined ? data.otpSkipTimeMinutes : (data.otpSkipTime !== undefined ? data.otpSkipTime * 60 : 60);
                        
                        if (data.emailConfig) {
                            this.emailConfig = { ...this.emailConfig, ...data.emailConfig };
                        }
                    } else {
                        this.isSiteActive = true;
                    }

                    this.loadGlobalSettings();

                    const urlParams = new URLSearchParams(window.location.search);
                    const sharedMsgId = urlParams.get('m');
                    if (sharedMsgId) {
                        await this.handleSharedMessage(sharedMsgId);
                        this.stopWatchdog();
                        return; 
                    }

                    const targetParam = urlParams.get('target');
                    if (targetParam) {
                        const targetUserObj = predefinedUsers.find(u => u.studentId === targetParam || u.id.toString() === targetParam);
                        if (targetUserObj) {
                            this.pendingTargetUser = targetUserObj.studentId;
                        }
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }
                    
                    const savedProfile = localStorage.getItem('songSiangProfile');
                    if (savedProfile) {
                        try {
                            this.profile = JSON.parse(savedProfile);
                            if(!this.profile || !this.profile.studentId) throw new Error("Invalid Profile");
                        } catch (err) {
                            localStorage.removeItem('songSiangProfile');
                            this.profile = null;
                            this.showView(this.isSiteActive ? 'login' : 'site_closed');
                            return;
                        }
                        
                        if (!this.isSiteActive && !this.profile.isAdmin) {
                            this.profile = null;
                            localStorage.removeItem('songSiangProfile');
                            this.showView('site_closed');
                            return;
                        }

                        const isBlocked = await this.checkBlockStatus(this.profile.studentId);
                        if (isBlocked) {
                            this.profile = null;
                            localStorage.removeItem('songSiangProfile');
                            glassSwal.fire('การเข้าถึงถูกจำกัด', 'บัญชีของคุณถูกระงับการใช้งานกรุณาติดต่อผู้ดูแลระบบ', 'error');
                            this.showView('login');
                        } else {
                            try {
                                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_user_status', this.profile.studentId), {
                                    lastLogin: Date.now()
                                }, { merge: true });
                                
                                let currentSessionId = localStorage.getItem('currentSessionId');
                                if (!currentSessionId) {
                                    const sessionData = { uid: this.profile.studentId, loginAt: Date.now(), logoutAt: null };
                                    const sessionRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'song_siang_sessions'), sessionData);
                                    localStorage.setItem('currentSessionId', sessionRef.id);
                                }
                            } catch(e) {
                                if (e.message && (e.message.includes("permissions") || e.message.includes("Missing or insufficient"))) {
                                    this.showPermissionError();
                                    return;
                                }
                            }

                            this.setupUserStatusListener();
                            this.setupMessagesListener();
                            this.setupUsersListener();
                            
                            if (this.profile.isAdmin && this.emailConfig.autoPilot) {
                                this.startAutoPilot();
                            }

                            if (this.pendingTargetUser) {
                                this.selectedIds = [this.pendingTargetUser];
                                this.pendingTargetUser = null;
                                this.showView('compose');
                            } else {
                                this.showView(this.profile.isPredefined || this.profile.isAdmin ? 'feed' : 'home');
                            }
                        }
                    } else {
                        this.showView(this.isSiteActive ? 'login' : 'site_closed');
                    }
                } catch (e) {
                    console.error("Auth error:", e);
                    this.stopWatchdog();
                    this.showView('login');
                    
                    if (e.code === 'auth/operation-not-allowed') {
                        glassSwal.fire('Firebase Auth ปิดอยู่', 'กรุณาไปที่ Firebase Console > Authentication > Sign-in method แล้วเปิดใช้งาน Anonymous (บุคคลนิรนาม)', 'error');
                    } else if (e.message && (e.message.includes("permissions") || e.message.includes("Missing or insufficient"))) {
                        this.showPermissionError();
                    } else {
                        glassSwal.fire('เกิดข้อผิดพลาดในการเชื่อมต่อ', e.message || 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้', 'error');
                    }
                }
            },

            handleSharedMessage: async function(msgId) {
                const root = document.getElementById('appRoot');
                root.innerHTML = `
                    <div class="flex flex-col items-center justify-center min-h-[60vh] text-white">
                        <i class="fa-solid fa-circle-notch fa-spin text-4xl mb-4"></i>
                        <p class="font-bold">กำลังโหลดข้อความที่แชร์...</p>
                    </div>`;

                try {
                    const msgRef = doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages', msgId);
                    const snap = await getDoc(msgRef);
                    
                    if (!snap.exists()) {
                        root.innerHTML = this.renderSharedError("ไม่พบข้อความนี้ในระบบ หรืออาจถูกลบไปแล้ว");
                        return;
                    }

                    const msg = { id: snap.id, ...snap.data() };
                    const now = Date.now();
                    
                    const baseTime = msg.linkExpiryAt || msg.timestamp;
                    const expiryTime = baseTime + (this.shareExpiryMinutes * 60 * 1000);

                    if (now > expiryTime) {
                        root.innerHTML = this.renderSharedError("ลิ้งก์นี้หมดอายุการใช้งานแล้ว");
                        return;
                    }

                    this.renderSharedMessage(msg, expiryTime);

                } catch (err) {
                    if (err.message && (err.message.includes("permissions") || err.message.includes("Missing or insufficient"))) {
                        this.showPermissionError();
                        root.innerHTML = this.renderSharedError("ฐานข้อมูลถูกปิดกั้นการเข้าถึง (Permission Denied)");
                    } else {
                        root.innerHTML = this.renderSharedError("เกิดข้อผิดพลาดในการโหลดข้อมูล");
                    }
                }
            },

            renderSharedError: function(text) {
                return `
                <div class="max-w-md mx-auto glass-card rounded-[2.5rem] p-10 text-center animate-slide-up mt-10">
                    <i class="fa-solid fa-link-slash text-red-400 text-6xl mb-6"></i>
                    <h2 class="text-2xl font-black text-white mb-4">ลิ้งก์ไม่สามารถใช้งานได้</h2>
                    <p class="text-blue-100 font-medium mb-8">${text}</p>
                    <button onclick="window.location.href=window.location.pathname" class="w-full py-4 bg-secondary text-primary rounded-2xl font-black shadow-lg">
                        เข้าสู่หน้าหลัก
                    </button>
                </div>`;
            },

            renderSharedMessage: function(msg, expiryTime) {
                const root = document.getElementById('appRoot');
                const isAnonymous = msg.from.isAnonymous;
                const displayName = isAnonymous ? 'ผู้ไม่ประสงค์ออกนาม' : msg.from.name;
                const dateStr = new Date(msg.timestamp).toLocaleString('th-TH');
                const isAudio = msg.type === 'audio';

                const avatarHtml = isAnonymous 
                    ? '<i class="fa-solid fa-user-secret text-3xl text-primary"></i>' 
                    : (() => {
                        const sender = predefinedUsers.find(u => u.studentId === msg.from.id);
                        const abbr = `<span class="text-2xl font-black text-primary absolute inset-0 flex items-center justify-center z-10">${this.getAbbr(msg.from.name)}</span>`;
                        if (sender) {
                            return `<img src="${GITHUB_IMG_BASE_URL}/${sender.id}.png" class="w-full h-full object-cover absolute inset-0 z-20 bg-secondary" onerror="this.style.display='none';">${abbr}`;
                        }
                        return abbr;
                    })();

                root.innerHTML = `
                <div class="max-w-sm mx-auto animate-slide-up mt-10 mb-20 px-4">
                    <div class="text-center mb-6">
                        <div class="inline-block bg-white/10 backdrop-blur-xl px-5 py-2 rounded-full border border-white/20 text-white font-bold text-[11px] shadow-xl">
                            <i class="fa-solid fa-clock-rotate-left mr-2 text-secondary"></i> จะหมดอายุใน: <span id="shareTimer" class="font-mono text-secondary">--:--:--</span>
                        </div>
                    </div>

                    <div class="glass-card rounded-[2.5rem] overflow-hidden shadow-2xl border border-white/20 bg-white/10 backdrop-blur-2xl">
                        <div class="p-8 flex flex-col items-center text-center">
                            <div class="w-20 h-20 rounded-full bg-secondary shadow-xl mb-5 border-4 border-white/30 flex-center-all overflow-hidden relative">
                                ${avatarHtml}
                            </div>
                            <h2 class="text-xl font-extrabold text-white drop-shadow-md mb-0.5">${displayName}</h2>
                            <p class="text-blue-100 text-[9px] font-bold opacity-60 uppercase tracking-widest mb-6">${dateStr}</p>
                            
                            <div class="w-full bg-white/10 backdrop-blur-md rounded-[1.8rem] p-6 shadow-inner border border-white/20 relative min-h-[120px] flex items-center justify-center">
                                <i class="fa-solid fa-quote-left absolute top-3 left-4 text-3xl text-white/10"></i>
                                ${isAudio ? `
                                    <div class="w-full flex flex-col items-center">
                                        <audio src="${msg.content}" controls autoplay class="w-full scale-90"></audio>
                                        <p class="mt-3 text-white font-bold text-[11px]">คลิปเสียง ${msg.audioDuration || '?'} วินาที</p>
                                    </div>
                                ` : `
                                    <p class="text-white font-medium text-base md:text-lg leading-relaxed whitespace-pre-wrap break-words">${msg.content.trim()}</p>
                                `}
                            </div>
                        </div>
                        <div class="bg-white/5 p-4 text-center border-t border-white/10">
                             <button onclick="window.location.href=window.location.pathname" class="text-white/40 hover:text-white text-[10px] font-bold underline transition-colors">
                                อยากส่งเสียงบ้าง? คลิกเพื่อเข้าสู่ระบบ
                            </button>
                        </div>
                    </div>
                    
                    <div class="mt-8 flex items-center justify-center opacity-30 text-center">
                        <h1 class="text-xs font-black text-white tracking-[0.4em] uppercase">SONG SIANG</h1>
                    </div>
                </div>`;

                const timerFunc = () => {
                    const remaining = expiryTime - Date.now();
                    if (remaining <= 0) {
                        clearInterval(this.shareTimerInt);
                        window.location.reload();
                    } else {
                        const hours = Math.floor(remaining / (1000 * 60 * 60));
                        const mins = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
                        const secs = Math.floor((remaining % (1000 * 60)) / 1000);
                        const display = document.getElementById('shareTimer');
                        if(display) display.innerText = `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                    }
                };
                timerFunc();
                this.shareTimerInt = setInterval(timerFunc, 1000);
            },

            getAbbr: function(name) {
                if (!name) return "";
                const consonants = name.replace(/[^ก-ฮ]/g, '');
                if (consonants.length >= 2) return consonants.substring(0, 2);
                if (consonants.length === 1) return consonants;
                return name.substring(0, 2);
            },

            handleLogoClick: function() {
                if (!this.profile) return;
                if (!this.isSiteActive && !this.profile.isAdmin) return;

                if (this.profile.isPredefined || this.profile.isAdmin) {
                    this.showView('feed');
                } else {
                    this.showView('home');
                }
            },

            checkBlockStatus: async function(uid) {
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_user_status', uid);
                    const snap = await getDoc(docRef);
                    return snap.exists() && snap.data().isBlocked === true;
                } catch(e) {
                    throw e; 
                }
            },

            setupUsersListener: function() {
                if(this.unsubscribeUsers) this.unsubscribeUsers();
                if(!this.profile || !this.profile.isAdmin) return;

                const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'song_siang_user_status');
                this.unsubscribeUsers = onSnapshot(usersRef, (snapshot) => {
                    this.registeredUsers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    if (this.currentView === 'manage_users') this.renderUserManagementUI();
                }, (error) => {
                    console.error("Users listener error:", error);
                });
            },
            
            setupUserStatusListener: function() {
                if (this.unsubscribeUserStatus) this.unsubscribeUserStatus();
                if (!this.profile || !this.profile.studentId) return;

                if (this.profile.studentId === '65030900') return;

                const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_user_status', this.profile.studentId);
                this.unsubscribeUserStatus = onSnapshot(userRef, (snapshot) => {
                    if (!snapshot.exists()) {
                        this.forceLogoutWithMessage('บัญชีถูกลบจากระบบ', 'เซสชั่นการล็อกอินของคุณถูกล้างโดยผู้ดูแลระบบ');
                    } else {
                        const data = snapshot.data();
                        if (data.isBlocked) {
                            this.forceLogoutWithMessage('บัญชีถูกระงับการใช้งาน', 'คุณไม่สามารถใช้งานระบบได้ในขณะนี้ กรุณาติดต่อผู้ดูแลระบบ');
                        }
                    }
                }, (error) => {
                    console.error("User status listener error:", error);
                });
            },

            forceLogoutWithMessage: function(title, text) {
                this.closeMobileMenu();
                if (this.profile && !this.profile.isGuest) {
                    localStorage.setItem('lastLogoutId', this.profile.studentId);
                    localStorage.setItem('lastLogoutTime', Date.now().toString());
                }
                
                const sessionId = localStorage.getItem('currentSessionId');
                if (sessionId) {
                    try {
                        updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_sessions', sessionId), { logoutAt: Date.now() });
                    } catch(e) {}
                    localStorage.removeItem('currentSessionId');
                }

                this.profile = null;
                localStorage.removeItem('songSiangProfile');
                
                if (this.unsubscribeMsgs) this.unsubscribeMsgs();
                if (this.unsubscribeUsers) this.unsubscribeUsers();
                if (this.unsubscribeUserStatus) this.unsubscribeUserStatus();
                this.stopAutoPilot();
                
                this.showView('login');
                
                glassSwal.fire({
                    iconHtml: '<i class="fa-solid fa-triangle-exclamation text-red-500 text-5xl"></i>',
                    title: title,
                    text: text,
                    confirmButtonText: 'รับทราบ',
                    allowOutsideClick: false,
                    allowEscapeKey: false
                });
            },

            toggleMobileMenu: function() {
                this.isMobileMenuOpen = !this.isMobileMenuOpen;
                const menu = document.getElementById('mobileDropdown');
                const hamIcon = document.getElementById('navHamburger').querySelector('i');
                const contentWrapper = document.getElementById('mainContentWrapper');
                const fabContainer = document.getElementById('globalFabContainer');
                
                if (this.isMobileMenuOpen) {
                    menu.classList.remove('hidden');
                    menu.classList.add('flex');
                    hamIcon.classList.remove('fa-bars');
                    hamIcon.classList.add('fa-xmark');
                    contentWrapper.classList.add('menu-open-blur');
                    if(fabContainer) fabContainer.classList.add('menu-open-blur');
                } else {
                    menu.classList.add('hidden');
                    menu.classList.remove('flex');
                    hamIcon.classList.remove('fa-xmark');
                    hamIcon.classList.add('fa-bars');
                    contentWrapper.classList.remove('menu-open-blur');
                    if(fabContainer) fabContainer.classList.remove('menu-open-blur');
                }
            },

            closeMobileMenu: function() {
                this.isMobileMenuOpen = false;
                const menu = document.getElementById('mobileDropdown');
                const hamIcon = document.getElementById('navHamburger')?.querySelector('i');
                const contentWrapper = document.getElementById('mainContentWrapper');
                const fabContainer = document.getElementById('globalFabContainer');

                if(menu) {
                    menu.classList.add('hidden');
                    menu.classList.remove('flex');
                }
                if(hamIcon) {
                    hamIcon.classList.add('fa-bars');
                    hamIcon.classList.remove('fa-xmark');
                }
                if(contentWrapper) contentWrapper.classList.remove('menu-open-blur');
                if(fabContainer) fabContainer.classList.remove('menu-open-blur');
            },

            loadGlobalSettings: function() {
                const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_settings', 'config');
                onSnapshot(settingsRef, (docSnap) => {
                    if(docSnap.exists()) {
                        const data = docSnap.data();
                        this.maxChars = data.maxChars || 500;
                        this.maxAudioTime = data.maxAudioTime || 30;
                        this.shareExpiryMinutes = data.shareExpiryMinutes !== undefined ? data.shareExpiryMinutes : (data.shareExpiryHours ? data.shareExpiryHours * 60 : 1440);
                        this.yearOptions = data.yearOptions || ['ปี 1', 'ปี 2', 'ปี 3', 'ปี 4', 'ปี 5', 'ศิษย์เก่า'];
                        this.guestOptions = data.guestOptions || ['อาจารย์', 'เจ้าหน้าที่', 'บุคลากร', 'ผู้ปกครอง', 'บุคคลภายนอก'];
                        this.isSiteActive = data.isSiteActive !== undefined ? data.isSiteActive : true;
                        this.allowUserDelete = data.allowUserDelete !== undefined ? data.allowUserDelete : true;
                        this.otpSkipTime = data.otpSkipTimeMinutes !== undefined ? data.otpSkipTimeMinutes : (data.otpSkipTime !== undefined ? data.otpSkipTime * 60 : 60);
                        
                        if (data.emailConfig) {
                            const oldConfigStr = JSON.stringify(this.emailConfig);
                            this.emailConfig = { ...this.emailConfig, ...data.emailConfig };
                            const newConfigStr = JSON.stringify(this.emailConfig);

                            // ซิงค์ข้อมูล Real-time ไปยังหน้าต่าง UI หากแอดมินเปิดหน้านี้อยู่
                            if (oldConfigStr !== newConfigStr && this.currentView === 'admin_email_system') {
                                const inpAutoPilot = document.getElementById('inpAutoPilot');
                                if (inpAutoPilot) inpAutoPilot.checked = this.emailConfig.autoPilot;
                                
                                const inpEmailDelay = document.getElementById('inpEmailDelay');
                                if (inpEmailDelay) inpEmailDelay.value = this.emailConfig.delayMinutes;
                                
                                const inpEmailTime = document.getElementById('inpEmailTime');
                                if (inpEmailTime) inpEmailTime.value = this.emailConfig.scheduleTime;

                                const type = this.emailConfig.sendType;
                                const delaySettings = document.getElementById('emailDelaySettings');
                                const scheduleSettings = document.getElementById('emailScheduleSettings');
                                if (delaySettings) delaySettings.className = type === 'delay' ? 'block mb-4 p-4 bg-black/10 rounded-xl border border-white/10' : 'hidden';
                                if (scheduleSettings) scheduleSettings.className = type === 'schedule' ? 'block mb-4 p-4 bg-black/10 rounded-xl border border-white/10' : 'hidden';
                                
                                document.querySelectorAll('[onclick^="app.setEmailSendType"]').forEach(el => {
                                    el.className = `flex-1 py-2 rounded-xl text-xs font-bold transition-colors border ${el.getAttribute('onclick').includes(type) ? 'bg-secondary text-primary border-secondary' : 'bg-transparent text-white border-white/40'}`;
                                });

                                ['0','1','2','3','4','5','6'].forEach(d => {
                                    const btn = document.getElementById(`btnDay${d}`);
                                    if (btn) {
                                        const isSelected = this.emailConfig.scheduleDays.includes(d);
                                        btn.className = `px-3 py-1 rounded-lg text-xs font-bold transition-colors border ${isSelected ? 'bg-secondary text-primary border-secondary' : 'bg-white/10 text-white/60 border-white/30'}`;
                                    }
                                });

                                const targetCountDisplay = document.getElementById('autoPilotTargetCountText');
                                if (targetCountDisplay) {
                                    const usersWithMessages = predefinedUsers.map(user => {
                                        const userMsgs = this.allMessages.filter(m => this.isMsgEligibleForUser(m, user.studentId));
                                        return { ...user, msgCount: userMsgs.length };
                                    }).filter(u => u.msgCount > 0);
                                    const excludedCount = (this.emailConfig.excludedAutoPilotUsers || []).length;
                                    targetCountDisplay.innerText = `ส่งให้ ${usersWithMessages.length - excludedCount} จาก ${usersWithMessages.length} ท่าน ที่มีข้อความค้างส่ง`;
                                }
                            }
                        }

                        if (this.profile && this.profile.isAdmin) {
                            if (this.emailConfig.autoPilot && !this.autoPilotInterval) {
                                this.startAutoPilot();
                            } else if (!this.emailConfig.autoPilot && this.autoPilotInterval) {
                                this.stopAutoPilot();
                            }
                        }

                        if (!this.isSiteActive && this.profile && !this.profile.isAdmin) {
                            this.logout(true); 
                        }
                    }
                });
            },

            renderImage: function(src, altText, extraClass = "") {
                const isLoaded = this.imageCache[src];
                return `
                    <div class="img-container relative w-full h-full flex items-center justify-center bg-secondary/50 overflow-hidden">
                        <div class="img-loading-spinner absolute z-10 ${isLoaded ? 'hidden' : ''}"></div>
                        <img src="${src}" crossorigin="anonymous" loading="lazy"
                             alt="${altText}"
                             class="w-full h-full object-cover relative z-20 ${isLoaded ? 'loaded' : ''} ${extraClass}"
                             onload="app.onImageLoaded(this, '${src}')"
                             onerror="app.onImageError(this)">
                    </div>
                `;
            },

            onImageLoaded: function(img, src) {
                this.imageCache[src] = true;
                img.classList.add('loaded');
                
                const container = img.parentElement;
                if (container) {
                    const loader = container.querySelector('.img-loading-spinner');
                    if (loader) loader.classList.add('hidden');
                    
                    const fallback = container.parentElement.querySelector('.fallback-name');
                    if (fallback) {
                        fallback.classList.add('hidden');
                        fallback.classList.remove('flex', 'flex-center-all');
                    }
                }
            },

            onImageError: function(img) {
                const container = img.parentElement;
                if (container) {
                    const loader = container.querySelector('.img-loading-spinner');
                    if (loader) loader.classList.add('hidden');
                    const fallback = container.parentElement.querySelector('.fallback-name');
                    if (fallback) {
                        fallback.classList.remove('hidden');
                        fallback.classList.add('flex-center-all');
                    }
                }
                img.style.display = 'none';
            },

                    const navHam = document.getElementById('navHamburger');

                    else if(viewName === 'quota') { root.innerHTML = this.renderQuota(); this.updateFAB(); }
                    else if(viewName === 'inbox') {

            loginSuccess: async function(userProfile) {
                this.startWatchdog(5000); 
                try {
                    const isBlocked = await this.checkBlockStatus(userProfile.studentId);
                    if (isBlocked) {
                        this.stopWatchdog();
                        return glassSwal.fire('การเข้าถึงถูกจำกัด', 'บัญชีของคุณถูกระงับการใช้งาน', 'error');
                    }

                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_user_status', userProfile.studentId), {
                        name: userProfile.name,
                        fullName: userProfile.fullName || userProfile.name,
                        lastLogin: Date.now(),
                        isPredefined: !!userProfile.isPredefined,
                        isBlocked: false,
                        isGuest: !!userProfile.isGuest
                    }, { merge: true });

                    const sessionData = { uid: userProfile.studentId, loginAt: Date.now(), logoutAt: null };
                    const sessionRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'song_siang_sessions'), sessionData);
                    localStorage.setItem('currentSessionId', sessionRef.id);

                    this.profile = userProfile;
                    localStorage.setItem('songSiangProfile', JSON.stringify(userProfile));
                    this.setupUserStatusListener();
                    this.setupMessagesListener();
                    this.setupUsersListener();
                    
                    if (this.profile.isAdmin && this.emailConfig.autoPilot) {
                        this.startAutoPilot();
                    }

                     glassSwal.fire({
                        iconHtml: '<i class="fa-solid fa-check text-primary text-5xl"></i>',
                        title: `ยินดีต้อนรับ ${userProfile.name}!`,
                        html: 'เข้าสู่ระบบเรียบร้อยแล้ว',
                        timer: 1500,
                        showConfirmButton: false
                    });
                    
                    if (this.pendingTargetUser) {
                        this.selectedIds = [this.pendingTargetUser];
                        this.pendingTargetUser = null;
                        this.showView('compose');
                    } else {
                        this.showView(userProfile.isPredefined || userProfile.isAdmin ? 'feed' : 'home');
                    }
                } catch (error) {
                    console.error("Login Error:", error);
                    this.stopWatchdog();
                    if (error.message && (error.message.includes("permissions") || error.message.includes("Missing or insufficient"))) {
                        this.showPermissionError();
                    } else {
                        glassSwal.fire('ข้อผิดพลาด', 'ไม่สามารถบันทึกข้อมูลเข้าสู่ระบบได้', 'error');
                    }
                }
            },

            logout: function(force = false) {
                this.closeMobileMenu();

                if (force) {
                    if (this.profile && !this.profile.isGuest) {
                        localStorage.setItem('lastLogoutId', this.profile.studentId);
                        localStorage.setItem('lastLogoutTime', Date.now().toString());
                    }
                    
                    const sessionId = localStorage.getItem('currentSessionId');
                    if (sessionId) {
                        try {
                            updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_sessions', sessionId), { logoutAt: Date.now() });
                        } catch(e) {}
                        localStorage.removeItem('currentSessionId');
                    }

                    this.profile = null;
                    localStorage.removeItem('songSiangProfile');
                    if(this.unsubscribeMsgs) this.unsubscribeMsgs();
                    if(this.unsubscribeUsers) this.unsubscribeUsers();
                    if(this.unsubscribeUserStatus) this.unsubscribeUserStatus();
                    this.stopAutoPilot();
                    
                    this.showView('site_closed');
                    glassSwal.fire('ประกาศ', 'ขณะนี้ระบบถูกปิดใช้งานชั่วคราว', 'info');

                    showCancelButton: true,

                        if (this.profile && !this.profile.isGuest) {
                            localStorage.setItem('lastLogoutId', this.profile.studentId);
                            localStorage.setItem('lastLogoutTime', Date.now().toString());
                        }

                        const sessionId = localStorage.getItem('currentSessionId');
                        if (sessionId) {
                            try {
                                updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_sessions', sessionId), { logoutAt: Date.now() });
                            } catch(e) {}
                            localStorage.removeItem('currentSessionId');
                        }

                        localStorage.removeItem('songSiangProfile');
                        if(this.unsubscribeMsgs) this.unsubscribeMsgs();
                        if(this.unsubscribeUsers) this.unsubscribeUsers();
                        if(this.unsubscribeUserStatus) this.unsubscribeUserStatus();
                        this.stopAutoPilot();

            setupMessagesListener: function() {
                if(this.unsubscribeMsgs) this.unsubscribeMsgs();
                if(!this.profile) return;
                
                this.isLoadingData = true;

                const msgsRef = collection(db, 'artifacts', appId, 'public', 'data', 'song_siang_messages');
                this.unsubscribeMsgs = onSnapshot(msgsRef, (snapshot) => {
                    this.isLoadingData = false;
                    
                    const allMsgs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                        .filter(msg => msg && msg.from && msg.timestamp); 
                    
                    allMsgs.sort((a, b) => b.timestamp - a.timestamp);
                    this.allMessages = allMsgs; 
                    
                    const myMsgs = allMsgs.filter(msg => this.profile.isAdmin || (msg.to && Array.isArray(msg.to) && msg.to.includes(this.profile.studentId)));
                    this.messages = myMsgs; 
                    
                    if(this.currentView === 'inbox') {
                        const container = document.getElementById('inboxMessageContainer');
                        if(container) container.innerHTML = this.renderInboxMessagesList();
                    } 
                    else if(this.currentView === 'feed') {
                         const root = document.getElementById('appRoot');
                         if(root) root.innerHTML = this.renderFeed();
                    }
                    else if(this.currentView === 'sent_history') {
                         const container = document.getElementById('sentMessageContainer');
                         if(container) container.innerHTML = this.renderSentMessagesList();
                    }
                    else if(this.currentView === 'admin_email_system') {
                        // แทนที่จะ re-render ทั้งหน้าซึ่งอาจทำให้การเปิดปิดเมนู auto-pilot กระตุก
                        // เราสามารถเก็บสถานะการเปิดเอาไว้ และสั่ง render ใหม่ได้
                        const root = document.getElementById('appRoot');
                        if(root) root.innerHTML = this.renderAdminEmailSystem();
                    }
                }, (error) => {
                    console.error("Messages listener error:", error);
                    this.isLoadingData = false;
                });
            },

            loginAsGuestPrompt: async function() {
                if (!this.isSiteActive) {

            requestOTP: async function() {
                const idInput = document.getElementById('inputId').value.replace(/[^0-9]/g, '');
                if(idInput.length !== 8) return glassSwal.fire('แจ้งเตือน', 'กรุณากรอกรหัสนักศึกษาให้ครบ 8 หลัก', 'warning');

                if (!this.isSiteActive && idInput !== '65030900') {
                    return this.showView('site_closed');
                }
                
                if(idInput === '65030900') {
                    this.startWatchdog(5000);
                    return this.loginSuccess({ studentId: '65030900', fullName: 'ผู้ดูแลระบบ', name: 'Admin', isPredefined: true, isAdmin: true });
                }

                if(idInput === '90030000') {
                    this.startWatchdog(5000);
                    this.tempStudentId = idInput;
                    this.actualOtp = 'SKIP';
                    document.getElementById('appRoot').innerHTML = this.renderLogin3();
                    this.stopWatchdog();
                    return;
                }

                const lastLogoutId = localStorage.getItem('lastLogoutId');
                const lastLogoutTime = localStorage.getItem('lastLogoutTime');
                
                if (lastLogoutId === idInput && lastLogoutTime && this.otpSkipTime > 0) {
                    const minutesElapsed = (Date.now() - parseInt(lastLogoutTime)) / (1000 * 60);
                    if (minutesElapsed <= this.otpSkipTime) {
                        this.startWatchdog(5000);
                        const existingUser = predefinedUsers.find(u => u.studentId === idInput);
                        if (existingUser) {
                            return this.loginSuccess(existingUser);
                        }
                        try {
                            const userDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_user_status', idInput);
                            const userSnap = await getDoc(userDocRef);
                            if (userSnap.exists()) {
                                const data = userSnap.data();
                                return this.loginSuccess({
                                    studentId: idInput,
                                    name: data.name,
                                    fullName: data.fullName,
                                    isPredefined: false,
                                    isGuest: data.isGuest || false
                                });
                            }
                        } catch(err) {
                            if (err.message && (err.message.includes("permissions") || err.message.includes("Missing or insufficient"))) {
                                this.showPermissionError();
                                return;
                            }
                            console.error('Auto login fetch failed', err);
                        }
                        this.stopWatchdog();
                    }
                }

                this.tempStudentId = idInput;
                const btn = document.getElementById('btnReqOTP');
                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> กำลังส่งรหัส...';
                btn.disabled = true;

                const generatedOtp = Math.floor(100000 + Math.random() * 900000).toString();
                const targetEmail = `${idInput}@kmitl.ac.th`;
                const refCode = Math.random().toString(36).substring(2, 8).toUpperCase();
                this.currentRef = refCode;

                try {
                    const response = await fetch(`${APPS_SCRIPT_URL}?email=${encodeURIComponent(targetEmail)}&otp=${generatedOtp}&ref=${refCode}`);
                    const result = await response.json();
                    
                    if(result.status === 'success') {
                        this.actualOtp = generatedOtp;
                        document.getElementById('appRoot').innerHTML = this.renderLogin2();
                        setTimeout(() => document.getElementById('otp-0').focus(), 100);
                    } else {
                        glassSwal.fire('ข้อผิดพลาด', result.message, 'error');
                        btn.innerHTML = 'เข้าสู่ระบบ <i class="fa-solid fa-right-to-bracket ml-2"></i>';
                        btn.disabled = false;
                    }
                } catch(e) {

            saveAdminSettings: async function() {
                const c = parseInt(document.getElementById('inpMaxChars').value);
                const a = parseInt(document.getElementById('inpMaxAudio').value);
                const ex = parseInt(document.getElementById('inpShareExpiry').value);
                const yText = document.getElementById('inpYearOptions').value;
                const years = yText.split(',').map(y => y.trim()).filter(y => y !== '');
                
                const gText = document.getElementById('inpGuestOptions').value;
                const gRoles = gText.split(',').map(y => y.trim()).filter(y => y !== '');
                
                const sTime = parseInt(document.getElementById('inpOtpSkipTime').value);
                
                const isActive = document.getElementById('inpSiteActive').checked;
                const isAllowDelete = document.getElementById('inpAllowUserDelete').checked;

                if (c > 0 && a > 0 && ex > 0 && years.length > 0 && gRoles.length > 0 && sTime >= 0) {
                    try {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'song_siang_settings', 'config'), { 
                            maxChars: c, 
                            maxAudioTime: a,
                            shareExpiryMinutes: ex,
                            yearOptions: years,
                            guestOptions: gRoles,
                            isSiteActive: isActive,
                            allowUserDelete: isAllowDelete,
                            otpSkipTimeMinutes: sTime
                        }, { merge: true });
                        
                        this.maxChars = c;
                        this.maxAudioTime = a;
                        this.shareExpiryMinutes = ex;
                        this.yearOptions = years;
                        this.guestOptions = gRoles;
                        this.isSiteActive = isActive;
                        this.allowUserDelete = isAllowDelete;
                        this.otpSkipTime = sTime;

                        glassSwal.fire({ 
                            iconHtml: '<i class="fa-solid fa-check text-primary text-5xl"></i>', 
                            title: 'บันทึกสำเร็จ!', 
                            showConfirmButton: false, 
                            timer: 1500 
                        });
                        this.showView('home');
                    } catch(e) { glassSwal.fire('ข้อผิดพลาด', 'ไม่สามารถบันทึกได้', 'error'); }
                } else {
                    glassSwal.fire('แจ้งเตือน', 'กรุณาระบุข้อมูลให้ถูกต้องครบถ้วน', 'warning');
                }
            },

                        allUsers.push({ studentId: reg.id, name: reg.name, fullName: reg.fullName, isPredefined: false });
                    }
                });

                let csv = "\uFEFF"; 
                csv += "รหัสนักศึกษา,ชื่อเรียก,ชื่อ-นามสกุล,สถานะผู้ใช้\n";

                    const regData = this.registeredUsers.find(r => r.id === u.studentId) || {};
                    const status = regData.isBlocked ? "ระงับการใช้งาน" : (regData.lastLogin ? "ปกติ" : "ยังไม่เคยเข้าสู่ระบบ");
                    csv += `"${u.studentId}","${u.name}","${u.fullName || ''}","${status}"\n`;
                });

                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", `รายชื่อสมาชิก_ส่งเสียง_${new Date().toLocaleDateString('th-TH').replace(/\//g,'-')}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            },

            getFilteredUsers: function() {
                const queryStr = this.memberSearchQuery.toLowerCase().trim();
                const allUsers = [...predefinedUsers];
                this.registeredUsers.forEach(reg => {
                    if (!allUsers.find(u => u.studentId === reg.id)) {
                        allUsers.push({ studentId: reg.id, name: reg.name, fullName: reg.fullName, isPredefined: false });
                    }
                });

                return allUsers.filter(u => 
                    u.name.toLowerCase().includes(queryStr) || 
                    u.studentId.toLowerCase().includes(queryStr) ||
                    (u.fullName && u.fullName.toLowerCase().includes(queryStr))
                );
            },
