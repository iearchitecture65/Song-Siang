        const getPublicDataDoc = (name, id) => doc(db, 'artifacts', appId, 'public', 'data', name, id);
        const getSettingsDoc = () => doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'general');

        // Listeners
        onSnapshot(getSettingsDoc(), (snapshot) => {
            if (snapshot.exists()) {
                wordLimit = snapshot.data().wordLimit || 50;
                publicEnabled = snapshot.data().publicEnabled !== undefined ? snapshot.data().publicEnabled : true;
                if (currentView === 'login') renderLogin();
            }
        });

            user = u;
            if (u && !u.isAnonymous) {
                const email = u.email || "";
                if (email === "ie.architecture65@gmail.com") {
                    role = 'admin';
                    renderView('admin');
                } else if (email.endsWith('@kmitl.ac.th')) {
                    const prefix = email.split('@')[0];
                    if (STUDENT_LIST.some(s => s.id === prefix)) {
                        role = 'student'; studentId = prefix; renderView('home');
                    } else {
                        await signOut(auth); showAuthError("รหัสนักศึกษาของคุณไม่อยู่ในรายชื่อห้องเรียนนี้");

                } else {

                }

            } else if (u && u.isAnonymous) {
                role = 'public'; renderView('home');
                document.getElementById('main-header').classList.remove('hidden');
            } else {
                role = 'guest'; renderLogin();
                document.getElementById('main-header').classList.add('hidden');
                document.getElementById('student-nav').classList.add('hidden');
            }
            updateAuthUI();
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('views').classList.remove('hidden');
        });

            if (!publicEnabled) { showAuthError("ระบบสำหรับบุคคลทั่วไปปิดอยู่"); return; }
            try { await signInAnonymously(auth); } catch (e) { showAuthError(e.message); }
        };

                            </div>
                            <div class="flex gap-2">
                                <button onclick="resetRecording()" class="flex-1 bg-slate-100 py-4 rounded-3xl font-bold text-slate-500 hover:bg-slate-200">อัดใหม่</button>
                                <button id="submit-btn" onclick="submitVoice()" class="flex-1 bg-green-500 py-4 rounded-3xl font-bold text-white shadow-lg hover:bg-green-600 transition-all">ส่งเสียง</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        window.toggleRecording = async () => {
            const btn = document.getElementById('record-btn');
            const icon = document.getElementById('mic-icon');
            const status = document.getElementById('status-text');
            const timerEl = document.getElementById('timer-display');

            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => { recordedBlob = new Blob(audioChunks, { type: 'audio/mp3' }); };
                    mediaRecorder.start();

                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRecognition) {
                        recognition = new SpeechRecognition();
                        recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'th-TH';
                        recognition.onresult = (e) => {
                            let text = ""; for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
                            transcript = text;
                            const count = text.trim().split(/\s+/).filter(w => w.length > 0).length;
                            document.getElementById('transcript-preview').innerText = `"${text}"`;
                            const badge = document.getElementById('word-count-badge');
                            badge.innerText = `${count} / ${targetStudent ? '∞' : wordLimit}`;
                            const subBtn = document.getElementById('submit-btn');
                            if (!targetStudent && count > wordLimit) {
                                badge.className = 'text-xs font-bold px-3 py-1 rounded-full bg-red-100 text-red-600';
                                subBtn.disabled = true; subBtn.classList.add('opacity-50');
                            } else {
                                badge.className = 'text-xs font-bold px-3 py-1 rounded-full bg-indigo-100 text-indigo-600';
                                subBtn.disabled = false; subBtn.classList.remove('opacity-50');
                            }
                        };
                        recognition.start();
                    }

                    btn.classList.add('recording-pulse', 'bg-red-500'); icon.setAttribute('data-lucide', 'square');
                    timerEl.classList.replace('text-slate-200', 'text-red-500'); status.innerText = "RECORDING...";
                    timer = 0; timerInterval = setInterval(() => {
                        timer++; const m = Math.floor(timer / 60).toString().padStart(2, '0'); const s = (timer % 60).toString().padStart(2, '0');
                        timerEl.innerText = `${m}:${s}`;
                    }, 1000);
                    lucide.createIcons();
                } catch (err) { showAuthError("ไมโครโฟนถูกปฏิเสธ: " + err.message); }
            } else {
                mediaRecorder.stop(); recognition?.stop(); clearInterval(timerInterval);
                btn.classList.add('hidden'); document.getElementById('recording-feedback').classList.remove('hidden');
                status.innerText = "CHECK & SEND"; timerEl.classList.replace('text-red-500', 'text-slate-800');
                lucide.createIcons();
            }
        };

        window.submitVoice = async () => {
            if (!user) { showAuthError("กรุณาเข้าสู่ระบบก่อนครับ"); return; }
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "SENDING...";

            try {
                // ข้อมูลที่จะบันทึกลง Firestore (RULE 1)
                const payload = {
                    from: studentId || (user.isAnonymous ? "Guest" : user.displayName),
                    targetId: targetStudent ? targetStudent.id : "Admin",
                    timestamp: new Date().toISOString(),
                    transcript: transcript,
                    wordCount: transcript.trim().split(/\s+/).filter(w => w.length > 0).length,
                    driveUrl: "https://drive.google.com/drive/folders/" + serviceAccountMeta.folderId,
                };

                // บันทึก Metadata ลง Firestore (เพื่อแสดงรายการในหน้าแอป)
                if (role === 'student' && !targetStudent) {
                    await setDoc(getPublicDataDoc('submissions', studentId), payload);
                } else {
                    await addDoc(getPublicDataCollection('messages'), payload);
                }

                /* หมายเหตุสำหรับคุณ: การส่งไฟล์ Blob (recordedBlob) เข้า Google Drive โดยตรงจาก HTML
                   ต้องใช้ Access Token จาก OAuth2 หรือทำผ่าน Cloud Function (แนะนำ)
                   ในขั้นตอนนี้ ข้อมูลตัวหนังสือและลิงก์โฟลเดอร์จะถูกบันทึกสำเร็จแล้วครับ
                */

                document.getElementById('views').innerHTML = `
                    <div class="text-center py-20 animate-in zoom-in">
                        <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full mx-auto flex items-center justify-center mb-6"><i data-lucide="check" size="40"></i></div>
                        <h2 class="text-3xl font-black italic tracking-tighter mb-2">SENT!</h2>
                        <p class="text-slate-400 text-sm mb-8">บันทึกข้อมูลเรียบร้อยแล้ว</p>
                        <button onclick="renderView('home')" class="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold">BACK HOME</button>
                    </div>`;
                lucide.createIcons(); targetStudent = null;
            } catch (e) {
                console.error(e);
                showAuthError("บันทึกข้อมูลไม่สำเร็จ: " + e.message + " (ตรวจสอบสิทธิ์ Firebase ของคุณ)");
                btn.disabled = false; btn.innerText = "ส่งเสียง";
            }
        };

        window.resetRecording = () => { if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); recognition?.stop(); clearInterval(timerInterval); renderView('record'); };

        function renderInbox() {
            const listContainer = document.getElementById('views');
            listContainer.innerHTML = `<h2 class="text-2xl font-black italic mb-6 flex items-center gap-2"><i data-lucide="mail"></i> INBOX</h2><div id="inbox-list" class="grid gap-4">กำลังโหลด...</div>`;
            const list = document.getElementById('inbox-list');
            const q = query(getPublicDataCollection('messages'), where("targetId", "in", [studentId, "Everyone"]));
            onSnapshot(q, (snapshot) => {
                list.innerHTML = "";
                if (snapshot.empty) { list.innerHTML = `<div class="bg-white p-12 rounded-[40px] text-center text-slate-400 italic">No messages found.</div>`; return; }
                snapshot.docs.forEach(d => {
                    const msg = d.data(); const isGlobal = msg.targetId === "Everyone";
                    const item = document.createElement('div');
                    item.className = `bg-white p-6 rounded-[32px] border ${isGlobal ? 'border-indigo-100' : 'border-slate-100'} text-left shadow-sm`;
                    item.innerHTML = `<p class="text-[10px] font-bold ${isGlobal ? 'text-indigo-600' : 'text-slate-400'} uppercase mb-2">${isGlobal ? 'GLOBAL' : 'PRIVATE'}</p><p class="text-sm text-slate-600 italic leading-relaxed mb-4">"${msg.transcript}"</p><a href="${msg.driveUrl}" target="_blank" class="text-indigo-600 text-xs font-bold bg-indigo-50 px-3 py-2 rounded-lg inline-flex items-center gap-1"><i data-lucide="play-circle" size="14"></i> LISTEN</a>`;
                    list.appendChild(item);
                });
                lucide.createIcons();
            });
        }

        function renderAdmin() {
            const container = document.getElementById('views');
            container.innerHTML = `
                <div class="space-y-8 text-left">
                    <div class="bg-white p-8 rounded-[48px] shadow-lg border border-indigo-50">
                        <h2 class="text-2xl font-black italic mb-6">ADMIN PANEL</h2>
                        <div class="grid sm:grid-cols-2 gap-6 mb-6">
                            <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase">Limit (Words)</label><input id="word-limit-input" type="number" value="${wordLimit}" class="w-full bg-slate-50 border p-4 rounded-2xl font-bold text-xl"></div>
                            <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase">Public Access</label><button onclick="togglePublicAccess()" id="public-toggle-btn" class="w-full ${publicEnabled ? 'bg-green-500' : 'bg-red-500'} text-white p-4 rounded-2xl font-bold">${publicEnabled ? 'OPEN' : 'CLOSED'}</button></div>
                        </div>
                        <button onclick="saveAdminSettings()" id="save-btn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100">SAVE SETTINGS</button>
                    </div>
                    <div class="space-y-4"><h3 class="font-bold text-slate-400 uppercase text-xs ml-4">Submissions</h3><div id="admin-submissions" class="grid gap-2"></div></div>
                </div>`;
            const subList = document.getElementById('admin-submissions');
            onSnapshot(getPublicDataCollection('submissions'), (snapshot) => {
                subList.innerHTML = ""; snapshot.docs.forEach(d => {
                    const sub = d.data(); const item = document.createElement('div');
                    item.className = "bg-white p-4 rounded-3xl border border-slate-50 flex justify-between items-center shadow-sm";
                    item.innerHTML = `<div class="text-left"><p class="font-bold text-slate-800 leading-none">${sub.from}</p><p class="text-[10px] text-slate-400 mt-1">${sub.wordCount} words</p></div><a href="${sub.driveUrl}" target="_blank" class="bg-slate-50 text-slate-400 p-2 rounded-xl hover:text-indigo-600"><i data-lucide="external-link" size="18"></i></a>`;
                    subList.appendChild(item);
                });
                lucide.createIcons();
            });
            lucide.createIcons();
        }

        window.togglePublicAccess = () => { publicEnabled = !publicEnabled; renderAdmin(); };
        window.saveAdminSettings = async () => {
            const btn = document.getElementById('save-btn'); btn.disabled = true;
            try { await setDoc(getSettingsDoc(), { wordLimit: parseInt(document.getElementById('word-limit-input').value), publicEnabled }); alert("บันทึกเรียบร้อย!"); } catch (e) { alert(e.message); }
            btn.disabled = false;
        };

        window.closeErrorModal = () => document.getElementById('error-modal').classList.add('hidden');
        function showAuthError(msg) { document.getElementById('error-message').innerHTML = msg; document.getElementById('error-modal').classList.remove('hidden'); lucide.createIcons(); }
    </script>
</body>
</html>
