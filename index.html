        const provider = new GoogleAuthProvider();

        // Listen for Auth changes
        onAuthStateChanged(auth, async (u) => {
            user = u;
            if (u) {
                const prefix = u.email.split('@')[0];
                // Check role
                if (u.email === "admin-song-siang@gmail.com" || u.email.includes("teacher")) {
                    role = 'admin';
                } else if (STUDENT_LIST.some(s => s.id === prefix)) {
                    role = 'student';
                    studentId = prefix;
                } else {
                    role = 'guest';
                }
                updateAuthUI();
                renderView('home');
            } else {
                role = 'guest';
                updateAuthUI();
                renderView('home');
            }
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('views').classList.remove('hidden');
        });

        // Listen for Global Settings
        onSnapshot(doc(db, "settings", "general"), (doc) => {
            if (doc.exists()) wordLimit = doc.data().wordLimit;
        });

        // --- Core Functions ---
        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

                    <button onclick="login()" class="bg-indigo-600 text-white px-5 py-2 rounded-full text-sm font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-95">

                `;

            if (role === 'student') nav.classList.remove('hidden');
            else nav.classList.add('hidden');

            // Update Nav Buttons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.dataset.view === viewName) btn.classList.add('text-indigo-600');
                else btn.classList.replace('text-indigo-600', 'text-slate-400');
            });

            switch (viewName) {
                case 'home': renderHome(); break;
                case 'record': renderRecord(); break;
                case 'inbox': renderInbox(); break;
                case 'admin': renderAdmin(); break;
            }
            lucide.createIcons();
        }

                                <i data-lucide="mic" id="mic-icon" size="48" class="text-white"></i>

                        <div id="recording-feedback" class="w-full space-y-4 hidden">

            `;

        window.toggleRecording = async () => {
            const btn = document.getElementById('record-btn');
            const icon = document.getElementById('mic-icon');
            const status = document.getElementById('status-text');
            const feedback = document.getElementById('recording-feedback');
            const timerEl = document.getElementById('timer-display');

            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                // Start
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.start();

                    // AI Speech Recognition
                    if (!recognition && 'webkitSpeechRecognition' in window) {
                        recognition = new webkitSpeechRecognition();
                        recognition.continuous = true;
                        recognition.interimResults = true;
                        recognition.lang = 'th-TH';
                        recognition.onresult = (e) => {
                            let text = "";
                            for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
                            transcript = text;
                            const count = text.trim().split(/\s+/).filter(w => w.length > 0).length;
                            document.getElementById('transcript-preview').innerText = `"${text}"`;
                            const badge = document.getElementById('word-count-badge');
                            badge.innerText = `${count} / ${targetStudent ? '∞' : wordLimit} คำ`;
                            
                            if (!targetStudent && count > wordLimit) {
                                badge.classList.replace('bg-indigo-100', 'bg-red-100');
                                badge.classList.replace('text-indigo-600', 'text-red-600');
                                document.getElementById('submit-btn').disabled = true;
                                document.getElementById('submit-btn').classList.add('opacity-50');
                            } else {
                                badge.classList.replace('bg-red-100', 'bg-indigo-100');
                                badge.classList.replace('text-red-600', 'text-indigo-600');
                                document.getElementById('submit-btn').disabled = false;
                                document.getElementById('submit-btn').classList.remove('opacity-50');
                            }
                        };
                    }
                    recognition?.start();

                    setIsRecordingUI(true);
                    timer = 0;
                    timerInterval = setInterval(() => {
                        timer++;
                        const m = Math.floor(timer / 60).toString().padStart(2, '0');
                        const s = (timer % 60).toString().padStart(2, '0');
                        timerEl.innerText = `${m}:${s}`;
                    }, 1000);

                } catch (err) { alert("ไมโครโฟนถูกปฏิเสธ: " + err.message); }
            } else {
                // Stop
                mediaRecorder.stop();
                recognition?.stop();
                clearInterval(timerInterval);
                setIsRecordingUI(false);
                feedback.classList.remove('hidden');
                btn.classList.add('hidden');
                status.innerText = "ตรวจสอบและกดส่งงาน";
            }
        };

        function setIsRecordingUI(active) {
            const btn = document.getElementById('record-btn');
            const timerEl = document.getElementById('timer-display');
            const status = document.getElementById('status-text');
            if (active) {
                btn.classList.add('recording-pulse', 'bg-red-500');
                btn.classList.remove('bg-indigo-600');
                timerEl.classList.replace('text-slate-300', 'text-red-500');
                status.innerText = "กำลังอัดเสียง...";
                document.getElementById('mic-icon').setAttribute('data-lucide', 'square');
            } else {
                btn.classList.remove('recording-pulse');
                timerEl.classList.replace('text-red-500', 'text-slate-700');
                document.getElementById('mic-icon').setAttribute('data-lucide', 'mic');
            }
            lucide.createIcons();
        }

        window.submitVoice = async () => {
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "กำลังอัปโหลด...";

            try {
                const count = transcript.trim().split(/\s+/).filter(w => w.length > 0).length;
                const payload = {
                    from: studentId || "Guest",
                    targetId: targetStudent ? targetStudent.id : "Admin",
                    timestamp: new Date().toISOString(),
                    wordCount: count,
                    transcript: transcript,
                    driveUrl: "https://drive.google.com/drive/folders/" + serviceAccountMeta.folderId,
                    fileName: `voice_${Date.now()}.mp3`
                };

                if (role === 'student' && !targetStudent) {
                    await setDoc(doc(db, "submissions", studentId), payload);
                } else {
                    await addDoc(collection(db, "messages"), payload);
                }

                // Show Success
                document.getElementById('views').innerHTML = `
                    <div class="text-center py-20 space-y-6">
                        <div class="w-24 h-24 bg-green-100 text-green-600 rounded-full mx-auto flex items-center justify-center animate-bounce">
                            <i data-lucide="check" size="48"></i>
                        </div>
                        <h2 class="text-3xl font-bold text-slate-800">ส่งเสียงสำเร็จแล้ว!</h2>
                        <p class="text-slate-400">ข้อมูลของคุณถูกบันทึกเข้าระบบเรียบร้อย</p>
                        <button onclick="renderView('home')" class="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold">กลับหน้าแรก</button>
                    </div>
                `;
                lucide.createIcons();
                targetStudent = null;
            } catch (e) {
                alert("เกิดข้อผิดพลาด: " + e.message);
                btn.disabled = false;
                btn.innerText = "ส่งเสียง";
            }
        };

        window.resetRecording = () => renderView('record');

        function renderInbox() {
            const container = document.getElementById('views');
            container.innerHTML = `
                <div class="space-y-6">
                    <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-3">
                        <i data-lucide="mail" class="text-indigo-600"></i> กล่องเสียงถึงคุณ
                    </h2>
                    <div id="inbox-list" class="grid gap-4">
                        <p class="text-slate-400 italic text-center py-10">กำลังโหลดข้อความ...</p>
                    </div>
                </div>
            `;
            const list = document.getElementById('inbox-list');
            const q = query(collection(db, "messages"), where("targetId", "==", studentId));
            
            onSnapshot(q, (snapshot) => {
                list.innerHTML = "";
                if (snapshot.empty) {
                    list.innerHTML = `<div class="bg-white p-10 rounded-3xl text-center border border-slate-100 text-slate-400">ยังไม่มีใครส่งเสียงหาคุณในตอนนี้</div>`;
                    return;
                }
                snapshot.docs.forEach(d => {
                    const msg = d.data();
                    const item = document.createElement('div');
                    item.className = "bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-3 hover:shadow-md transition-shadow";
                    item.innerHTML = `
                        <div class="flex justify-between items-start">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">GUEST MESSAGE</p>
                            <p class="text-[10px] text-slate-300 font-medium">${new Date(msg.timestamp).toLocaleString('th-TH')}</p>
                        </div>
                        <p class="text-sm text-slate-600 italic">"${msg.transcript}"</p>
                        <a href="${msg.driveUrl}" target="_blank" class="inline-flex items-center gap-2 text-indigo-600 text-xs font-bold hover:underline">
                            <i data-lucide="play-circle" size="16"></i> ฟังเสียงต้นฉบับ
                        </a>
                    `;
                    list.appendChild(item);
                });
                lucide.createIcons();
            });
        }

        function renderAdmin() {
            const container = document.getElementById('views');
            container.innerHTML = `
                <div class="space-y-10">
                    <div class="bg-white p-8 rounded-[40px] shadow-xl border border-indigo-50 space-y-6">
                        <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-3">
                            <i data-lucide="settings" class="text-indigo-600"></i> แผงควบคุม Admin
                        </h2>
                        <div class="flex flex-col sm:flex-row gap-4 items-end">
                            <div class="flex-1 space-y-1 w-full">
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">จำกัดจำนวนคำของนักศึกษา</label>
                                <input id="word-limit-input" type="number" value="${wordLimit}" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all font-bold text-xl">
                            </div>
                            <button onclick="saveAdminSettings()" id="save-settings-btn" class="w-full sm:w-auto bg-indigo-600 text-white px-10 py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">บันทึกค่า</button>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <h3 class="text-lg font-bold text-slate-700 uppercase tracking-tighter flex items-center gap-2">
                             <i data-lucide="list-checks" size="20"></i> รายการส่งงานจากทุกคน
                        </h3>
                        <div id="admin-submissions" class="grid gap-3"></div>
                    </div>
                </div>
            `;
            
            const subList = document.getElementById('admin-submissions');
            onSnapshot(collection(db, "submissions"), (snapshot) => {
                subList.innerHTML = "";
                snapshot.docs.forEach(d => {
                    const sub = d.data();
                    const sInfo = STUDENT_LIST.find(s => s.id === sub.from);
                    const item = document.createElement('div');
                    item.className = "bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex flex-col sm:flex-row justify-between items-center gap-4";
                    item.innerHTML = `
                        <div class="flex items-center gap-4 w-full">
                            <div class="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 font-bold text-xs">${sub.from.slice(-2)}</div>
                            <div class="flex-1">
                                <p class="font-bold text-slate-800">${sInfo ? sInfo.nick : sub.from}</p>
                                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">นับได้ ${sub.wordCount} คำ | ${sub.from}</p>
                            </div>
                        </div>
                        <a href="${sub.driveUrl}" target="_blank" class="w-full sm:w-auto bg-slate-50 hover:bg-indigo-50 text-slate-600 hover:text-indigo-600 px-5 py-2 rounded-xl text-xs font-bold transition-all text-center">Open Drive</a>
                    `;
                    subList.appendChild(item);
                });
                lucide.createIcons();
            });
            lucide.createIcons();
        }

        window.saveAdminSettings = async () => {
            const btn = document.getElementById('save-settings-btn');
            const val = document.getElementById('word-limit-input').value;
            btn.disabled = true;
            btn.innerText = "กำลังบันทึก...";
            try {
                await setDoc(doc(db, "settings", "general"), { wordLimit: parseInt(val) });
                alert("บันทึกเรียบร้อย!");
            } catch (e) { alert(e.message); }
            btn.disabled = false;
            btn.innerText = "บันทึกค่า";
        };

    </script>
</body>
</html>
